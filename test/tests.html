    const compact = buildCompact(p);
    const restored = parseCompact(compact);
    if (!restored) throw new Error("parseCompact returned null");
    const validated = validatePlan(restored);
    if (!validated) throw new Error("validatePlan rejected parseCompact output");
    // Geometry equal
    if (!planGeomEqual(validated, p)) throw new Error("round-trip geometry differs from original");
    // unit preserved
    if (validated.unit !== p.unit) throw new Error("unit not preserved in round-trip");
  });

  it("compact payload has no id/view/app/schema keys", () => {
    resetAll();
    setUnit("ft");
    model.rooms.push({ id: "w0", closed: true, verts: [{ x: 0, y: 0 }, { x: 2, y: 0 }, { x: 2, y: 2 }, { x: 0, y: 2 }] });
    const sym = createSymbol("sofa", 1, 1);
    addSymbol(sym);
    const p = buildPlan();
    const compact = buildCompact(p);
    if ("app" in compact) throw new Error("compact must not have 'app'");
    if ("schema" in compact) throw new Error("compact must not have 'schema'");
    if ("view" in compact) throw new Error("compact must not have 'view'");
    // rooms must not have ids
    for (const room of compact.r) {
      if ("id" in room) throw new Error("compact room must not have 'id'");
    }
    // symbols must not have ids
    for (const s of compact.s) {
      if ("id" in s) throw new Error("compact sym must not have 'id'");
    }
  });

  it("catalog-default w/h/rot are omitted; non-default values are written", () => {
    resetAll();
    setUnit("ft");
    // Default bed: w=1.50, h=2.00, rot=0 → all omitted
    const bedDefault = createSymbol("bed", 1, 1);
    addSymbol(bedDefault);
    // Resized desk: w differs from CATALOG.desk.w → written
    const desk = createSymbol("desk", 3, 3);
    desk.w = 1.20; // CATALOG.desk.w = 1.40, so 1.20 != 1.40 → written
    addSymbol(desk);
    // Rotated chair: rot=90 → written
    const chair = createSymbol("chair", 5, 5);
    chair.rot = 90;
    addSymbol(chair);

    const p = buildPlan();
    const compact = buildCompact(p);
    const [cBed, cDesk, cChair] = compact.s;

    // Bed at catalog defaults: no w, h, d
    if ("w" in cBed) throw new Error("bed w should be omitted (catalog default)");
    if ("h" in cBed) throw new Error("bed h should be omitted (catalog default)");
    if ("d" in cBed) throw new Error("bed rot should be omitted (0)");

    // Desk with non-default w: w is written; h is catalog default → omitted
    if (!("w" in cDesk)) throw new Error("desk w should be written (non-default)");
    if ("h" in cDesk) throw new Error("desk h should be omitted (catalog default)");

    // Chair with non-zero rot: d is written
    if (!("d" in cChair)) throw new Error("chair rot=90 should write 'd' field");
    if (cChair.d !== 90) throw new Error(`chair d should be 90, got ${cChair.d}`);

    // Round-trip: all values preserved
    const restored = validatePlan(parseCompact(compact));
    if (!restored) throw new Error("validatePlan rejected after default-omission round-trip");
    const syms = restored.symbols.symbols;
    if (syms[0].w !== CATALOG.bed.w) throw new Error("bed w not restored from catalog");
    if (syms[0].h !== CATALOG.bed.h) throw new Error("bed h not restored from catalog");
    if (syms[0].rot !== 0) throw new Error("bed rot not restored to 0");
    if (syms[1].w !== 1.20) throw new Error("desk w not preserved");
    if (syms[2].rot !== 90) throw new Error("chair rot not restored");
  });

  it("cross-type default guard: desk resized to fridge's default width is written explicitly", () => {
    resetAll();
    setUnit("ft");
    const desk = createSymbol("desk", 2, 2);
    desk.w = CATALOG.fridge.w; // 0.70 — not desk's default (1.40)
    addSymbol(desk);
    const p = buildPlan();
    const compact = buildCompact(p);
    // The compact sym for desk must have 'w' written (fridge's default != desk's default)
    if (!("w" in compact.s[0])) throw new Error("desk resized to fridge.w should write 'w' explicitly");
    if (compact.s[0].w !== CATALOG.fridge.w) throw new Error("desk w value is wrong");
    // Round-trip
    const restored = validatePlan(parseCompact(compact));
    if (!restored) throw new Error("validatePlan rejected");
    if (restored.symbols.symbols[0].w !== CATALOG.fridge.w) throw new Error("desk w not preserved after round-trip");
  });

  it("mm rounding: sub-mm coord rounds to 3dp and round-trips to rounded value", () => {
    resetAll();
    setUnit("m");
    // Free-placed coord with sub-mm precision
    model.rooms.push({ id: "w0", closed: false, verts: [{ x: 1.23456, y: 2.34567 }] });
    const p = buildPlan();
    const compact = buildCompact(p);
    // After rounding: 1.23456 → 1.235 (Math.round(1234.56)/1000), 2.34567 → 2.346
    const [cx, cy] = compact.r[0].p[0];
    const expected_x = Math.round(1.23456 * 1000) / 1000;
    const expected_y = Math.round(2.34567 * 1000) / 1000;
    if (cx !== expected_x) throw new Error(`x rounded to ${cx}, expected ${expected_x}`);
    if (cy !== expected_y) throw new Error(`y rounded to ${cy}, expected ${expected_y}`);
    // Round-trip produces the rounded value (not original)
    const restored = validatePlan(parseCompact(compact));
    if (!restored) throw new Error("validatePlan rejected");
    if (restored.walls.rooms[0].verts[0].x !== expected_x) throw new Error("x not round-tripped correctly");
  });

  it("empty plan round-trips to empty valid plan (Edge Case 9)", () => {
    resetAll();
    const p = buildPlan();
    const compact = buildCompact(p);
    if (compact.v !== COMPACT_VERSION) throw new Error("wrong compact version");
    if (!Array.isArray(compact.r) || compact.r.length !== 0) throw new Error("r should be empty array");
    if (!Array.isArray(compact.k) || compact.k.length !== 0) throw new Error("k should be empty array");
    if (!Array.isArray(compact.s) || compact.s.length !== 0) throw new Error("s should be empty array");
    const restored = validatePlan(parseCompact(compact));
    if (!restored) throw new Error("validatePlan rejected empty compact plan");
    if (restored.walls.rooms.length !== 0) throw new Error("rooms not empty after round-trip");
  });

  it("parseCompact returns null for wrong version", () => {
    resetAll();
    const p = buildPlan();
    const compact = buildCompact(p);
    compact.v = 99;
    const result = parseCompact(compact);
    if (result !== null) throw new Error("Expected null for wrong version");
  });

  it("parseCompact returns null for missing r array", () => {
    const result = parseCompact({ v: COMPACT_VERSION, u: "ft", k: [], s: [] });
    if (result !== null) throw new Error("Expected null for missing r");
  });

  it("parseCompact returns null for missing s array", () => {
    const result = parseCompact({ v: COMPACT_VERSION, u: "ft", r: [], k: [] });
    if (result !== null) throw new Error("Expected null for missing s");
  });

  it("parseCompact passes unknown type through; validatePlan rejects it (Edge Case 6)", () => {
    const compact = { v: COMPACT_VERSION, u: "ft", r: [], k: [], s: [{ t: "ufo_machine", x: 1, y: 1 }] };
    const restored = parseCompact(compact);
    // Either parseCompact returns null OR validatePlan rejects it
    if (restored !== null) {
      const validated = validatePlan(restored);
      if (validated !== null) throw new Error("validatePlan should reject unknown symbol type");
    }
  });

  it("parseCompact returns null for non-array vertex tuple (Edge Case 7)", () => {
    const compact = {
      v: COMPACT_VERSION, u: "ft",
      r: [{ c: 1, p: ["not-a-tuple"] }],
      k: [], s: []
    };
    const result = parseCompact(compact);
    if (result !== null) throw new Error("Expected null for non-array vertex tuple");
  });

  it("parseCompact returns null for non-finite coordinate", () => {
    const compact = {
      v: COMPACT_VERSION, u: "ft",
      r: [{ c: 1, p: [[Infinity, 0]] }],
      k: [], s: []
    };
    const result = parseCompact(compact);
    // Either null or validatePlan rejects it
    if (result !== null) {
      const validated = validatePlan(result);
      if (validated !== null) throw new Error("Expected validatePlan to reject non-finite coord");
    }
  });

  it("chain vertices (draft) are preserved in round-trip", () => {
    resetAll();
    setUnit("m");
    model.chain.push({ x: 0.1, y: 0.2 }, { x: 1.0, y: 0.5 });
    const p = buildPlan();
    const compact = buildCompact(p);
    if (compact.k.length !== 2) throw new Error("chain not encoded");
    const restored = validatePlan(parseCompact(compact));
    if (!restored) throw new Error("validatePlan rejected");
    if (restored.walls.chain.length !== 2) throw new Error("chain not restored");
    if (restored.walls.chain[0].x !== 0.1 || restored.walls.chain[0].y !== 0.2) {
      throw new Error("chain vertex 0 coords wrong");
    }
  });
});

describe("LLD 77 — share.js compact 'c' codec", () => {
  it("encodePlanToHash emits hash starting with 'c' when CompressionStream is available", async () => {

  });

  it("'c' codec round-trips a non-trivial plan (geometry/unit equal)", async () => {
    resetAll();
    setUnit("m");
    model.rooms.push({ id: "w0", closed: true, verts: [{ x: 0, y: 0 }, { x: 5, y: 0 }, { x: 5, y: 4 }, { x: 0, y: 4 }] });
    model.rooms.push({ id: "w1", closed: true, verts: [{ x: 5, y: 0 }, { x: 10, y: 0 }, { x: 10, y: 4 }, { x: 5, y: 4 }] });
    addSymbol(createSymbol("sofa", 2.5, 2));
    addSymbol(createSymbol("bed", 7, 2));
    const p = buildPlan();
    const hash = await encodePlanToHash(p);
    if (hash[0] !== "c") throw new Error(`Expected 'c' codec, got '${hash[0]}'`);
    const decoded = await decodeHashToPlan(hash);
    if (!decoded) throw new Error("decodeHashToPlan returned null for 'c' hash");
    if (!planGeomEqual(decoded, p)) throw new Error("'c' round-trip geometry mismatch");
  });

  it("'c' hash is materially shorter than the old 'd' hash (compactness sanity)", async () => {
    // Gaming room fixture: two desks + monitor + chair (representative plan)
    resetAll();
    setUnit("ft");
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 3.5 }, { x: 0, y: 3.5 }
    ]});
    addSymbol(createSymbol("desk", 1, 1));
    addSymbol(createSymbol("desk", 3, 1));
    addSymbol(createSymbol("chair", 2, 2));
    const p = buildPlan();

    // Build 'c' hash using new encoder
    const cHash = await encodePlanToHash(p);

    // Build legacy 'd' hash manually (full JSON + deflate)
    const fullJson = serializePlan(p);
    const fullBytes = new TextEncoder().encode(fullJson);
    const cs = new CompressionStream("deflate-raw");
    const writer = cs.writable.getWriter();
    writer.write(fullBytes); writer.close();
    const chunks = [];
    const reader = cs.readable.getReader();
    while (true) { const { done, value } = await reader.read(); if (done) break; chunks.push(value); }
    const total = chunks.reduce((n, a) => n + a.length, 0);
    const comp = new Uint8Array(total); let off = 0;
    for (const c of chunks) { comp.set(c, off); off += c.length; }
    let bin = ""; for (let i = 0; i < comp.length; i++) bin += String.fromCharCode(comp[i]);
    const dHash = "d" + btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");

    // The compact hash should be substantially shorter
    if (cHash.length >= dHash.length) {
      throw new Error(`'c' hash (${cHash.length}) should be shorter than 'd' hash (${dHash.length})`);
    }
    // Sanity: at least 20% shorter
    const reduction = 1 - cHash.length / dHash.length;
    if (reduction < 0.20) throw new Error(`Expected ≥20% reduction, got ${(reduction * 100).toFixed(1)}%`);
  });

  it("decodeHashToPlan returns null for unknown codec byte (never throws)", async () => {
    let result;
    try { result = await decodeHashToPlan("zsome_payload_here"); } catch { throw new Error("threw instead of returning null"); }
    if (result !== null) throw new Error("Expected null for unknown codec byte");
  });

  it("decodeHashToPlan returns null for truncated 'c' payload (never throws)", async () => {
    resetAll();
    const p = buildPlan();
    const hash = await encodePlanToHash(p);
    const truncated = hash.slice(0, 4); // 'c' + 3 chars — definitely invalid
    let threw = false;
    try { await decodeHashToPlan(truncated); } catch { threw = true; }
    if (threw) throw new Error("decodeHashToPlan threw on truncated 'c' payload");
  });

  it("decodeHashToPlan returns null for 'c' payload inflating to invalid JSON (never throws)", async () => {
    // Compress a non-JSON string, prefix with 'c'
    const bytes = new TextEncoder().encode("this is not json at all");
    const cs = new CompressionStream("deflate-raw");
    const writer = cs.writable.getWriter();
    writer.write(bytes); writer.close();
    const chunks = []; const reader = cs.readable.getReader();
    while (true) { const { done, value } = await reader.read(); if (done) break; chunks.push(value); }
    const total = chunks.reduce((n, a) => n + a.length, 0);
    const comp = new Uint8Array(total); let off = 0;
    for (const c of chunks) { comp.set(c, off); off += c.length; }
    let bin = ""; for (let i = 0; i < comp.length; i++) bin += String.fromCharCode(comp[i]);
    const badHash = "c" + btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    let result;
    try { result = await decodeHashToPlan(badHash); } catch { throw new Error("threw instead of returning null"); }
    if (result !== null) throw new Error("Expected null for invalid JSON payload");
  });

  it("decodeHashToPlan returns null for 'c' hash with unknown symbol type (Edge Case 6)", async () => {
    // Build a compact payload with an unknown type, compress it, hash it
    const bad = { v: COMPACT_VERSION, u: "ft", r: [], k: [], s: [{ t: "time_machine", x: 1, y: 1 }] };
    const bytes = new TextEncoder().encode(JSON.stringify(bad));

    const writer = cs.writable.getWriter();

    while (true) { const { done, value } = await reader.read(); if (done) break; chunks.push(value); }
    const total = chunks.reduce((n, a) => n + a.length, 0);
    const comp = new Uint8Array(total); let off = 0;
    for (const c of chunks) { comp.set(c, off); off += c.length; }
    let bin = ""; for (let i = 0; i < comp.length; i++) bin += String.fromCharCode(comp[i]);
    const badHash = "c" + btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    let result;

  it("returns w≈4, h≈3 for v0=(0,0) v1=(4,0) v2=(4,3) v3=(0,3)", () => {
    const room = { id: "rd1", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 3 }, { x: 0, y: 3 }
    ]};
    const d = rectDims(room);
    if (!d) throw new Error("Expected non-null from rectDims");
    expect(d.w).toBeCloseTo(4, 9);
    expect(d.h).toBeCloseTo(3, 9);
    // wEdge must belong to {0,2}, hEdge to {1,3}
    if (d.wEdge !== 0 && d.wEdge !== 2) throw new Error(`wEdge ${d.wEdge} not in {0,2}`);
    if (d.hEdge !== 1 && d.hEdge !== 3) throw new Error(`hEdge ${d.hEdge} not in {1,3}`);
  });

  it("wEdge and hEdge are perpendicular (different mod-2 parity)", () => {
    const room = { id: "rd2", closed: true, verts: [
      { x: 0, y: 0 }, { x: 5, y: 0 }, { x: 5, y: 2 }, { x: 0, y: 2 }
    ]};
    const d = rectDims(room);
    if (!d) throw new Error("Expected non-null from rectDims");
    // wEdge is 0 or 2 (even), hEdge is 1 or 3 (odd) — or vice versa for tilted
    // but in this axis-aligned case: width=5 so wEdge picks the horizontal pair (0 or 2)
    expect(d.w).toBeCloseTo(5, 9);
    expect(d.h).toBeCloseTo(2, 9);
  });

  it("taller-than-wide rectangle still maps width to more-horizontal pair", () => {
    // v0→v1 is vertical (length 4), v1→v2 is horizontal (length 2)
    const room = { id: "rd3", closed: true, verts: [
      { x: 0, y: 0 }, { x: 0, y: 4 }, { x: 2, y: 4 }, { x: 2, y: 0 }
    ]};
    const d = rectDims(room);
    if (!d) throw new Error("Expected non-null");
    // Edge 0 (v0→v1) is (0,4): |dx|=0 < |dy|=4, so edge 1 is picked as width
    // Edge 1 (v1→v2) is (2,0): more horizontal → width=2
    expect(d.w).toBeCloseTo(2, 9);
    expect(d.h).toBeCloseTo(4, 9);
  });

  it("rotated 30° rectangle returns the two true side lengths", () => {
    // Build a 3×4 rectangle rotated 30°
    const cos30 = Math.cos(Math.PI / 6);
    const sin30 = Math.sin(Math.PI / 6);
    // Start at origin, walk 3m at 30°, then 4m at 120°, then back
    const W = 3, H = 4;
    const v0 = { x: 0, y: 0 };
    const v1 = { x: v0.x + W * cos30, y: v0.y + W * sin30 };
    const v2 = { x: v1.x - H * sin30, y: v1.y + H * cos30 };
    const v3 = { x: v0.x - H * sin30, y: v0.y + H * cos30 };
    const room = { id: "rd4", closed: true, verts: [v0, v1, v2, v3] };
    if (!isRectangle(room)) throw new Error("Expected isRectangle for tilted rect");
    const d = rectDims(room);
    if (!d) throw new Error("Expected non-null from rectDims for tilted rect");
    const sides = [d.w, d.h].sort((a, b) => a - b);
    expect(sides[0]).toBeCloseTo(W, 5);
    expect(sides[1]).toBeCloseTo(H, 5);
  });

  it("returns null for a non-rectangle (triangle)", () => {
    const room = { id: "rd5", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 2, y: 3 }
    ]};
    const d = rectDims(room);
    if (d !== null) throw new Error("Expected null for triangle");
  });

  it("returns null for an open polyline", () => {
    const room = { id: "rd6", closed: false, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 3 }, { x: 0, y: 3 }
    ]};
    const d = rectDims(room);
    if (d !== null) throw new Error("Expected null for open polyline");
  });

  it("returns null for an L-shape (5 verts)", () => {
    const room = { id: "rd7", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 2 },
      { x: 2, y: 2 }, { x: 2, y: 4 }
    ]};
    const d = rectDims(room);
    if (d !== null) throw new Error("Expected null for L-shape");
  });
});

// ─── Tests: LLD 82 — measure W×H block (DOM rig) ─────────────────────────────

/**
 * Build a minimal DOM rig for W×H block tests.
 * Includes the W×H elements and injects a mock getSelectedRoomId + historyCommit.
 */
function makeWxhRig(getSelectedRoomIdFn) {
  const panel = document.createElement("aside");
  panel.className = "measure";
  const total = document.createElement("div");
  total.className = "measure-total";
  const list = document.createElement("div");
  list.className = "measure-list";
  const toggle = document.createElement("button");
  toggle.className = "measure-toggle";
  toggle.setAttribute("aria-expanded", "true");
  // W×H block
  const wxhBox = document.createElement("div");
  wxhBox.className = "measure-wxh";
  wxhBox.hidden = true;
  const wxhW = document.createElement("input");
  wxhW.className = "measure-wxh-w";
  const wxhH = document.createElement("input");
  wxhH.className = "measure-wxh-h";
  const wxhUnit = document.createElement("span");
  wxhUnit.className = "measure-wxh-unit";
  const wxhApply = document.createElement("button");
  wxhApply.className = "measure-wxh-apply";
  wxhBox.appendChild(wxhW);
  wxhBox.appendChild(wxhH);
  wxhBox.appendChild(wxhUnit);
  wxhBox.appendChild(wxhApply);
  panel.appendChild(total);
  panel.appendChild(wxhBox);
  panel.appendChild(list);
  panel.appendChild(toggle);
  document.body.appendChild(panel);

  let commitCount = 0;
  const historyCommitFn = () => { commitCount++; };

  measureSetSelectedRoomAccessor(getSelectedRoomIdFn);
  measureSetHistoryCommit(historyCommitFn);

  initMeasure({ panel, list, total, toggle, wxhBox, wxhW, wxhH, wxhUnit, wxhApply });

  return {
    panel, list, total, toggle, wxhBox, wxhW, wxhH, wxhUnit, wxhApply,
    getCommitCount: () => commitCount,
    cleanup() {
      document.body.removeChild(panel);
      // Reset injected accessors to avoid cross-test leakage
      measureSetSelectedRoomAccessor(null);
      measureSetHistoryCommit(null);
    }
  };
}

// ─── Tests: LLD 82 — blur relatedTarget guard (timer-race fix) ───────────────
//
// _onWxHBlur now uses relatedTarget instead of a 150ms timer so the two-field
// flow (type W, Tab to H, type H, click Set) never reverts W before Apply runs.
// These tests exercise the guard using synthetic FocusEvent with relatedTarget.

describe("LLD 82 — blur relatedTarget guard: tab between fields preserves values", () => {
  it("blur W to H (relatedTarget = H input) → W value is NOT restored", () => {
    resetModel();
    setUnit("m");
    model.rooms.push({ id: "blt1", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 3 }, { x: 0, y: 3 }
    ]});
    const rig = makeWxhRig(() => "blt1");
    measureUpdate();
    // User types a new value in W
    rig.wxhW.value = "7.77";
    // Simulate blur from W with relatedTarget = H (tab-between-fields)
    const blurEvent = new FocusEvent("blur", { bubbles: true, relatedTarget: rig.wxhH });
    rig.wxhW.dispatchEvent(blurEvent);
    // W must NOT be restored to "4.00"
    if (rig.wxhW.value !== "7.77") {
      throw new Error(`W was restored (timer-race regression): expected 7.77, got ${rig.wxhW.value}`);
    }
    rig.cleanup();
    resetModel();
    setUnit("ft");
  });

  it("blur W to Apply button (relatedTarget = Apply) → W value is NOT restored", () => {
    resetModel();
    setUnit("m");
    model.rooms.push({ id: "blt2", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 3 }, { x: 0, y: 3 }
    ]});
    const rig = makeWxhRig(() => "blt2");
    measureUpdate();
    rig.wxhW.value = "9.99";
    // Blur with relatedTarget = Apply button (click-Set path)
    const blurEvent = new FocusEvent("blur", { bubbles: true, relatedTarget: rig.wxhApply });
    rig.wxhW.dispatchEvent(blurEvent);
    if (rig.wxhW.value !== "9.99") {
      throw new Error(`W was restored before Set fired: expected 9.99, got ${rig.wxhW.value}`);
    }
    rig.cleanup();
    resetModel();
    setUnit("ft");
  });

  it("blur W to outside element (relatedTarget = external element) → W IS restored", () => {
    resetModel();
    setUnit("m");
    model.rooms.push({ id: "blt3", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 3 }, { x: 0, y: 3 }
    ]});
    const rig = makeWxhRig(() => "blt3");
    measureUpdate();
    rig.wxhW.value = "9.99";
    // Blur with relatedTarget = something outside wxhBox
    const external = document.createElement("button");
    document.body.appendChild(external);
    const blurEvent = new FocusEvent("blur", { bubbles: true, relatedTarget: external });
    rig.wxhW.dispatchEvent(blurEvent);
    // W SHOULD be restored to "4.00" (abandonment)
    if (rig.wxhW.value !== "4.00") {
      throw new Error(`W was not restored on abandonment: expected 4.00, got ${rig.wxhW.value}`);
    }
    document.body.removeChild(external);

  });

  it("rejects entry that is not an object", () => {

  });

  it("rejects entry missing 'a'", () => {

  it("rejects entry missing 'b'", () => {

  it("rejects entry with non-finite a.x", () => {
    resetAll();
    const p = buildPlan();

  });

describe("LLD 92 — measureTool._resolvePoint: wall vertex snap", () => {
  it("snaps to wall vertex within SNAP_PT_PX", () => {
    resetForResolvePoint();
    // Vertex at world (5, 5) → screen (200, 200) at zoom=1
    model.rooms.push({ id: "r0", closed: false, verts: [{ x: 5, y: 5 }] });
    // Query at screen (205, 200) → 5px from vertex
    const pt = resolvePoint(205, 200);
    expect(pt.x).toBeCloseTo(5, 9);
    expect(pt.y).toBeCloseTo(5, 9);
    resetForResolvePoint();
  });

  it("does NOT snap to vertex beyond SNAP_PT_PX — falls to grid (non-integer vertex)", () => {
    resetForResolvePoint();
    // Non-integer vertex at world (1.7, 1.0) → screen (68, 40)
    // Query at screen (85, 40) → dist = 17px > 15px → beyond tolerance
    // Falls to grid (step=0.25): world (85/40, 40/40) = (2.125, 1.0)
    //   x: Math.round(2.125/0.25)*0.25 = Math.round(8.5)*0.25 = 9*0.25 = 2.25
    //   y: Math.round(1.0/0.25)*0.25  = 4*0.25 = 1.0
    model.rooms.push({ id: "r0", closed: false, verts: [{ x: 1.7, y: 1.0 }] });
    const pt = resolvePoint(85, 40);
    // Should NOT be the vertex (1.7, 1.0)
    if (Math.abs(pt.x - 1.7) < 0.001 && Math.abs(pt.y - 1.0) < 0.001) {
      throw new Error("Snapped to vertex that was beyond SNAP_PT_PX tolerance");
    }
    expect(pt.x).toBeCloseTo(2.25, 9);
    expect(pt.y).toBeCloseTo(1.0, 9);
    resetForResolvePoint();
  });
});

describe("LLD 92 — measureTool: two-click create", () => {
  it("first click sets pendingA (getDraft non-null); second click commits measurement", () => {
    resetMeasureTool();
    measureActivate();
    // First click at screen (0,0) → world (0,0)
    onMeasureDown(0, 0);
    const draft = getDraft();
    if (draft === null) throw new Error("getDraft() should be non-null after first click");
    expect(measurementsModel.measurements.length).toBe(0); // nothing committed yet
    // Second click at a different location: screen (200,0) → world (5,0)
    onMeasureDown(200, 0);
    const draft2 = getDraft();
    if (draft2 !== null) throw new Error("getDraft() should be null after commit");
    expect(measurementsModel.measurements.length).toBe(1);
    resetMeasureTool();
  });

  it("third click starts a new measurement (tool stays active after commit)", () => {
    resetMeasureTool();
    measureActivate();
    onMeasureDown(0, 0);
    onMeasureDown(200, 0); // commit first
    expect(measurementsModel.measurements.length).toBe(1);
    // Third click: starts pendingA for second measurement
    onMeasureDown(80, 0);
    const draft = getDraft();
    if (draft === null) throw new Error("getDraft() should be non-null — tool starts next measurement");
    expect(measurementsModel.measurements.length).toBe(1); // still just 1 committed
    resetMeasureTool();
  });

  it("draft present after first click and cleared after Escape", () => {
    resetMeasureTool();
    measureActivate();
    onMeasureDown(0, 0);
    if (getDraft() === null) throw new Error("Draft should exist after first click");
    // Escape is handled by measureTool's own keydown listener (registered by measureToolInitStubs)
    window.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
    if (getDraft() !== null) throw new Error("Draft should be cleared after Escape");
    expect(measurementsModel.measurements.length).toBe(0);
    resetMeasureTool();
  });

  it("zero-length second click does not commit and preserves pendingA", () => {
    resetMeasureTool();
    measureActivate();
    onMeasureDown(0, 0); // A
    onMeasureDown(0, 0); // B at same point → reject (zero-length)
    if (getDraft() === null) throw new Error("Draft should persist after zero-length rejection");
    expect(measurementsModel.measurements.length).toBe(0);
    resetMeasureTool();
  });
});

const NS_SVG_92 = "http://www.w3.org/2000/svg";

/**
 * Build a minimal DOM rig for measureRender tests.
 * Each test creates its own rig (isolated DOM). cleanup() removes it.
 */
function makeMeasureRenderRig(opts = {}) {
  const svg = document.createElementNS(NS_SVG_92, "svg");
  const gMeasure = document.createElementNS(NS_SVG_92, "g");
  gMeasure.id = "measure";
  svg.appendChild(gMeasure);
  const overlay = document.createElement("div");
  overlay.className = "dim-labels";
  document.body.appendChild(svg);
  document.body.appendChild(overlay);

  initMeasureRender(
    gMeasure,
    overlay,
    opts.getMeasurements || (() => measurementsModel.measurements),
    opts.getDraft        || (() => null),
    opts.getSelectedId   || (() => null),
  );

  return {
    gMeasure,
    overlay,
    cleanup() {
      document.body.removeChild(svg);
      document.body.removeChild(overlay);
    },
  };
}

describe("LLD 92 — measureRender: committed measurement produces line + ticks + nodes + chip", () => {
  it("renders main line + two perpendicular ticks + two endpoint nodes + one .measure-chip", () => {
    hydrateMeasurements({ measurements: [] });
    view.zoom = 1; view.panX = 0; view.panY = 0;
    setUnit("m");
    addMeasurement({ x: 0, y: 0 }, { x: 5, y: 0 });
    const rig = makeMeasureRenderRig();
    measureRender();

    // 1 main line + 2 tick lines = 3 total; plus 2 node circles
    const lines = rig.gMeasure.querySelectorAll("line");
    if (lines.length < 3) throw new Error(`Expected ≥3 <line> elements (1 main + 2 ticks), got ${lines.length}`);
    const circles = rig.gMeasure.querySelectorAll("circle");
    if (circles.length < 2) throw new Error(`Expected ≥2 endpoint node circles, got ${circles.length}`);

    // One .measure-chip in overlay
    const chips = rig.overlay.querySelectorAll(".measure-chip");
    if (chips.length !== 1) throw new Error(`Expected 1 .measure-chip, got ${chips.length}`);

    rig.cleanup();
    hydrateMeasurements({ measurements: [] });
  });

  it("chip text equals fmtLen(len) + ' ' + unitLabel()", () => {
    hydrateMeasurements({ measurements: [] });
    view.zoom = 1; view.panX = 0; view.panY = 0;
    setUnit("m");
    addMeasurement({ x: 0, y: 0 }, { x: 3, y: 4 }); // 5m 3-4-5 triangle
    const rig = makeMeasureRenderRig();
    measureRender();
    const chip = rig.overlay.querySelector(".measure-chip");
    if (!chip) throw new Error("No .measure-chip found");
    const expected = fmtLen(5) + " " + unitLabel();
    if (chip.textContent !== expected) {
      throw new Error(`Chip text "${chip.textContent}" != expected "${expected}"`);
    }
    rig.cleanup();
    hydrateMeasurements({ measurements: [] });
  });

  it("chip text changes after unit toggle (reactive to unit, not stored coords)", () => {
    hydrateMeasurements({ measurements: [] });
    view.zoom = 1; view.panX = 0; view.panY = 0;
    setUnit("m");
    addMeasurement({ x: 0, y: 0 }, { x: 3, y: 4 }); // 5m
    const rig = makeMeasureRenderRig();

    measureRender();
    const textBeforeToggle = (rig.overlay.querySelector(".measure-chip") || {}).textContent || "";

    setUnit("ft");
    measureRender();
    const textAfterToggle = (rig.overlay.querySelector(".measure-chip") || {}).textContent || "";

    if (textBeforeToggle === textAfterToggle) {
      throw new Error("Chip text should change after unit toggle m→ft");
    }
    if (!textAfterToggle.includes("ft")) {
      throw new Error(`Expected 'ft' in chip text after toggle, got: "${textAfterToggle}"`);
    }

    setUnit("ft"); // restore (already ft)
    rig.cleanup();
    hydrateMeasurements({ measurements: [] });
  });
});

// Helper: reset model + roomTool state for LLD 96 tests.
function _resetRT96() {
  view.zoom = 1; view.panX = 0; view.panY = 0;
  model.rooms.length = 0;
  model.chain.length = 0;
  symbolModel.symbols.length = 0;
  setGridSnap(true);
  setSnapMode("off");
}

// Helper: build a spy commit for LLD 96 tests.
function _spyCommit96() {
  let count = 0;
  const spy = () => { count++; };
  spy.callCount = () => count;
  return spy;
}

// Helper: wire a fresh roomTool with spy commit.
function _initRT96(spy) {
  roomSetHistoryAndToast({ commit: spy || (() => {}) }, () => {});
  roomSetClearSymbolSelection(() => {});
  initRoomTool({ stage: document.createElement("div") });
}

const LLD104_TYPES = ["monitor", "gaming-chair"];

describe("LLD-104 — catalog integrity: monitor and gaming-chair", () => {
  it("both types exist in CATALOG with category 'living'", () => {
    for (const t of LLD104_TYPES) {
      if (!(t in CATALOG)) throw new Error(t + " missing from CATALOG");
      if (CATALOG[t].category !== "living") throw new Error(t + " category should be 'living', got '" + CATALOG[t].category + "'");
    }
  });

  it("both types have a non-empty label", () => {
    for (const t of LLD104_TYPES) {
      const label = CATALOG[t].label;
      if (!label || label.trim() === "") throw new Error(t + " has empty label");
    }
  });

  it("both types have finite w, h, and per-axis bounds", () => {
    for (const t of LLD104_TYPES) {
      const cat = CATALOG[t];
      for (const key of ["w", "h", "min_w", "max_w", "min_h", "max_h"]) {
        if (!isFinite(cat[key])) throw new Error(t + "." + key + " is not finite: " + cat[key]);
      }
    }
  });

  it("min_w <= w <= max_w and min_h <= h <= max_h for both types", () => {
    for (const t of LLD104_TYPES) {
      const { w, h, min_w, max_w, min_h, max_h } = CATALOG[t];
      if (w < min_w || w > max_w) throw new Error(t + ": w=" + w + " not in [" + min_w + "," + max_w + "]");
      if (h < min_h || h > max_h) throw new Error(t + ": h=" + h + " not in [" + min_h + "," + max_h + "]");
    }
  });

  it("neither type has openings:true", () => {
    for (const t of LLD104_TYPES) {
      if (CATALOG[t].openings) throw new Error(t + " unexpectedly has openings:true");

describe("LLD 107 — computeClearances: rug neighbour guard", () => {

    const sofa = mkSym("s1", "sofa", 5, 5, 2.0, 0.9);

    const worldWithRug    = { rooms: [], symbols: [sofa, rug] };
    const worldWithoutRug = { rooms: [], symbols: [sofa] };

    const resultWith    = computeClearances(sofa, worldWithRug);
    const resultWithout = computeClearances(sofa, worldWithoutRug);

    // The rug should never appear as a neighbour in the result
    const rugEntry = resultWith.find((c) => c.neighbourId === "r1");
    if (rugEntry) throw new Error("rug appeared as a clearance neighbour");

  });

  it("worldToScreenIso is linear in wx", () => {
    view128.zoom = 1; view128.panX = 100; view128.panY = 50;
    const a = worldToScreenIso(0, 1, 0);
    const b = worldToScreenIso(1, 1, 0);
    const c = worldToScreenIso(2, 1, 0);
    // Linearity: c - b ≈ b - a
    expect(c.x - b.x).toBeCloseTo(b.x - a.x, 6);
    expect(c.y - b.y).toBeCloseTo(b.y - a.y, 6);
  });

  it("worldToScreenIso is linear in wy", () => {
    view128.zoom = 1; view128.panX = 0; view128.panY = 0;
    const a = worldToScreenIso(1, 0, 0);
    const b = worldToScreenIso(1, 1, 0);
    const c = worldToScreenIso(1, 2, 0);
    expect(c.x - b.x).toBeCloseTo(b.x - a.x, 6);
    expect(c.y - b.y).toBeCloseTo(b.y - a.y, 6);
  });

  it("worldToScreenIso is linear in wz", () => {
    view128.zoom = 1; view128.panX = 0; view128.panY = 0;
    const a = worldToScreenIso(1, 1, 0);
    const b = worldToScreenIso(1, 1, 1);

    expect(c.y - b.y).toBeCloseTo(b.y - a.y, 6);
  });
});

// ── Unit: extrudeFootprint ────────────────────────────────────────────────────

describe("LLD 128 — extrudeFootprint", () => {
  it("returns correct face roles for a 4-corner footprint", () => {
    view128.zoom = 1; view128.panX = 0; view128.panY = 0;
    // Axis-aligned square
    const fp = [
      { x: 0, y: 0 },
      { x: 2, y: 0 },
      { x: 2, y: 2 },
      { x: 0, y: 2 },
    ];
    const faces = extrudeFootprint(fp, 0, 1);
    const roles = faces.map(f => f.role);
    // Must have exactly 1 top face
    const tops = roles.filter(r => r === "top");
    if (tops.length !== 1) throw new Error("Expected exactly 1 top face, got " + tops.length);
    // Must have bottom
    const bottoms = roles.filter(r => r === "bottom");
    if (bottoms.length !== 1) throw new Error("Expected exactly 1 bottom face, got " + bottoms.length);
    // Must have EXACTLY 2 camera-facing side faces (back-face culling). A
    // weakened `>= 2` here previously masked a culling no-op that rendered all
    // four side faces (rear faces bled through). Assert the exact count.
    const sides = roles.filter(r => r === "left" || r === "right");
    if (sides.length !== 2) throw new Error("Expected exactly 2 side faces, got " + sides.length);
  });

  it("culls to exactly 2 sides regardless of winding (CW footprint)", () => {
    // Walls (_wallQuad) wind CW, furniture (corners) winds CCW — opposite of
    // the CCW square above. Centroid-based normals must cull both to the same
    // 2 camera-facing faces (one left, one right). Guards against a fixed-normal
    // regression that would render the rear faces of every wall.
    view128.zoom = 1; view128.panX = 0; view128.panY = 0;
    const cw = [
      { x: 0, y: 0 },
      { x: 0, y: 2 },
      { x: 2, y: 2 },
      { x: 2, y: 0 },
    ];
    const roles = extrudeFootprint(cw, 0, 1).map(f => f.role);
    const sides = roles.filter(r => r === "left" || r === "right");
    if (sides.length !== 2) throw new Error("CW footprint: expected exactly 2 side faces, got " + sides.length);
    if (!roles.includes("left") || !roles.includes("right")) {
      throw new Error("CW footprint: expected one left + one right face, got " + JSON.stringify(roles));
    }
  });

  it("each face has >= 3 pts", () => {
    view128.zoom = 1; view128.panX = 0; view128.panY = 0;
    const fp = [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: 1 }, { x: 0, y: 1 }];
    const faces = extrudeFootprint(fp, 0, 1);
    for (const f of faces) {
      if (f.pts.length < 3) throw new Error(`Face ${f.role} has < 3 pts`);
    }
  });

  it("returns empty array for degenerate footprint (< 3 corners)", () => {
    const faces = extrudeFootprint([{ x: 0, y: 0 }, { x: 1, y: 1 }], 0, 1);
    if (faces.length !== 0) throw new Error("Expected empty array for < 3 corners");
  });

  it("top face pts have lower y (higher) than bottom face pts for z1 > z0", () => {
    view128.zoom = 1; view128.panX = 0; view128.panY = 0;
    const fp = [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: 1 }, { x: 0, y: 1 }];
    const faces = extrudeFootprint(fp, 0, 2);
    const topFace = faces.find(f => f.role === "top");
    const bottomFace = faces.find(f => f.role === "bottom");
    if (!topFace || !bottomFace) throw new Error("Missing top or bottom face");
    const topAvgY = topFace.pts.reduce((s, p) => s + p.y, 0) / topFace.pts.length;
    const botAvgY = bottomFace.pts.reduce((s, p) => s + p.y, 0) / bottomFace.pts.length;
    if (topAvgY >= botAvgY) throw new Error("Top face should be higher (lower y) than bottom face");
  });
});

describe("LLD 128 — shade", () => {
  it("factor=1.0 returns same color", () => {
    const c = shade("#c9a84c", 1.0);
    // Should produce rgb(201,168,76)
    if (!c.startsWith("rgb(")) throw new Error("shade should return rgb()");
    const m = c.match(/rgb\((\d+),(\d+),(\d+)\)/);
    if (!m) throw new Error("shade output not parseable: " + c);
    expect(parseInt(m[1], 10)).toBe(201);
    expect(parseInt(m[2], 10)).toBe(168);
    expect(parseInt(m[3], 10)).toBe(76);
  });

  it("factor=0.72 produces darker values", () => {
    const base = "#c9a84c";
    const darker = shade(base, 0.72);
    const baseM = base.match(/^#([0-9a-fA-F]{2})([0-9a-fA-F]{2})([0-9a-fA-F]{2})$/);
    const darkM = darker.match(/rgb\((\d+),(\d+),(\d+)\)/);
    if (!darkM) throw new Error("shade 0.72 output not parseable: " + darker);
    if (parseInt(darkM[1], 10) >= parseInt(baseM[1], 16)) {
      throw new Error("shade(0.72) r channel should be <= original");
    }
  });

  it("shade is deterministic (same input → same output)", () => {
    const a = shade("#a09060", 0.58);
    const b = shade("#a09060", 0.58);
    expect(a).toBe(b);
  });

  it("small factor → smaller result than large factor", () => {
    const small = shade("#808080", 0.3);
    const large = shade("#808080", 0.9);
    const sm = small.match(/rgb\((\d+)/)[1];
    const lg = large.match(/rgb\((\d+)/)[1];
    if (parseInt(sm, 10) >= parseInt(lg, 10)) throw new Error("smaller factor should produce smaller value");
  });
});

describe("LLD 128 — toOpaqueRgb", () => {
  it("passes an opaque hex through as rgb()", () => {
    const out = toOpaqueRgb("#d9be6e", "#14140f");
    const m = out.match(/^rgb\((\d+),(\d+),(\d+)\)$/);
    if (!m) throw new Error("Expected rgb() output, got: " + out);
    expect(parseInt(m[1], 10)).toBe(217);
    expect(parseInt(m[2], 10)).toBe(190);
    expect(parseInt(m[3], 10)).toBe(110);
  });

  it("composites rgba(r,g,b,a) over bg to an opaque color", () => {
    // rgba(255,0,0,0.5) over #000000 → rgb(128,0,0)
    const out = toOpaqueRgb("rgba(255,0,0,0.5)", "#000000");
    if (out.includes("rgba")) throw new Error("Output must not contain rgba: " + out);
    const m = out.match(/rgb\((\d+),(\d+),(\d+)\)/);
    if (!m) throw new Error("Expected rgb(), got: " + out);
    // R ≈ 128, G/B = 0
    if (parseInt(m[1], 10) < 120 || parseInt(m[1], 10) > 135)
      throw new Error("Expected ~128 for R channel, got " + m[1]);
    expect(parseInt(m[2], 10)).toBe(0);
    expect(parseInt(m[3], 10)).toBe(0);
  });

  it("rgba with alpha=1 returns fully opaque", () => {
    const out = toOpaqueRgb("rgba(100,200,50,1)", "#14140f");
    if (out.includes("rgba")) throw new Error("Should not be rgba: " + out);
    const m = out.match(/rgb\((\d+),(\d+),(\d+)\)/);
    if (!m) throw new Error("Expected rgb(), got: " + out);
    expect(parseInt(m[1], 10)).toBe(100);
    expect(parseInt(m[2], 10)).toBe(200);
    expect(parseInt(m[3], 10)).toBe(50);
  });
});

    if (!topLow || !topHigh) throw new Error("Missing top face");

    const avgYLow  = topLow.pts.reduce((s, p) => s + p.y, 0) / topLow.pts.length;
    const avgYHigh = topHigh.pts.reduce((s, p) => s + p.y, 0) / topHigh.pts.length;

    if (avgYHigh >= avgYLow)

    // Minimal check: the last polygon exists and the scene has depth ordering.

describe("LLD 128 — preview state module", () => {
  it("isActive() starts false", () => {
    // preview is session state; reset by reading initial state
    // (module may be already toggled by earlier test run — use setActive to reset)
    previewSetActive(false);
    if (previewIsActive() !== false) throw new Error("Expected isActive() to start false");
  });

  it("setActive(true) flips isActive()", () => {
    previewSetActive(false);
    previewSetActive(true);
    if (!previewIsActive()) throw new Error("Expected isActive() to be true after setActive(true)");
    previewSetActive(false);
  });

  it("toggle() flips isActive()", () => {
    previewSetActive(false);
    previewToggle();
    if (!previewIsActive()) throw new Error("Expected isActive() true after first toggle");
    previewToggle();
    if (previewIsActive()) throw new Error("Expected isActive() false after second toggle");
  });

  it("onChange fires when state changes", () => {
    previewSetActive(false);
    let count = 0;
    const unsub = null; // no unsubscribe mechanism — use a flag
    previewOnChange(() => { count++; });
    previewSetActive(true);
    previewSetActive(false);
    if (count < 2) throw new Error(`Expected onChange to fire >= 2 times, fired ${count}`);
    previewSetActive(false); // cleanup
  });

  it("setActive with same value does not fire onChange", () => {
    previewSetActive(false);
    let count = 0;
    previewOnChange(() => { count++; });
    previewSetActive(false); // same value
    if (count !== 0) throw new Error("onChange should not fire when value unchanged");
  });

  it("dock drag-placement is a no-op while preview is active (read-only guarantee)", () => {
    // Read-only leak regression (LLD 128 edge case 10): #symbol-dock is a sibling
    // of #stage, so the .stage--preview CSS can't reach it — _onDockPointerDown
    // must itself early-return on previewIsActive(), or a dock drag would add a
    // symbol to the plan while "view-only" preview is showing.
    const stage = document.createElement("div");
    stage.setPointerCapture = () => {};
    const dock = document.createElement("div");
    dock.setPointerCapture = () => {};
    const inspector = document.createElement("div");
    const item = document.createElement("button");
    item.className = "dock-item";
    item.setAttribute("data-type", "chair");
    dock.appendChild(item);
    document.body.appendChild(stage);
    document.body.appendChild(dock);
    document.body.appendChild(inspector);

    initSymbolTool({ stage, dock, inspector, setTool: () => {}, isDrawMode: () => false });

    symbolModel.symbols.length = 0;
    previewSetActive(true);

    // Simulate the start of a dock drag on the chair item.
    item.dispatchEvent(new PointerEvent("pointerdown", {
      bubbles: true, cancelable: true, pointerId: 42,
      clientX: 100, clientY: 100, pointerType: "mouse", buttons: 1,
    }));
    // And a drop, which is where createSymbol/addSymbol would fire if unguarded.
    dock.dispatchEvent(new PointerEvent("pointerup", {
      bubbles: true, cancelable: true, pointerId: 42,
      clientX: 200, clientY: 200, pointerType: "mouse",
    }));

    const leaked = symbolModel.symbols.length;

    previewSetActive(false);
    symbolModel.symbols.length = 0;
    document.body.removeChild(stage);
    document.body.removeChild(dock);
    document.body.removeChild(inspector);

    if (leaked !== 0) throw new Error(`Dock drag mutated the plan during preview: added ${leaked} symbol(s)`);
  });
});

          { id: "s1", type: "bed",  x: 1, y: 2.0, w: 1.52, h: 2.03, rot: 0 },
        ],
      },
      measurements: [],
      view: { zoom: 1, panX: 0, panY: 0 },
      unit: "m",
    };

    const validated = validatePlan(oldPlan);
    if (!validated) throw new Error("validatePlan should accept a pre-LLD-128 plan");

    // Symbols should NOT have z in the serialized shape
    for (const sym of validated.symbols.symbols) {
      if ("z" in sym) throw new Error(`Symbol ${sym.id} unexpectedly has z field after validatePlan`);
    }
  });

  it("buildCompact → parseCompact → validatePlan produces symbols with no z", () => {
    // Seed a minimal plan
    const oldPlan = {
      schema: 1,
      app: "floorplan",
      walls: { rooms: [_makeRect128(0, 0, 4, 3)], chain: [] },
      symbols: { symbols: [{ id: "s0", type: "sofa", x: 2, y: 1.5, w: 2.0, h: 0.90, rot: 0 }] },
      measurements: [],
      view: { zoom: 1, panX: 0, panY: 0 },
      unit: "m",
    };
    const validated0 = validatePlan(oldPlan);
    if (!validated0) throw new Error("validatePlan failed for seed plan");

    const compact = buildCompact(validated0);
    const parsed = parseCompact(compact);
    if (!parsed) throw new Error("parseCompact returned null");
    const validated2 = validatePlan(parsed);
    if (!validated2) throw new Error("validatePlan failed after parseCompact");

    for (const sym of validated2.symbols.symbols) {
      if ("z" in sym) throw new Error(`Symbol ${sym.id} has z after compact round-trip`);
    }
  });
});

// ── Unit: buildSceneDescriptors (pure, no three.js, headless) ────────────────

describe("LLD 130 — buildSceneDescriptors", () => {
  it("closed room + non-rug symbol → wall boxes + furniture box + floor slab", () => {
    const wallsMod = { rooms: [_makeRect128(0, 0, 4, 3)], chain: [] };
    const symMod   = { symbols: [{ id: "s1", type: "sofa", x: 2, y: 1.5, w: 2.0, h: 0.90, rot: 0 }] };
    const items = buildItems(wallsMod, symMod);
    const { descriptors } = buildSceneDescriptors(items, wallsMod, "#333333");

    const walls = descriptors.filter(d => d.kind === "wall");
    const furniture = descriptors.filter(d => d.kind === "furniture");
    const floors = descriptors.filter(d => d.kind === "floor");
    if (walls.length !== 4) throw new Error(`Expected 4 wall box descriptors, got ${walls.length}`);
    if (furniture.length !== 1) throw new Error(`Expected 1 furniture descriptor, got ${furniture.length}`);
    if (floors.length !== 1) throw new Error(`Expected 1 floor slab descriptor, got ${floors.length}`);
  });

  it("wall descriptors are boxes: flat:false, z0=0, z1=CEILING_M", () => {
    const wallsMod = { rooms: [_makeRect128(0, 0, 4, 3)], chain: [] };
    const { descriptors } = buildSceneDescriptors(buildItems(wallsMod, { symbols: [] }), wallsMod, "#333");
    for (const d of descriptors.filter(x => x.kind === "wall")) {
      if (d.flat !== false) throw new Error("wall descriptor should have flat:false");
      if (d.z0 !== 0) throw new Error("wall z0 should be 0");
      if (d.z1 !== CEILING_M) throw new Error("wall z1 should be CEILING_M");
    }
  });

  it("furniture box: flat:false and z1 = catalog z (> 0)", () => {
    const sym = { id: "s1", type: "sofa", x: 2, y: 2, w: 2.0, h: 0.90, rot: 0 };
    const items = buildItems({ rooms: [], chain: [] }, { symbols: [sym] });
    const { descriptors } = buildSceneDescriptors(items, { rooms: [] }, "#333");
    const f = descriptors.find(d => d.kind === "furniture");
    if (!f) throw new Error("Expected a furniture descriptor");
    if (f.flat !== false) throw new Error("furniture should have flat:false");
    if (f.z1 !== CATALOG128.sofa.z) throw new Error(`furniture z1 should be ${CATALOG128.sofa.z}, got ${f.z1}`);
    if (!(f.z1 > 0)) throw new Error("furniture z1 should be > 0");
  });

  it("rug is a flat decal: flat:true and z1 ≈ z0", () => {
    const sym = { id: "s2", type: "rug", x: 2, y: 2, w: 2.44, h: 3.05, rot: 0 };
    const items = buildItems({ rooms: [], chain: [] }, { symbols: [sym] });
    const { descriptors } = buildSceneDescriptors(items, { rooms: [] }, "#333");
    const rug = descriptors.find(d => d.kind === "rug");
    if (!rug) throw new Error("Expected a rug descriptor");
    if (rug.flat !== true) throw new Error("rug should have flat:true");
    if (Math.abs(rug.z1 - rug.z0) > 1e-6) throw new Error("rug z1 should ≈ z0 (flat)");
  });

  it("open room contributes no walls and no floor slab; closed one does", () => {
    const wallsMod = {
      rooms: [
        { id: "open", closed: false, verts: [{ x: 0, y: 0 }, { x: 2, y: 0 }, { x: 2, y: 2 }] },
        _makeRect128(5, 5, 9, 8),
      ],
      chain: [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: 1 }],
    };
    const { descriptors } = buildSceneDescriptors(buildItems(wallsMod, { symbols: [] }), wallsMod, "#333");
    const walls = descriptors.filter(d => d.kind === "wall");
    const floors = descriptors.filter(d => d.kind === "floor");
    if (walls.length !== 4) throw new Error(`Expected 4 walls (closed room only), got ${walls.length}`);
    if (floors.length !== 1) throw new Error(`Expected 1 floor slab (closed room only), got ${floors.length}`);
  });

  it("all descriptor colors are opaque (no rgba)", () => {
    const wallsMod = { rooms: [_makeRect128(0, 0, 4, 3)], chain: [] };
    const symMod = { symbols: [{ id: "s1", type: "sofa", x: 2, y: 2, w: 2.0, h: 0.90, rot: 0 }] };
    const { descriptors } = buildSceneDescriptors(buildItems(wallsMod, symMod), wallsMod, "rgb(51,51,51)");
    for (const d of descriptors) {
      if (typeof d.color !== "string" || d.color.includes("rgba")) {
        throw new Error(`descriptor ${d.kind} color not opaque: ${d.color}`);
      }
    }
  });

  it("two different categories yield different colors", () => {
    const sofaSym = { id: "s1", type: "sofa", x: 1, y: 1, w: 2.0, h: 0.90, rot: 0 };   // living
    const fridgeSym = { id: "s2", type: "fridge", x: 3, y: 3, w: 0.76, h: 0.81, rot: 0 }; // kitchen
    const items = buildItems({ rooms: [], chain: [] }, { symbols: [sofaSym, fridgeSym] });
    const { descriptors } = buildSceneDescriptors(items, { rooms: [] }, "#333");
    const sofa = descriptors.find(d => d.kind === "furniture" && d.color);
    const colors = descriptors.filter(d => d.kind === "furniture").map(d => d.color);
    if (colors[0] === colors[1]) throw new Error("sofa (living) and fridge (kitchen) should differ in color");
  });

  it("degenerate footprints are skipped (no descriptor emitted)", () => {
    // A collinear/<3-corner room emits neither a floor slab nor walls; a
    // zero-area symbol footprint emits no box.
    const wallsMod = {
      rooms: [{ id: "line", closed: true, verts: [{ x: 0, y: 0 }, { x: 1, y: 1 }] }], // 2 verts
      chain: [],
    };
    // A degenerate symbol footprint: a zero-size sofa produces a zero-area quad.
    const degenerateSym = { id: "z", type: "sofa", x: 2, y: 2, w: 0, h: 0, rot: 0 };
    const items = buildItems(wallsMod, { symbols: [degenerateSym] });
    const { descriptors } = buildSceneDescriptors(items, wallsMod, "#333");
    for (const d of descriptors) {
      if (d.footprint.length < 3) throw new Error("emitted a descriptor with <3 corners");
    }
    if (descriptors.some(d => d.kind === "floor")) throw new Error("degenerate room should not emit a floor slab");
  });

  it("bounds union all footprint XY with height range [0, max(z1, CEILING_M)]", () => {
    const wallsMod = { rooms: [_makeRect128(0, 0, 4, 3)], chain: [] };
    // A wardrobe (z=2.0 < CEILING) and a symbol won't exceed CEILING_M, so maxZ == CEILING_M.
    const { bounds } = buildSceneDescriptors(buildItems(wallsMod, { symbols: [] }), wallsMod, "#333");
    if (!bounds) throw new Error("Expected non-null bounds");
    // Wall quads extend WALL_M/2 beyond the room rectangle; so minX slightly < 0, maxX slightly > 4.
    if (!(bounds.minX <= 0 && bounds.maxX >= 4)) throw new Error("bounds X did not cover the room");
    if (!(bounds.minY <= 0 && bounds.maxY >= 3)) throw new Error("bounds Y did not cover the room");
    if (bounds.minZ !== 0) throw new Error("bounds minZ should be 0");
    if (bounds.maxZ < CEILING_M - 1e-9) throw new Error("bounds maxZ should be >= CEILING_M");
  });

  it("empty model → bounds === null and no descriptors", () => {
    const { descriptors, bounds } = buildSceneDescriptors([], { rooms: [] }, "#333");
    if (descriptors.length !== 0) throw new Error("Expected no descriptors for empty model");
    if (bounds !== null) throw new Error("Expected bounds === null for empty model");
  });

  it("is read-only: does not mutate the walls/symbols models", () => {
    const wallsMod = { rooms: [_makeRect128(0, 0, 4, 3)], chain: [] };
    const symMod = { symbols: [{ id: "s1", type: "sofa", x: 2, y: 1.5, w: 2.0, h: 0.90, rot: 0 }] };
    const before = JSON.stringify({ wallsMod, symMod });
    buildSceneDescriptors(buildItems(wallsMod, symMod), wallsMod, "#333");
    const after = JSON.stringify({ wallsMod, symMod });
    if (before !== after) throw new Error("buildSceneDescriptors/buildItems mutated the input models");
  });
});

// ── Unit: worldToScene (pure) ────────────────────────────────────────────────

describe("LLD 130 — worldToScene", () => {
  it("maps (x,y,z) → {x, y:z, z:y} (y-down world → y-up scene, height→+Y)", () => {
    const p = worldToScene(3, 5, 2);
    expect(p.x).toBe(3);
    expect(p.y).toBe(2); // world height → scene +Y
    expect(p.z).toBe(5); // world-y (depth) → scene +Z
  });

  it("ground (wz=0) maps to sceneY = 0", () => {
    expect(worldToScene(7, 9, 0).y).toBe(0);
  });

  it("is linear in each argument", () => {
    const a = worldToScene(0, 0, 0);
    const bx = worldToScene(2, 0, 0), cx = worldToScene(4, 0, 0);
    expect(bx.x - a.x).toBeCloseTo(cx.x - bx.x, 9);
    const by = worldToScene(0, 2, 0), cy = worldToScene(0, 4, 0);
    expect(by.z - a.z).toBeCloseTo(cy.z - by.z, 9);
    const bz = worldToScene(0, 0, 2), cz = worldToScene(0, 0, 4);
    expect(bz.y - a.y).toBeCloseTo(cz.y - bz.y, 9);
  });
});

// ── Impure smoke: enter() boots without error / falls back cleanly ───────────
// In the UNIT harness (raw browser, no bundler) the bare "three" specifier in
// render3dEngine.js cannot resolve, so enter() must resolve to a well-formed
// fallback result rather than throwing — the LLD's "boots-without-error /
// falls-back-cleanly" smoke check. It also proves the read-only guarantee: a
// fallback enter()/exit() never mutates the plan.

describe("LLD 130 — render3d enter()/exit() smoke + read-only", () => {
  it("enter() resolves to a well-formed result and never throws", async () => {
    const canvas = document.createElement("canvas");
    let active = true;
    initRender3d130(canvas, () => active, { model: { rooms: [], chain: [] } }, { model: { symbols: [] } }, null);
    const r = await render3dEnter();
    if (!r || typeof r.ok !== "boolean") throw new Error("enter() should resolve to { ok:boolean, ... }");
    // If it fell back, it must say so explicitly.
    if (r.ok === false && r.fallback !== true) throw new Error("a non-ok enter() must set fallback:true");
    active = false;
    render3dExit(); // must not throw even if no engine was built
  });

  it("enter()/exit() leaves the plan models deeply unchanged (read-only)", async () => {
    const wallsMod = { model: { rooms: [_makeRect128(0, 0, 4, 3)], chain: [] } };
    const symMod = { model: { symbols: [{ id: "s1", type: "sofa", x: 2, y: 1.5, w: 2.0, h: 0.90, rot: 0 }] } };
    const before = JSON.stringify({ rooms: wallsMod.model.rooms, symbols: symMod.model.symbols });
    const canvas = document.createElement("canvas");
    let active = true;
    initRender3d130(canvas, () => active, wallsMod, symMod, null);
    await render3dEnter();
    active = false;
    render3dExit();
    const after = JSON.stringify({ rooms: wallsMod.model.rooms, symbols: symMod.model.symbols });
    if (before !== after) throw new Error("preview enter/exit mutated the plan models");
  });
});

// ─── Tests: LLD-139 — fireplace catalog type ──────────────────────────────────

describe("LLD-139 — catalog integrity: fireplace", () => {
  it("fireplace exists in CATALOG with category 'living'", () => {
    if (!("fireplace" in CATALOG)) throw new Error("fireplace missing from CATALOG");
    if (CATALOG.fireplace.category !== "living") throw new Error(`fireplace.category is '${CATALOG.fireplace.category}', expected 'living'`);
  });

  it("fireplace has a non-empty label", () => {
    const label = CATALOG.fireplace.label;
    if (!label || label.trim() === "") throw new Error("fireplace has empty label");
  });

  it("fireplace has finite w, h, min_w, max_w, min_h, max_h, z", () => {
    const cat = CATALOG.fireplace;
    for (const key of ["w", "h", "min_w", "max_w", "min_h", "max_h", "z"]) {
      if (!isFinite(cat[key])) throw new Error(`fireplace.${key} is not finite: ${cat[key]}`);
    }
  });

  it("min_w <= w <= max_w and min_h <= h <= max_h", () => {
    const { w, h, min_w, max_w, min_h, max_h } = CATALOG.fireplace;
    if (w < min_w || w > max_w) throw new Error(`fireplace: w=${w} not in [${min_w},${max_w}]`);
    if (h < min_h || h > max_h) throw new Error(`fireplace: h=${h} not in [${min_h},${max_h}]`);
  });

  it("fireplace is not openings, not circular, not discrete", () => {
    const cat = CATALOG.fireplace;
    if (cat.openings) throw new Error("fireplace unexpectedly has openings:true");
    if (cat.circular) throw new Error("fireplace unexpectedly has circular:true");
    if (cat.discrete) throw new Error("fireplace unexpectedly has discrete:true");
  });

  it("fireplace default dims match the spec (1.30 x 0.40 m)", () => {
    expect(CATALOG.fireplace.w).toBeCloseTo(1.30, 9);
    expect(CATALOG.fireplace.h).toBeCloseTo(0.40, 9);
  });

  it("fireplace z matches the spec (1.10 m)", () => {
    expect(CATALOG.fireplace.z).toBeCloseTo(1.10, 9);
  });
});

describe("LLD-139 — preset validity: fireplace presets within per-axis bounds", () => {
  it("every fireplace preset has name, w, h and lies within per-axis bounds", () => {
    const cat = CATALOG.fireplace;
    if (!cat.presets || cat.presets.length === 0) throw new Error("fireplace has no presets");
    for (const p of cat.presets) {
      if (typeof p.name !== "string" || p.name.trim() === "") throw new Error("fireplace preset has empty name");
      if (!isFinite(p.w) || !isFinite(p.h)) throw new Error(`fireplace preset '${p.name}' has non-finite w/h`);
      if (p.w < cat.min_w || p.w > cat.max_w) throw new Error(`fireplace preset '${p.name}': w=${p.w} not in [${cat.min_w},${cat.max_w}]`);
      if (p.h < cat.min_h || p.h > cat.max_h) throw new Error(`fireplace preset '${p.name}': h=${p.h} not in [${cat.min_h},${cat.max_h}]`);
    }
  });

  it("fireplace has exactly 5 presets", () => {
    expect(CATALOG.fireplace.presets.length).toBe(5);
  });
});

describe("LLD-139 — createSymbol: fireplace returns correct Sym", () => {
  it("createSymbol('fireplace') returns Sym with catalog defaults, rot:0, and s<n> id", () => {
    resetSymbolModel();
    const s = createSymbol("fireplace", 3, 4);
    if (s.type !== "fireplace") throw new Error(`type mismatch: ${s.type}`);
    if (Math.abs(s.w - CATALOG.fireplace.w) > 1e-9) throw new Error(`w mismatch: ${s.w}`);
    if (Math.abs(s.h - CATALOG.fireplace.h) > 1e-9) throw new Error(`h mismatch: ${s.h}`);
    if (s.rot !== 0) throw new Error(`rot should be 0, got ${s.rot}`);
    if (typeof s.id !== "string" || !s.id.startsWith("s")) throw new Error(`invalid id: ${s.id}`);
    resetSymbolModel();
  });
});

describe("LLD-139 — clampDim: fireplace clamps at per-axis bounds", () => {
  it("width below min_w clamps to min_w", () => {
    expect(clampDim("fireplace", "w", CATALOG.fireplace.min_w - 0.1)).toBeCloseTo(CATALOG.fireplace.min_w, 9);

  it("width above max_w clamps to max_w", () => {

  it("depth below min_h clamps to min_h", () => {

  });
  it("depth above max_h clamps to max_h", () => {
    expect(clampDim("fireplace", "h", CATALOG.fireplace.max_h + 1)).toBeCloseTo(CATALOG.fireplace.max_h, 9);
  });
});

describe("LLD-139 — resizeSymbol: fireplace is continuous (not discrete)", () => {
  it("resizeSymbol to in-range value between presets keeps that exact value (no snap)", () => {
    const s = createSymbol("fireplace", 0, 0);

    resizeSymbol(s, "w", targetW);

describe("LLD-139 — JSON round-trip: fireplace serializes and hydrates losslessly", () => {
  it("placed fireplace round-trips through JSON with type, w, h, rot, id preserved", () => {
    resetSymbolModel();
    const s = createSymbol("fireplace", 2, 3);
    addSymbol(s);
    const snap = JSON.parse(JSON.stringify(symbolModel));
    const rt = snap.symbols[0];
    if (rt.type !== "fireplace") throw new Error(`type not preserved: ${rt.type}`);
    if (Math.abs(rt.w - s.w) > 1e-9) throw new Error(`w not preserved: ${rt.w}`);
    if (Math.abs(rt.h - s.h) > 1e-9) throw new Error(`h not preserved: ${rt.h}`);
    if (rt.rot !== s.rot) throw new Error(`rot not preserved: ${rt.rot}`);
    if (rt.id !== s.id) throw new Error(`id not preserved: ${rt.id}`);
    resetSymbolModel();
  });
});
