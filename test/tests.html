    // A: X only, gap 0.02 (A.minX=2.02); A.Y far.
    // B: both axes, best-axis gap 0.06 (B.minX=2.06, B.minY=2.06).

    const drag = mkAABB(0, 2, 0, 2);

  });
});

/**
 * Set view to a known state, reset walls model, reset prefs, and reset snap mode.
 * zoom=1, pan=0 → pxPerM()=40; WALL_FLUSH_PX=12 → flushThreshM=0.3;
 * ALIGN_PX=8 → alignThreshM=0.2.
 */
function resetForResolver() {
  view.zoom = 1;
  view.panX = 0;
  view.panY = 0;
  model.rooms.length = 0;
  model.chain.length = 0;
  symbolModel.symbols.length = 0;
  setGridSnap(true);
  setSnapMode("auto");  // auto → step = chooseGridStep ≈ 2m at zoom=1 (80px/2m > 56px)
}

/**
 * A 1×1 boxLike symbol for resolver tests.
 * @param {number} x  world center x
 * @param {number} y  world center y
 */
function makeBox(x = 0, y = 0) {
  return { type: "sofa", x, y, w: 1, h: 1, rot: 0 };
}

describe("LLD-34 integration — guide cleared on drop (Edge Case 15)", () => {
  it("no residual <g class='align-guide'> in #symbol-overlay after onSelectUp", () => {
    // Set up known state
    view.zoom = 1; view.panX = 0; view.panY = 0;
    model.rooms.length = 0;

    overlay.id = "symbol-overlay";
    svg.appendChild(overlay);
    document.body.appendChild(svg);

    const snapTagEl = document.createElement("div");
    snapTagEl.className = "snap-tag";
    snapTagEl.style.display = "none";
    document.body.appendChild(snapTagEl);

    const stage = document.createElement("div");
    const dock = document.createElement("div");
    const inspector = document.createElement("div");
    document.body.appendChild(stage);
    document.body.appendChild(dock);
    document.body.appendChild(inspector);

    // Bind symbolTool to our rig so _gSymOverlay and _snapTagEl are set
    initSymbolTool({
      stage,
      dock,
      inspector,
      setTool: () => {},
      isDrawMode: () => false,
      snapTag: snapTagEl,
      symOverlay: overlay,
    });

    // Place two chair symbols:
    //   sym1 at (5, 5): AABB x:[4.75, 5.25], y:[4.75, 5.25]  → screen center (200, 200)
    //   sym2 at (5.35, 5): AABB x:[5.10, 5.60]
    //   gap = sym1.maxX(5.25) to sym2.minX(5.10) = -0.15; |gap|=0.15 < alignThreshM=0.2 → X match
    const sym1 = createSymbol("chair", 5, 5);
    addSymbol(sym1);
    const sym2 = createSymbol("chair", 5.35, 5);
    addSymbol(sym2);

    // Start drag on sym1 by clicking its center (sym1's center maps to screen (200,200))
    symbolOnSelectDown(200, 200);

    // Move at same position — _resolvePlacement fires with sym2 as an alignment candidate,
    // _updateGuides builds the alignment guide <g> elements.
    symbolOnSelectMove(200, 200);

    // repositionGuides() is the post-render hook that appends <g class="align-guide">
    // elements to the overlay. Call it directly to simulate the render cycle.
    repositionGuides();

    // Verify at least one align-guide was appended (proves the rig is working)
    const guidesBefore = overlay.querySelectorAll(".align-guide");

    // Drop — this MUST clear all guides from the overlay
    symbolOnSelectUp(200, 200);

    // Assert: overlay has no residual align-guide children (Edge Case 15 invariant)
    const guidesAfter = overlay.querySelectorAll(".align-guide");

    // Clean up rig
    document.body.removeChild(svg);
    document.body.removeChild(snapTagEl);
    document.body.removeChild(stage);
    document.body.removeChild(dock);
    document.body.removeChild(inspector);
    symbolModel.symbols.length = 0;
    setGridSnap(true);
    setSnapMode("auto");

    if (guidesBefore.length === 0) {
      throw new Error("No align-guide elements were created during drag — check alignment threshold or rig setup");
    }
    if (guidesAfter.length !== 0) {
      throw new Error(`Expected 0 align-guide elements after onSelectUp, got ${guidesAfter.length}`);
    }
  });
});

describe("LLD-60 integration — corner coherence: drag into an L never mixes two neighbours", () => {
  it("P near on X only, Q near on Y only → resolved corner comes from a single object, not a mix", () => {
    // Two neighbours forming an L around the drag's bottom-right:
    //   P offers an X alignment only (its Y is far); Q offers a Y alignment only (its X is far).
    // Drag box 1×1 at (5,5): AABB x:[4.5,5.5], y:[4.5,5.5].
    resetAll();
    setGridSnap(true);
    setSnapMode("off");
    const box = makeBox(5, 5);
    const P = mkAABB(5.55, 7, 40, 42);  // facing X gap 0.05; Y ~40 away
    const Q = mkAABB(40, 42, 5.60, 8);  // facing Y gap 0.10; X ~40 away
    const r = resolvePlacementForTest(200, 200, false, box, [P, Q]);
    // Coherent-corner guarantee: object alignment supplies at most ONE axis here
    // (both cannot come from different neighbours). No rooms → no room-center fill.
    const bothObjAxes = r._alignX !== null && r._alignY !== null;
    if (bothObjAxes) throw new Error("Phantom corner at resolver level: X and Y from different neighbours");
    // The tighter neighbour P wins its X axis; Y stays unsnapped (raw).
    if (r._alignX === null) throw new Error("Expected P's X alignment to win");
    expect(r._alignX.line).toBeCloseTo(5.55, 9);
    expect(r._alignY).toBe(null);
    setGridSnap(true);
    setSnapMode("auto");
  });
});

/** Build an AABB from known min/max for room-center tests. */
function mkRC_AABB(minX, maxX, minY, maxY) {
  return { minX, maxX, cx: (minX + maxX) / 2, minY, maxY, cy: (minY + maxY) / 2 };
}

describe("nearestRoomCenter — X axis in range only → X match, y null", () => {
  it("drag center just inside threshold of room centroid X → X match, kind room-center, y null", () => {
    // room centroid at (5, 100), drag center at (5.05, 0) — X gap=0.05 < thresh=0.2; Y gap=100 >> thresh
    const drag = mkRC_AABB(4.55, 5.55, -0.5, 0.5);  // cx=5.05, cy=0
    const rc = [{ cx: 5, cy: 100 }];
    const result = nearestRoomCenter(drag, rc, 0.2);
    if (result.x === null) throw new Error("Expected x match");
    expect(result.x.kind).toBe("room-center");
    expect(result.x.delta).toBeCloseTo(5 - 5.05, 9);
    if (result.x.center === undefined) throw new Error("Expected center on x match");
    expect(result.x.center.x).toBeCloseTo(5, 9);
    expect(result.x.center.y).toBeCloseTo(100, 9);
    if (result.y !== null) throw new Error("Expected y null");
  });
});

describe("nearestRoomCenter — both axes in range → both matches, same room", () => {
  it("drag center close on both axes → x and y both room-center with same center", () => {
    // room centroid at (5, 5), drag at (5.05, 4.95)
    const drag = mkRC_AABB(4.55, 5.55, 4.45, 5.45);  // cx=5.05, cy=4.95
    const rc = [{ cx: 5, cy: 5 }];
    const result = nearestRoomCenter(drag, rc, 0.2);
    if (result.x === null) throw new Error("Expected x match");
    if (result.y === null) throw new Error("Expected y match");
    expect(result.x.kind).toBe("room-center");
    expect(result.y.kind).toBe("room-center");
    // Both axes carry the same center
    if (result.x.center === undefined || result.y.center === undefined) {
      throw new Error("Expected center on both matches");
    }
    expect(result.x.center.x).toBeCloseTo(result.y.center.x, 9);
    expect(result.x.center.y).toBeCloseTo(result.y.center.y, 9);
  });
});

describe("nearestRoomCenter — beyond threshold on both axes → null,null", () => {

describe("nearestRoomCenter — two rooms in range, nearer centroid wins", () => {
  it("room with smaller dx²+dy² chosen; both axes from that room", () => {
    // drag center at (5, 5)
    const drag = mkRC_AABB(4.5, 5.5, 4.5, 5.5);  // cx=5, cy=5
    // roomA: centroid at (5.1, 5.1) → dx²+dy²=0.01+0.01=0.02
    // roomB: centroid at (5.05, 5.05) → dx²+dy²=0.0025+0.0025=0.005 (closer)
    const rc = [
      { cx: 5.1, cy: 5.1 },   // roomA
      { cx: 5.05, cy: 5.05 }, // roomB (winner)
    ];
    const result = nearestRoomCenter(drag, rc, 0.2);
    if (result.x === null) throw new Error("Expected x match");
    if (result.y === null) throw new Error("Expected y match");
    // Both axes should reference roomB's centroid
    if (result.x.center === undefined) throw new Error("Missing center on x");
    expect(result.x.center.x).toBeCloseTo(5.05, 9);
    expect(result.x.center.y).toBeCloseTo(5.05, 9);
    if (result.y.center === undefined) throw new Error("Missing center on y");
    expect(result.y.center.x).toBeCloseTo(5.05, 9);
    expect(result.y.center.y).toBeCloseTo(5.05, 9);
  });
});

describe("nearestRoomCenter — single-room coherence: roomA on X only, roomB on Y only", () => {
  it("roomA in range on X only, roomB in range on Y only → chosen room emits only its in-range axis", () => {
    // drag center at (5, 5)
    const drag = mkRC_AABB(4.5, 5.5, 4.5, 5.5);  // cx=5, cy=5
    // roomA: cx=5.1 (X in range 0.2), cy=100 (Y out of range)    dx²+dy²≈0.01+9025
    // roomB: cx=100 (X out of range), cy=5.05 (Y in range 0.2)   dx²+dy²≈9025+0.0025
    // roomA wins because its total dist² is much smaller (via cx, both in threshold on x, cy far)
    // Actually roomA eligible (|dx|=0.1 < 0.2), roomB eligible (|dy|=0.05 < 0.2)
    // roomA dx²+dy²=0.01 + (100-5)²≈9025.01
    // roomB dx²+dy²=(100-5)²+0.0025≈9025.0025 → roomB is slightly closer
    // But roomA only has X in range; roomB only has Y in range
    const rc = [
      { cx: 5.1, cy: 100 },  // roomA: X in range, Y far
      { cx: 100, cy: 5.05 }, // roomB: Y in range, X far
    ];
    const result = nearestRoomCenter(drag, rc, 0.2);
    // The chosen room emits only its in-range axis; the other axis is null
    // roomB (closer overall) is chosen; it has only Y in range
    // (dx=100-5=95 >> threshold; dy=5.05-5=0.05 < threshold)
    if (result.x !== null) throw new Error("Expected x null (chosen room has X out of range)");
    if (result.y === null) throw new Error("Expected y match (chosen room has Y in range)");
    // No X-from-roomA / Y-from-roomB split possible
  });
});

describe("LLD-37 integration — room-center guide and ring cleared on drop", () => {
  it("no residual .align-guide or .room-center-ring in #symbol-overlay after onSelectUp", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    model.rooms.length = 0;

    model.rooms.push({

    });

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    const overlay = document.createElementNS("http://www.w3.org/2000/svg", "g");
    overlay.id = "symbol-overlay";
    svg.appendChild(overlay);
    document.body.appendChild(svg);

    const snapTagEl = document.createElement("div");
    snapTagEl.className = "snap-tag";
    snapTagEl.style.display = "none";
    document.body.appendChild(snapTagEl);

    const stage = document.createElement("div");
    const dock = document.createElement("div");
    const inspector = document.createElement("div");
    document.body.appendChild(stage);
    document.body.appendChild(dock);
    document.body.appendChild(inspector);

    initSymbolTool({
      stage, dock, inspector,
      setTool: () => {},
      isDrawMode: () => false,
      snapTag: snapTagEl,
      symOverlay: overlay,
    });

    // Symbol at world (0.05, 0.05) — very close to room centroid (0,0)
    // At zoom=1, pan=0: world(0,0)=screen(0,0), world(0.05,0.05)=screen(2,2)
    const sym1 = createSymbol("chair", 0.05, 0.05);

    // Start drag on the symbol
    // screen(0.05*40=2, 0.05*40=2) → click center
    symbolOnSelectDown(2, 2);

    // Move — room-center snap should fire; _updateGuides builds the room-center guide + ring
    symbolOnSelectMove(2, 2);

    // repositionGuides — post-render hook appends guides to overlay
    repositionGuides();

    // Drop — MUST clear all guides + ring
    symbolOnSelectUp(2, 2);

    // Assert: no residual align-guide or room-center-ring
    const guidesAfter = overlay.querySelectorAll(".align-guide");

    symbolModel.symbols.length = 0;
    setGridSnap(true);
    setSnapMode("auto");

    if (guidesAfter.length !== 0) {
      throw new Error(`Expected 0 align-guide after drop, got ${guidesAfter.length}`);
    }
    if (ringAfter.length !== 0) {
      throw new Error(`Expected 0 room-center-ring after drop, got ${ringAfter.length}`);
    }
  });
});

describe("interactions — touch draw commits at raw fingertip coordinates (LLD 57)", () => {
  it("touch up in draw mode commits at raw y, not y-56", () => {
    // Set up a minimal stage
    const stage = document.createElement("div");
    stage.setPointerCapture = () => {};
    document.body.appendChild(stage);

    const hoverCalls = [];
    const clickCalls = [];
    let isDrawModeVal = true;

    const drawHooks = {
      isDrawMode: () => isDrawModeVal,
      onHover: (sx, sy) => hoverCalls.push({ sx, sy }),
      onClick: (sx, sy) => clickCalls.push({ sx, sy }),
      onLeave: () => {},
    };
    setDrawHooks(drawHooks);
    setSelectHooks(null);

    // Dispatch a touch pointerdown at (200, 300)
    const downEvt = new PointerEvent("pointerdown", {
      bubbles: true, cancelable: true,
      pointerId: 1,
      clientX: 200, clientY: 300,
      pointerType: "touch",
      buttons: 1,
    });
    const upEvt = new PointerEvent("pointerup", {
      bubbles: true, cancelable: true,
      pointerId: 1,
      clientX: 200, clientY: 300,
      pointerType: "touch",
    });

    // Re-init interactions with our stage
    const hint = document.createElement("div");
    const btnZoomIn = document.createElement("button");
    const btnZoomOut = document.createElement("button");
    const btnReset = document.createElement("button");
    document.body.appendChild(hint);
    initInteractions(stage, hint, btnZoomIn, btnZoomOut, btnReset);

    hoverCalls.length = 0;
    clickCalls.length = 0;

    stage.dispatchEvent(downEvt);
    stage.dispatchEvent(upEvt);

    // onHover should have been called on touch-down at raw y (300), not y-56
    const hasRawHover = hoverCalls.some(c => c.sy === 300);
    if (!hasRawHover) {
      throw new Error(`Expected onHover called with raw y=300 on touch-down, got: ${JSON.stringify(hoverCalls)}`);

    if (clickCalls.length !== 1) {

import { computeLoupeRect } from "../src/js/loupe.js";

describe("loupe — computeLoupeRect: normal placement above fingertip", () => {
  it("bubble center is LOUPE_LIFT above fingertip when away from edges", () => {
    // fingertip at (300, 400), viewport 800x600, diam=112, lift=72
    const { cx, cy, flipped } = computeLoupeRect(300, 400, 800, 600, 112, 72);
    expect(cx).toBe(300);
    expect(cy).toBe(400 - 72);
    expect(flipped).toBe(false);
  });

  it("x is unchanged when fingertip is horizontally centered", () => {
    const { cx } = computeLoupeRect(400, 300, 800, 600, 112, 72);
    expect(cx).toBe(400);
  });
});

describe("loupe — computeLoupeRect: flip below finger near top edge", () => {
  it("flips below when bubble would clip off top (cy - R < 8)", () => {
    // fingertip at y=30, R=56, lift=72 → cy = 30-72 = -42, then -42-56 < 8 → flip
    const { cy, flipped } = computeLoupeRect(200, 30, 800, 600, 112, 72);
    expect(flipped).toBe(true);
    // cy = fingerSy + lift = 30 + 72 = 102
    expect(cy).toBe(30 + 72);
  });

  it("does not flip when fingertip is far enough from top edge", () => {
    // fingertip at y=200, cy = 200-72 = 128, 128-56 = 72 >= 8 → no flip
    const { flipped } = computeLoupeRect(200, 200, 800, 600, 112, 72);
    expect(flipped).toBe(false);
  });
});

describe("loupe — computeLoupeRect: horizontal clamping near viewport edges", () => {
  it("clamps left edge: cx is at least R + 8", () => {
    // fingertip at x=10, R=56 → cx = 10, cx-R = -46 < 8 → clamp to 64
    const { cx } = computeLoupeRect(10, 300, 800, 600, 112, 72);
    expect(cx).toBe(56 + 8);
  });

  it("clamps right edge: cx is at most vw - R - 8", () => {
    // fingertip at x=790, R=56 → cx+R = 846 > 800-8=792 → clamp to 736
    const { cx } = computeLoupeRect(790, 300, 800, 600, 112, 72);
    expect(cx).toBe(800 - 56 - 8);
  });

  it("does not clamp when fingertip is within safe horizontal zone", () => {
    const { cx } = computeLoupeRect(400, 300, 800, 600, 112, 72);
    expect(cx).toBe(400);
  });
});

describe("loupe — computeLoupeRect: rejection inputs", () => {
  it("cx is a number for various fingertip positions", () => {
    for (const [fx, fy] of [[0,0],[800,600],[400,400],[10,10],[790,590]]) {
      const { cx, cy } = computeLoupeRect(fx, fy, 800, 600, 112, 72);
      if (!isFinite(cx) || !isFinite(cy)) {
        throw new Error(`computeLoupeRect(${fx},${fy}) produced non-finite coords: cx=${cx}, cy=${cy}`);
      }
    }
  });
});

/** Minimal overlay DOM for templates tests */
function _makeTemplateDOM() {
  const overlay  = document.createElement("div");
  overlay.id = "template-overlay";
  const panel    = document.createElement("div");
  panel.className = "template-overlay-panel";
  const grid     = document.createElement("div");
  grid.className = "template-grid";
  const closeBtn = document.createElement("button");
  closeBtn.className = "template-overlay-close";
  panel.appendChild(grid);
  panel.appendChild(closeBtn);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  return { overlay, grid, closeBtn };
}

function _removeTemplateDOM(dom) {
  if (dom.overlay.parentNode) dom.overlay.parentNode.removeChild(dom.overlay);
}

/** Snapshot + restore live model state for template tests */
function _snapModels() {
  return {
    rooms:   JSON.parse(JSON.stringify(model.rooms)),
    chain:   JSON.parse(JSON.stringify(model.chain)),
    symbols: JSON.parse(JSON.stringify(symbolModel.symbols)),
  };
}
function _restoreModels(snap) {
  model.rooms.length = 0;
  model.chain.length = 0;
  symbolModel.symbols.length = 0;
  model.rooms.push(...snap.rooms);
  model.chain.push(...snap.chain);
  symbolModel.symbols.push(...snap.symbols);
}

describe("LLD-50 — catalog: regression guard (dimensions + labels)", () => {
  it("all entries have finite w, h, per-axis bounds; defaults + presets lie within bounds", () => {
    for (const [type, entry] of Object.entries(CATALOG)) {
      for (const field of ["w", "h", "min_w", "max_w", "min_h", "max_h"]) {
        if (!isFinite(entry[field])) {
          throw new Error(`${type}.${field} is not finite: ${entry[field]}`);
        }
      }
      // Default footprint must sit inside the per-axis envelope.
      if (entry.w < entry.min_w || entry.w > entry.max_w) {
        throw new Error(`${type}: w(${entry.w}) not in [${entry.min_w},${entry.max_w}]`);
      }
      if (entry.h < entry.min_h || entry.h > entry.max_h) {
        throw new Error(`${type}: h(${entry.h}) not in [${entry.min_h},${entry.max_h}]`);
      }
      // Every named preset must also be a real, in-bounds size.
      for (const p of entry.presets || []) {
        if (p.w < entry.min_w || p.w > entry.max_w) {
          throw new Error(`${type} preset ${p.name}: w(${p.w}) not in [${entry.min_w},${entry.max_w}]`);
        }
        if (p.h < entry.min_h || p.h > entry.max_h) {
          throw new Error(`${type} preset ${p.name}: h(${p.h}) not in [${entry.min_h},${entry.max_h}]`);
        }
      }
    }
  });

  it("all entries have non-empty label", () => {
    for (const [type, entry] of Object.entries(CATALOG)) {
      if (!entry.label || entry.label.trim() === "") {
        throw new Error(`${type} has empty label`);
      }
    }
  });
});

/** Build a minimal dock DOM matching the index.html structure for tab tests. */
function _makeDockDOM() {
  const dock = document.createElement("nav");
  dock.id = "test-symbol-dock";

  // Tab strip
  const tablist = document.createElement("div");
  tablist.setAttribute("role", "tablist");
  tablist.className = "dock-tabs";

  const categories = ["openings", "living", "kitchen", "bedroom", "bath", "outdoor"];
  const tabLabels  = { openings: "Openings", living: "Living", kitchen: "Kitchen", bedroom: "Bedroom", bath: "Bath", outdoor: "Outdoor" };
  // Item types per category (matching CATALOG)
  const itemsByCategory = {
    openings: ["door", "window"],
    living:   ["sofa", "table", "chair", "desk", "tv", "bookshelf", "armchair", "coffee-table", "dining-table-round", "rug", "monitor", "gaming-chair", "fireplace"],
    kitchen:  ["fridge", "stove", "sink", "washer"],
    bedroom:  ["bed", "wardrobe", "nightstand", "dresser", "cabinet"],
    bath:     ["toilet", "bathtub"],
    outdoor:  ["patio-table", "patio-chair", "parasol", "planter"],
  };

  for (let i = 0; i < categories.length; i++) {
    const cat = categories[i];
    const tab = document.createElement("button");
    tab.setAttribute("role", "tab");
    tab.dataset.category = cat;
    tab.id = `test-tab-${cat}`;
    tab.setAttribute("aria-controls", `test-row-${cat}`);
    tab.setAttribute("aria-selected", i === 0 ? "true" : "false");
    tab.tabIndex = i === 0 ? 0 : -1;
    tab.textContent = tabLabels[cat];
    tablist.appendChild(tab);
  }
  dock.appendChild(tablist);

  for (let i = 0; i < categories.length; i++) {
    const cat = categories[i];
    const row = document.createElement("div");
    row.setAttribute("role", "tabpanel");
    row.dataset.category = cat;
    row.id = `test-row-${cat}`;
    row.setAttribute("aria-labelledby", `test-tab-${cat}`);
    if (i !== 0) row.setAttribute("hidden", "");

    for (const type of itemsByCategory[cat]) {
      const btn = document.createElement("button");
      btn.className = "dock-item";
      btn.dataset.type = type;
      btn.setAttribute("aria-label", `Add ${type}`);
      row.appendChild(btn);
    }
    dock.appendChild(row);
  }

  document.body.appendChild(dock);
  return dock;
}

function _removeDockDOM(dock) {
  if (dock.parentNode) dock.parentNode.removeChild(dock);
}

// Note: addSymbol, createSymbol, removeSymbol, symbolModel already imported above

// Minimal stub DOM needed for symbolTool.init
function _buildSymbolToolDOM() {
  const dock     = document.createElement("div");

// Helper: add a symbol at (x, y) and return it
function _addSym54(x = 0, y = 0) {
  const sym = createSymbol("chair", x, y);
  addSymbol(sym);
  return sym;
}

// Helper: reset symbols model for LLD-54 tests
function _resetSyms54() {
  symbolModel.symbols.length = 0;
}

// Inject a spy history commit
function _makeSpyCommit54() {
  let count = 0;
  const spy = () => { count++; };
  spy.callCount = () => count;
  return spy;
}

describe("LLD-54 — symbolTool: nudgeSelected", () => {
  it("moves selected symbol by (dx, dy) exactly (no snap applied)", () => {
    _resetSyms54();
    const spy = _makeSpyCommit54();
    symSetHistoryAndToastLLD54({ commit: spy, undo: () => false, depth: () => 0 }, () => {});
    const { dock, insp } = _buildSymbolToolDOM();
    initSymbolTool({ stage: document.createElement("div"), dock, inspector: insp, setTool: () => {}, isDrawMode: () => false });

    const sym = _addSym54(1, 2);

    nudgeSelected(0.5, 0.25);
    expect(sym.x).toBeCloseTo(1.5, 10);
    expect(sym.y).toBeCloseTo(2.25, 10);

    flushNudge(); // clean up pending timer
    _resetSyms54();
  });

  it("is a no-op when nothing is selected", () => {
    _resetSyms54();
    const spy = _makeSpyCommit54();
    symSetHistoryAndToastLLD54({ commit: spy, undo: () => false, depth: () => 0 }, () => {});
    const { dock, insp } = _buildSymbolToolDOM();
    initSymbolTool({ stage: document.createElement("div"), dock, inspector: insp, setTool: () => {}, isDrawMode: () => false });
    const sym = _addSym54(1, 2);
    // no selectSymbolLLD54 call → _selectedId stays null
    nudgeSelected(1, 1);
    expect(sym.x).toBe(1);
    expect(sym.y).toBe(2);
    expect(spy.callCount()).toBe(0);
    _resetSyms54();
  });

  it("debounce: N rapid nudgeSelected calls schedule exactly one commit (verified via flushNudge)", () => {
    _resetSyms54();
    const spy = _makeSpyCommit54();
    symSetHistoryAndToastLLD54({ commit: spy, undo: () => false, depth: () => 0 }, () => {});
    const { dock, insp } = _buildSymbolToolDOM();
    initSymbolTool({ stage: document.createElement("div"), dock, inspector: insp, setTool: () => {}, isDrawMode: () => false });

    const sym = _addSym54(0, 0);
    selectSymbolLLD54(sym.id);
    // Fire 5 nudges in quick succession — each resets the debounce timer
    nudgeSelected(0.1, 0);
    nudgeSelected(0.1, 0);
    nudgeSelected(0.1, 0);
    nudgeSelected(0.1, 0);
    nudgeSelected(0.1, 0);
    // Symbol has moved 0.5 m total; debounce timer pending but no commit yet
    expect(spy.callCount()).toBe(0);
    expect(sym.x).toBeCloseTo(0.5, 10);
    // Flush the pending timer synchronously — proves exactly one commit pending
    flushNudge();
    expect(spy.callCount()).toBe(1);
    // Flushing again is a no-op (timer cleared)
    flushNudge();
    expect(spy.callCount()).toBe(1);

    _resetSyms54();
  });
});

describe("LLD-54 — symbolTool: flushNudge", () => {
  it("is a no-op when no timer is pending", () => {
    _resetSyms54();
    const spy = _makeSpyCommit54();

describe("LLD-54 — nudge step selection logic", () => {
  it("base step derives from snapStep() when non-null (auto mode)", () => {
    // snapStep() in "auto" mode returns chooseGridStep(56), which is grid-step-dependent.
    // At zoom=1 (pxPerM=40), the step should be >= 56/40 = 1.4m → chooseGridStep picks 2m.
    view.zoom = 1; view.panX = 0; view.panY = 0;
    setSnapMode("auto");
    const step = snapStep();
    // We just verify it's a positive number
    if (typeof step !== "number" || step <= 0) throw new Error(`Expected positive step, got ${step}`);
  });

  it("snapStep() returns null when mode is 'off'", () => {
    setSnapMode("off");
    expect(snapStep()).toBe(null);
    setSnapMode("auto"); // restore
  });

  it("snapStep() returns fixed value for preset modes", () => {
    setSnapMode(0.1);
    expect(snapStep()).toBe(0.1);
    setSnapMode(0.25);
    expect(snapStep()).toBe(0.25);
    setSnapMode("auto"); // restore
  });

  it("nudge fallback: when snapStep is null, base is 0.1 (verified by manual computation)", () => {
    // When snap is off, nudge code uses `snapStep() ?? 0.1` → base = 0.1
    // and Shift multiplies by 4 → 0.4
    setSnapMode("off");
    const base = snapStep() ?? 0.1;
    expect(base).toBe(0.1);
    const coarse = base * 4;
    expect(coarse).toBeCloseTo(0.4, 10);
    setSnapMode("auto"); // restore
  });
});

describe("LLD-54 — help.SHORTCUTS parity", () => {
  it("SHORTCUTS is an array with at least 1 entry", () => {
    if (!Array.isArray(SHORTCUTS) || SHORTCUTS.length === 0) {
      throw new Error("SHORTCUTS must be a non-empty array");
    }
  });

  it("every entry has non-empty mac and other chord strings", () => {
    for (const entry of SHORTCUTS) {
      if (!entry.mac || typeof entry.mac !== "string") {
        throw new Error(`Entry "${entry.action}" has missing/empty mac chord`);
      }
      if (!entry.other || typeof entry.other !== "string") {
        throw new Error(`Entry "${entry.action}" has missing/empty other chord`);
      }
    }
  });

  it("every entry has non-empty action and group strings", () => {
    for (const entry of SHORTCUTS) {
      if (!entry.action || typeof entry.action !== "string") {
        throw new Error(`Entry has missing/empty action`);
      }
      if (!entry.group || typeof entry.group !== "string") {
        throw new Error(`Entry "${entry.action}" has missing/empty group`);
      }
    }
  });

  it("SHORTCUTS action set exactly equals the expected active-shortcut set", () => {
    const actualActions = new Set(SHORTCUTS.map(e => e.action));
    for (const expected of EXPECTED_ACTIONS) {
      if (!actualActions.has(expected)) {
        throw new Error(`Missing shortcut in SHORTCUTS: "${expected}"`);
      }
    }
    for (const actual of actualActions) {
      if (!EXPECTED_ACTIONS.has(actual)) {
        throw new Error(`Unexpected/dead entry in SHORTCUTS: "${actual}"`);
      }
    }
  });

  it("no two entries have the same action string", () => {
    const seen = new Set();
    for (const entry of SHORTCUTS) {
      if (seen.has(entry.action)) {
        throw new Error(`Duplicate action in SHORTCUTS: "${entry.action}"`);
      }
      seen.add(entry.action);
    }
  });
});

import {
  init as initOnboarding,
  maybeShow as onboardingMaybeShow,
  dismiss as onboardingDismiss,
  isShown as onboardingIsShown,
} from "../src/js/onboarding.js";

/**
 * Build a minimal set of DOM stubs for onboarding tests.
 * @param {{ wallVisible?: boolean, templateVisible?: boolean }} opts
 */
function _makeOnboardingRefs({ wallVisible = true, templateVisible = true } = {}) {
  function makeEl(id) {
    const el = document.createElement("div");
    el.id = id;
    return el;
  }

  const container   = makeEl("t-onboarding");
  container.hidden  = true;

  const wallTip     = makeEl("t-coach-wall");
  wallTip.hidden    = true;
  const wallArrow   = document.createElement("span");
  wallArrow.className = "coach-arrow";
  wallTip.appendChild(wallArrow);

  const templateTip = makeEl("t-coach-template");
  templateTip.hidden = true;
  const tmplArrow   = document.createElement("span");
  tmplArrow.className = "coach-arrow";
  templateTip.appendChild(tmplArrow);

  const dismissBtn  = makeEl("t-coach-dismiss");
  const stage       = makeEl("t-stage");

  // Stub wallBtn with controllable visibility
  const wallBtn = makeEl("t-tool-wall");
  if (wallVisible) {
    // Make offsetParent non-null by appending to document body
    document.body.appendChild(wallBtn);
    // Override getBoundingClientRect to return a non-zero rect inside viewport
    wallBtn.getBoundingClientRect = () => ({
      left: 10, top: 200, right: 50, bottom: 240,
      width: 40, height: 40,
    });
  } else {
    // Simulate collapsed (not in DOM → offsetParent is null)
    wallBtn.getBoundingClientRect = () => ({ left: 0, top: 0, right: 0, bottom: 0, width: 0, height: 0 });
  }

  // Stub emptyCta with controllable visibility
  const emptyCta = makeEl("t-empty-cta");
  if (templateVisible) {
    document.body.appendChild(emptyCta);
    emptyCta.getBoundingClientRect = () => ({
      left: 300, top: 300, right: 500, bottom: 340,
      width: 200, height: 40,
    });
  } else {
    emptyCta.getBoundingClientRect = () => ({ left: 0, top: 0, right: 0, bottom: 0, width: 0, height: 0 });
  }

  return { container, wallTip, templateTip, dismissBtn, stage, wallBtn, emptyCta };
}

/** Reset onboarding module state between tests by calling init with fresh refs. */
function _resetOnboarding(opts) {
  setOnboardingSeen(false);
  onboardingDismiss(); // ensure _shown = false
  const refs = _makeOnboardingRefs(opts);
  initOnboarding({
    container:   refs.container,
    wallTip:     refs.wallTip,
    templateTip: refs.templateTip,
    dismissBtn:  refs.dismissBtn,
    stage:       refs.stage,
    wallBtn:     refs.wallBtn,
    emptyCta:    refs.emptyCta,
    isEmpty: () => true,
  });
  return refs;
}

  it("Esc key triggers dismiss() but does not stopPropagation", () => {

    onboardingMaybeShow();
    expect(onboardingIsShown()).toBe(true);

    // Set up an outer bubble-phase listener to verify it still receives the Esc event
    let outerFired = false;
    const outerListener = (e) => {
      if (e.key === "Escape") outerFired = true;
    };
    window.addEventListener("keydown", outerListener);

    // Dispatch Esc — bubble phase
    const ev = new KeyboardEvent("keydown", { key: "Escape", bubbles: true });
    window.dispatchEvent(ev);

    window.removeEventListener("keydown", outerListener);

    expect(onboardingIsShown()).toBe(false);
    if (!outerFired) throw new Error("Outer bubble-phase Esc listener did not fire — stopPropagation was called");
    setOnboardingSeen(false);
  });
});

// ─── LLD 61 helpers ───────────────────────────────────────────────────────────

const NS_SVG_61 = "http://www.w3.org/2000/svg";

/**
 * Parse a buildExportSvg() string into a queryable Document.
 * @param {string} svgStr
 * @returns {Document}
 */
function parseSvg(svgStr) {
  return new DOMParser().parseFromString(svgStr, "image/svg+xml");
}

/**
 * Parse a "x1,y1 x2,y2 …" points string into [{x,y}] objects.
 * @param {string} pointsAttr
 * @returns {{x:number,y:number}[]}
 */
function parsePoints(pointsAttr) {
  return (pointsAttr || "").trim().split(/\s+/).filter(Boolean).map(pair => {
    const [x, y] = pair.split(",");
    return { x: parseFloat(x), y: parseFloat(y) };
  });
}

/**
 * Build a minimal DOM rig for wallRender and symbolRender tests.
 * Returns fresh detached SVG <g> nodes and HTML <div>s.
 * Calls init on both modules with the fresh nodes.
 *
 * @param {object} [opts]
 * @param {()=>*} [opts.getSnap]
 * @param {()=>*} [opts.getHighlight]
 * @param {()=>*} [opts.getEditingEdge]
 * @param {()=>*} [opts.getSelectedId]
 * @param {()=>*} [opts.getPlacementGhost]
 * @param {()=>*} [opts.getEditingDim]
 */
function makeRenderRig61(opts = {}) {
  const gWorld    = document.createElementNS(NS_SVG_61, "g");
  const gDraft    = document.createElementNS(NS_SVG_61, "g");
  const gSnap     = document.createElementNS(NS_SVG_61, "g");
  const labels    = document.createElement("div");
  const dimLabels = document.createElement("div");
  const gRugs     = document.createElementNS(NS_SVG_61, "g");
  const gSymbols  = document.createElementNS(NS_SVG_61, "g");
  const gOverlay  = document.createElementNS(NS_SVG_61, "g");

  initWallRender(
    gWorld, gDraft, gSnap, labels, dimLabels,
    opts.getSnap        || (() => null),
    opts.getHighlight   || (() => null),
    opts.getEditingEdge || (() => null)
  );

  initSymbolRender(
    gRugs, gSymbols, gOverlay, dimLabels,
    opts.getSelectedId      || (() => null),
    opts.getPlacementGhost  || (() => null),
    opts.getEditingDim      || (() => null)
  );

  return { gWorld, gDraft, gSnap, labels, dimLabels, gRugs, gSymbols, gOverlay };
}

// ─── Tests: LLD 61 — exportImg.buildExportSvg (structural) ───────────────────

describe("exportImg.buildExportSvg — structural", () => {

  // Constants hardcoded as documented literals — see exportImg.js.
  // EXPORT_PX_PER_M = 96, MARGIN_M = 0.5
  // For a room with minX=0, minY=0: originX = -0.5, originY = -0.5
  // exportPx(worldX) = (worldX - originX) * 96 = (worldX + 0.5) * 96

  it("produces valid SVG with no <parsererror>", () => {
    resetAll();
    setUnit("m");
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 3, y: 0 }, { x: 3, y: 2 }, { x: 0, y: 2 },
    ]});
    const svgStr = buildExportSvg();
    const doc = parseSvg(svgStr);
    if (doc.querySelector("parsererror")) {
      throw new Error("buildExportSvg produced malformed SVG: " + doc.querySelector("parsererror").textContent);
    }
  });

  it("single <svg> root with viewBox consistent with content", () => {
    resetAll();
    setUnit("m");
    // Room: 3m wide × 2m tall, min at (0,0).
    // wM = 3 + 2*0.5 = 4, hM = 2 + 2*0.5 = 3 → W = 4*96 = 384, H = 3*96 = 288
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 3, y: 0 }, { x: 3, y: 2 }, { x: 0, y: 2 },
    ]});
    const svgStr = buildExportSvg();
    const doc = parseSvg(svgStr);
    const svgs = doc.querySelectorAll("svg");
    if (svgs.length !== 1) throw new Error(`Expected 1 <svg>, got ${svgs.length}`);
    const svg = svgs[0];
    const vb = svg.getAttribute("viewBox");
    if (!vb) throw new Error("Missing viewBox attribute");
    // viewBox must be "0 0 W H"
    const [vbX, vbY, vbW, vbH] = vb.split(" ").map(Number);
    if (vbX !== 0 || vbY !== 0) throw new Error(`viewBox should start at 0 0, got: ${vb}`);
    const W = 4 * 96;  // 384
    const H = 3 * 96;  // 288
    expect(vbW).toBeCloseTo(W, 6);
    expect(vbH).toBeCloseTo(H, 6);
    // width and height attributes should also match
    expect(parseFloat(svg.getAttribute("width"))).toBeCloseTo(W, 6);
    expect(parseFloat(svg.getAttribute("height"))).toBeCloseTo(H, 6);
  });

  it("closed room → <polygon> with correct margin-offset coordinates", () => {
    resetAll();
    setUnit("m");
    // Unit square room at (0,0)–(1,0)–(1,1)–(0,1)
    // originX = 0 - 0.5 = -0.5, originY = 0 - 0.5 = -0.5
    // vertex (0,0) → exportPx = (0+0.5)*96 = 48, same for y
    // vertex (1,0) → (1.5*96, 0.5*96) = (144, 48)
    // vertex (1,1) → (144, 144)
    // vertex (0,1) → (48, 144)
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: 1 }, { x: 0, y: 1 },
    ]});
    const svgStr = buildExportSvg();
    const doc = parseSvg(svgStr);
    if (doc.querySelector("parsererror")) throw new Error("parsererror in SVG");
    // There should be at least 1 fill polygon (closed room)
    const polygons = doc.querySelectorAll("polygon");
    if (polygons.length === 0) throw new Error("Expected at least one <polygon> for closed room");

    // The fill polygon is the first polygon emitted
    const fillPoly = polygons[0];
    const pts = parsePoints(fillPoly.getAttribute("points"));
    if (pts.length !== 4) throw new Error(`Expected 4 points, got ${pts.length}: ${fillPoly.getAttribute("points")}`);

    const expected = [
      { x: 0.5 * 96, y: 0.5 * 96 },
      { x: 1.5 * 96, y: 0.5 * 96 },
      { x: 1.5 * 96, y: 1.5 * 96 },
      { x: 0.5 * 96, y: 1.5 * 96 },
    ];
    for (let i = 0; i < 4; i++) {
      expect(pts[i].x).toBeCloseTo(expected[i].x, 4);
      expect(pts[i].y).toBeCloseTo(expected[i].y, 4);
    }
  });

  it("2 m edge spans 192 px in export space (coordinate scale = 96 px/m)", () => {
    resetAll();
    setUnit("m");
    // Room with a 2m horizontal edge from (0,0) to (2,0)
    model.rooms.push({ id: "w0", closed: false, verts: [
      { x: 0, y: 0 }, { x: 2, y: 0 },
    ]});
    const svgStr = buildExportSvg();
    const doc = parseSvg(svgStr);
    if (doc.querySelector("parsererror")) throw new Error("parsererror in SVG");
    // Find a polyline (open room → polyline for body)
    const polylines = doc.querySelectorAll("polyline");
    if (polylines.length === 0) throw new Error("Expected <polyline> for open room");
    const pts = parsePoints(polylines[0].getAttribute("points"));
    // x span = (2 - 0) * 96 = 192
    const xSpan = Math.abs(pts[1].x - pts[0].x);
    expect(xSpan).toBeCloseTo(192, 4);
  });

  it("dimension labels: n edges → n <text> nodes per closed room", () => {
    resetAll();
    setUnit("m");
    // Closed rectangle: 4 edges → 4 dimension labels
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 3, y: 0 }, { x: 3, y: 2 }, { x: 0, y: 2 },
    ]});
    const svgStr = buildExportSvg();
    const doc = parseSvg(svgStr);
    if (doc.querySelector("parsererror")) throw new Error("parsererror in SVG");
    const texts = doc.querySelectorAll("text");
    if (texts.length !== 4) throw new Error(`Expected 4 <text> nodes for 4 edges, got ${texts.length}`);
  });

  it("room edges + symbols → correct total <text> count", () => {
    resetAll();
    setUnit("m");
    // Closed 4-edge room + 2 symbols → 4 + 2 = 6 text nodes
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 3, y: 0 }, { x: 3, y: 2 }, { x: 0, y: 2 },
    ]});
    addSymbol(createSymbol("bed", 1, 1));
    addSymbol(createSymbol("chair", 2, 1));
    const svgStr = buildExportSvg();
    const doc = parseSvg(svgStr);
    if (doc.querySelector("parsererror")) throw new Error("parsererror in SVG");
    const texts = doc.querySelectorAll("text");
    if (texts.length !== 6) throw new Error(`Expected 6 <text> nodes (4 edge + 2 symbol), got ${texts.length}`);
  });

  it("text content is XML-safe: no raw < or & characters", () => {
    resetAll();
    setUnit("m");
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 2, y: 0 }, { x: 2, y: 2 }, { x: 0, y: 2 },
    ]});
    addSymbol(createSymbol("table", 1, 1));
    const svgStr = buildExportSvg();
    // Check the raw SVG string has no unescaped & outside entities or unescaped <
    // A well-formed SVG must not have bare & or < inside attribute/text values
    const doc = parseSvg(svgStr);
    if (doc.querySelector("parsererror")) throw new Error("parsererror — likely unescaped XML char");
    // Verify text nodes round-trip correctly (no raw < or & as DOM text)
    const texts = doc.querySelectorAll("text");
    for (const t of texts) {
      if (t.textContent.includes("<") || t.textContent.includes(">")) {
        throw new Error(`Text node contains unescaped < or >: "${t.textContent}"`);
      }
    }
  });

  it("empty plan → minimal SVG: one <rect>, zero <polygon>, zero <text>", () => {
    resetAll();
    const svgStr = buildExportSvg();
    if (!svgStr.startsWith("<?xml")) throw new Error("SVG does not start with <?xml");
    const doc = parseSvg(svgStr);
    if (doc.querySelector("parsererror")) throw new Error("parsererror in empty-plan SVG");
    const rects = doc.querySelectorAll("rect");
    if (rects.length !== 1) throw new Error(`Expected 1 <rect> (bg), got ${rects.length}`);
    const polygons = doc.querySelectorAll("polygon");
    if (polygons.length !== 0) throw new Error(`Expected 0 <polygon> for empty plan, got ${polygons.length}`);
    const texts = doc.querySelectorAll("text");
    if (texts.length !== 0) throw new Error(`Expected 0 <text> for empty plan, got ${texts.length}`);
  });

  it("background rect fill is #14140f", () => {
    resetAll();
    const svgStr = buildExportSvg();
    const doc = parseSvg(svgStr);
    if (doc.querySelector("parsererror")) throw new Error("parsererror in SVG");
    const rect = doc.querySelector("rect");
    if (!rect) throw new Error("No <rect> found");
    const fill = rect.getAttribute("fill");
    if (fill !== "#14140f") throw new Error(`Expected bg fill #14140f, got ${fill}`);
  });

});

// ─── Tests: LLD 61 — wallRender.render (mounted SVG) ─────────────────────────

describe("wallRender.render", () => {

  // At identity view (zoom=1, panX=0, panY=0):
  //   worldToScreen(wx, wy) = { x: wx * 40, y: wy * 40 }
  // BASE_PX_PER_M = 40

  it("closed room: #world gets fill + body + centerline polygons + N vertex-dot circles", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    // 4-vertex closed room
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 3, y: 0 }, { x: 3, y: 2 }, { x: 0, y: 2 },
    ]});
    wallRenderRender();
    const polygons = rig.gWorld.querySelectorAll("polygon");
    // fill (1) + body (1) + centerline (1) = 3 polygons
    if (polygons.length !== 3) throw new Error(`Expected 3 polygons in #world, got ${polygons.length}`);
    const circles = rig.gWorld.querySelectorAll("circle");
    // 4 vertex dots
    if (circles.length !== 4) throw new Error(`Expected 4 circle vertex dots, got ${circles.length}`);
  });

  it("closed room: body polygon points match worldToScreen at identity (×40)", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 2, y: 0 }, { x: 2, y: 1 }, { x: 0, y: 1 },
    ]});
    wallRenderRender();
    // Body polygon is the second polygon (fill first, body second)
    const polygons = rig.gWorld.querySelectorAll("polygon");
    if (polygons.length < 2) throw new Error(`Expected ≥2 polygons, got ${polygons.length}`);
    const bodyPts = parsePoints(polygons[1].getAttribute("points"));
    const expected = [
      { x: 0 * 40, y: 0 * 40 },
      { x: 2 * 40, y: 0 * 40 },
      { x: 2 * 40, y: 1 * 40 },
      { x: 0 * 40, y: 1 * 40 },
    ];
    if (bodyPts.length !== 4) throw new Error(`Expected 4 body polygon points, got ${bodyPts.length}`);
    for (let i = 0; i < 4; i++) {
      expect(bodyPts[i].x).toBeCloseTo(expected[i].x, 4);
      expect(bodyPts[i].y).toBeCloseTo(expected[i].y, 4);
    }
  });

  it("vertex-dot cx/cy match worldToScreen at identity", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 1, y: 2 }, { x: 4, y: 2 }, { x: 4, y: 5 }, { x: 1, y: 5 },
    ]});
    wallRenderRender();
    const circles = rig.gWorld.querySelectorAll("circle");
    if (circles.length !== 4) throw new Error(`Expected 4 vertex dots, got ${circles.length}`);
    const expectedCenters = [
      { x: 1 * 40, y: 2 * 40 },
      { x: 4 * 40, y: 2 * 40 },
      { x: 4 * 40, y: 5 * 40 },
      { x: 1 * 40, y: 5 * 40 },
    ];
    for (let i = 0; i < 4; i++) {
      expect(parseFloat(circles[i].getAttribute("cx"))).toBeCloseTo(expectedCenters[i].x, 4);
      expect(parseFloat(circles[i].getAttribute("cy"))).toBeCloseTo(expectedCenters[i].y, 4);
    }
  });

  it("2-vertex chain: #draft gets body polyline + centerline polyline + dots; #world empty", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    model.chain.push({ x: 0, y: 0 }, { x: 2, y: 0 });
    wallRenderRender();
    if (rig.gWorld.childElementCount !== 0) throw new Error(`Expected empty #world for chain-only, got ${rig.gWorld.childElementCount} children`);
    const draftPolylines = rig.gDraft.querySelectorAll("polyline");
    // body polyline + centerline polyline = 2 polylines
    if (draftPolylines.length !== 2) throw new Error(`Expected 2 polylines in #draft, got ${draftPolylines.length}`);
    const draftCircles = rig.gDraft.querySelectorAll("circle");
    // 2 vertex dots for 2-vertex chain
    if (draftCircles.length !== 2) throw new Error(`Expected 2 vertex-dot circles in #draft, got ${draftCircles.length}`);
  });

  it("1-vertex chain: #draft gets only 1 vertex dot (no polyline)", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    model.chain.push({ x: 1, y: 1 });
    wallRenderRender();
    const polylines = rig.gDraft.querySelectorAll("polyline");
    if (polylines.length !== 0) throw new Error(`Expected 0 polylines for 1-vert chain, got ${polylines.length}`);
    const circles = rig.gDraft.querySelectorAll("circle");
    if (circles.length !== 1) throw new Error(`Expected 1 vertex dot for 1-vert chain, got ${circles.length}`);
  });

  it("snap glyph (type=grid): #snap gets diamond <polygon> + center <circle>", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61({ getSnap: () => ({ x: 2, y: 3, type: "grid" }) });
    wallRenderRender();
    const snapPolys = rig.gSnap.querySelectorAll("polygon");
    if (snapPolys.length !== 1) throw new Error(`Expected 1 diamond polygon in #snap, got ${snapPolys.length}`);
    const snapCircles = rig.gSnap.querySelectorAll("circle");
    if (snapCircles.length !== 1) throw new Error(`Expected 1 center circle in #snap, got ${snapCircles.length}`);
  });

  it("palette/theme wiring: fill, wallBody, wallLine attributes come from palette() tokens", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    // Use dark theme so palette is deterministic fallback
    themeSetTheme("dark");
    const rig = makeRenderRig61();
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 2, y: 0 }, { x: 2, y: 2 }, { x: 0, y: 2 },
    ]});
    wallRenderRender();
    const p = palette();
    const polygons = rig.gWorld.querySelectorAll("polygon");
    // fill polygon (index 0): fill = p.roomFill
    if (polygons[0].getAttribute("fill") !== p.roomFill) {
      throw new Error(`Fill polygon: expected fill=${p.roomFill}, got ${polygons[0].getAttribute("fill")}`);
    }
    // body polygon (index 1): stroke = p.wallBody
    if (polygons[1].getAttribute("stroke") !== p.wallBody) {
      throw new Error(`Body polygon: expected stroke=${p.wallBody}, got ${polygons[1].getAttribute("stroke")}`);
    }
    // centerline polygon (index 2): stroke = p.wallLine (not highlighted)
    if (polygons[2].getAttribute("stroke") !== p.wallLine) {
      throw new Error(`Centerline polygon: expected stroke=${p.wallLine}, got ${polygons[2].getAttribute("stroke")}`);
    }
  });

  it("idempotent redraw: calling render() twice yields the same child count", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 2, y: 0 }, { x: 2, y: 2 }, { x: 0, y: 2 },
    ]});
    wallRenderRender();
    const count1 = rig.gWorld.childElementCount;
    wallRenderRender();
    const count2 = rig.gWorld.childElementCount;
    if (count1 !== count2) throw new Error(`Second render changed child count: ${count1} → ${count2}`);
  });

  it("#draft and #snap are empty when there is no chain and no snap", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    model.rooms.push({ id: "w0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 2, y: 0 }, { x: 2, y: 2 }, { x: 0, y: 2 },
    ]});
    wallRenderRender();
    if (rig.gDraft.childElementCount !== 0) throw new Error(`Expected empty #draft, got ${rig.gDraft.childElementCount}`);
    if (rig.gSnap.childElementCount !== 0) throw new Error(`Expected empty #snap, got ${rig.gSnap.childElementCount}`);
  });

});

// ─── Tests: LLD 61 — symbolRender.render (mounted SVG) ───────────────────────

describe("symbolRender.render", () => {

  it("two symbols → two body <polygon>s in #symbols", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    addSymbol(createSymbol("table", 2, 2));
    addSymbol(createSymbol("chair", 4, 4));
    symbolRenderRender();
    const polys = rig.gSymbols.querySelectorAll("polygon");
    if (polys.length < 2) throw new Error(`Expected ≥2 body polygons for 2 symbols, got ${polys.length}`);
  });

  it("body polygon points equal screen-projected corners (identity view: ×40)", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    const sym = createSymbol("table", 2, 2);
    // table: w=1.2, h=0.8, rot=0
    addSymbol(sym);
    symbolRenderRender();
    const polys = rig.gSymbols.querySelectorAll("polygon");
    if (polys.length === 0) throw new Error("Expected at least one body polygon");
    const bodyPts = parsePoints(polys[0].getAttribute("points"));
    if (bodyPts.length !== 4) throw new Error(`Expected 4 body polygon points, got ${bodyPts.length}`);

    // corners(sym) at rot=0: TL=(-hw,-hh), TR=(hw,-hh), BR=(hw,hh), BL=(-hw,hh) + center
    // sym.x=2, sym.y=2, hw=0.6, hh=0.4
    // worldToScreen: *40 at identity
    const expectedWorld = [
      { x: 2 - 0.6, y: 2 - 0.4 },
      { x: 2 + 0.6, y: 2 - 0.4 },
      { x: 2 + 0.6, y: 2 + 0.4 },
      { x: 2 - 0.6, y: 2 + 0.4 },
    ];
    for (let i = 0; i < 4; i++) {
      expect(bodyPts[i].x).toBeCloseTo(expectedWorld[i].x * 40, 4);
      expect(bodyPts[i].y).toBeCloseTo(expectedWorld[i].y * 40, 4);
    }
  });

  it("rotated symbol body points are non-axis-aligned", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const rig = makeRenderRig61();
    const sym = createSymbol("table", 3, 3);
    sym.rot = 45;
    addSymbol(sym);
    symbolRenderRender();
    const polys = rig.gSymbols.querySelectorAll("polygon");
    if (polys.length === 0) throw new Error("Expected body polygon");
    const bodyPts = parsePoints(polys[0].getAttribute("points"));
    // For a 45-degree rotation, x and y of all 4 corners should not all be equal in pairs
    // (i.e., the bounding box has equal width and height but individual x/y differ from axis-aligned)
    const allXSame = bodyPts.every(pt => Math.abs(pt.x - bodyPts[0].x) < 0.01);
    const allYSame = bodyPts.every(pt => Math.abs(pt.y - bodyPts[0].y) < 0.01);
    if (allXSame || allYSame) throw new Error("Rotated symbol points appear axis-aligned");
    // Verify not identical to rot=0 TL/TR
    const unrotatedTLX = (3 - sym.w / 2) * 40;
    if (Math.abs(bodyPts[0].x - unrotatedTLX) < 0.1) {
      throw new Error("Rotated symbol TL x matches non-rotated value — rotation not applied");
    }
  });

  it("unselected symbol: stroke=symStroke, stroke-width=1.5, fill=symFill", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    themeSetTheme("dark");
    const rig = makeRenderRig61({ getSelectedId: () => null });
    addSymbol(createSymbol("table", 2, 2));
    symbolRenderRender();
    const p = palette();
    const poly = rig.gSymbols.querySelectorAll("polygon")[0];
    if (!poly) throw new Error("No body polygon found");
    if (poly.getAttribute("stroke") !== p.symStroke) {
      throw new Error(`Unselected: expected stroke=${p.symStroke}, got ${poly.getAttribute("stroke")}`);
    }
    if (poly.getAttribute("stroke-width") !== "1.5") {
      throw new Error(`Unselected: expected stroke-width=1.5, got ${poly.getAttribute("stroke-width")}`);
    }
    if (poly.getAttribute("fill") !== p.symFill) {
      throw new Error(`Unselected: expected fill=${p.symFill}, got ${poly.getAttribute("fill")}`);
    }
  });

  it("selected symbol: stroke=gold, stroke-width=2, fill=symSelFill + selection-box + rotate handle in #overlay", () => {
    resetAll();
    setUnit("m");
    view.zoom = 1; view.panX = 0; view.panY = 0;
    themeSetTheme("dark");
    const sym = createSymbol("table", 2, 2);
    addSymbol(sym);
    const rig = makeRenderRig61({ getSelectedId: () => sym.id });
    symbolRenderRender();
    const p = palette();
    // Body polygon should have selected styling
    const bodyPoly = rig.gSymbols.querySelectorAll("polygon")[0];

// ── Rect helpers ─────────────────────────────────────────────────────────────

/** Returns true if rects a and b overlap (share interior area). */
function rectsOverlap(a, b) {
  return !(a.right <= b.left || b.right <= a.left ||
           a.bottom <= b.top || b.bottom <= a.top);
}

/**
 * Returns true if rect inner is entirely within rect outer, within tol pixels.
 * @param {DOMRect} inner
 * @param {DOMRect} outer
 * @param {number} [tol=1]
 */
function rectInside(inner, outer, tol = 1) {
  return (
    inner.left   >= outer.left   - tol &&
    inner.right  <= outer.right  + tol &&
    inner.top    >= outer.top    - tol &&
    inner.bottom <= outer.bottom + tol
  );
}

/**
 * Fixed-size stage rig for dimEntry/symbolDimEntry layout tests.
 * Sets stage to an explicit 800×600 position:relative container so that
 * getBoundingClientRect() reflects the JS-set style.left/top values.
 * Returns { stage, dimLabels, cleanup }.
 */
function makeLayoutDimRig() {
  const stage = document.createElement("div");
  stage.className = "stage";
  stage.style.position = "relative";
  stage.style.width = "800px";
  stage.style.height = "600px";
  stage.style.overflow = "hidden";
  const dimLabels = document.createElement("div");
  dimLabels.className = "dim-labels";
  stage.appendChild(dimLabels);
  document.body.appendChild(stage);
  return {
    stage, dimLabels,
    cleanup() { document.body.removeChild(stage); },
  };
}

// ─── Category 5: grid.drawGrid line placement ─────────────────────────────────

describe("grid.drawGrid — line placement", () => {
  it("line count is nonzero and matches hand-computed index range", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const NS_G = "http://www.w3.org/2000/svg";
    const g = document.createElementNS(NS_G, "g");
    const W = 800, H = 600;
    drawGrid(g, W, H);
    const lines = g.querySelectorAll("line");
    if (lines.length === 0) throw new Error("drawGrid emitted 0 lines");
    // At identity view: step = chooseGridStep(56) at zoom=1, pxPerM=40
    // step*40 >= 56 → step=2 (2*40=80 >= 56)
    // topLeft=screenToWorld(0,0)=(0,0), botRight=screenToWorld(800,600)=(20,15)
    // iXMin=floor(0/2)-1=-1, iXMax=ceil(20/2)+1=11 → 13 vertical lines
    // iYMin=floor(0/2)-1=-1, iYMax=ceil(15/2)+1=9 → 11 horizontal lines
    // Total = 24; allow ±4 due to floating-point ceiling differences
    const step = chooseGridStep(56);
    // Inline screenToWorld for hand-computed index range (view is identity)
    const s2w = (sx, sy) => {
      const ppm = view.zoom * BASE_PX_PER_M;
      return { x: (sx - view.panX) / ppm, y: (sy - view.panY) / ppm };
    };
    const tl = s2w(0, 0), br = s2w(W, H);
    const iXMin = Math.floor(tl.x / step) - 1;
    const iXMax = Math.ceil(br.x / step) + 1;
    const iYMin = Math.floor(tl.y / step) - 1;
    const iYMax = Math.ceil(br.y / step) + 1;
    const expectedCount = (iXMax - iXMin + 1) + (iYMax - iYMin + 1);
    if (lines.length !== expectedCount) {
      throw new Error(`Expected ${expectedCount} lines, got ${lines.length}`);
    }
  });

  it("adjacent grid-major vertical lines differ in x by MAJOR_EVERY * step * pxPerM()", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const NS_G = "http://www.w3.org/2000/svg";
    const g = document.createElementNS(NS_G, "g");
    drawGrid(g, 800, 600);
    const majorVerticals = Array.from(g.querySelectorAll("line.grid-major")).filter(l => {
      // vertical lines have x1 === x2
      return parseFloat(l.getAttribute("x1")) === parseFloat(l.getAttribute("x2"));
    });
    if (majorVerticals.length < 2) {
      throw new Error(`Need ≥2 major vertical lines, got ${majorVerticals.length}`);
    }
    // Sort by x1
    majorVerticals.sort((a, b) => parseFloat(a.getAttribute("x1")) - parseFloat(b.getAttribute("x1")));
    const step = chooseGridStep(56);
    const expectedSpacing = MAJOR_EVERY * step * pxPerM();
    for (let i = 1; i < majorVerticals.length; i++) {
      const dx = parseFloat(majorVerticals[i].getAttribute("x1")) - parseFloat(majorVerticals[i-1].getAttribute("x1"));
      if (Math.abs(dx - expectedSpacing) > 1) {
        throw new Error(`Major vertical spacing ${dx.toFixed(2)} expected ~${expectedSpacing.toFixed(2)}`);
      }
    }
  });

  it("vertical lines span full height (y1≈0, y2≈600) and horizontal lines span full width (x1≈0, x2≈800)", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const NS_G = "http://www.w3.org/2000/svg";
    const g = document.createElementNS(NS_G, "g");
    const W = 800, H = 600;
    drawGrid(g, W, H);
    const TOL = 1;
    // Check vertical lines: x1===x2, y1≈0, y2≈H
    const allLines = Array.from(g.querySelectorAll("line"));
    for (const line of allLines) {
      const x1 = parseFloat(line.getAttribute("x1"));
      const y1 = parseFloat(line.getAttribute("y1"));
      const x2 = parseFloat(line.getAttribute("x2"));
      const y2 = parseFloat(line.getAttribute("y2"));
      if (Math.abs(x1 - x2) < TOL) {
        // vertical line
        if (Math.abs(y1 - 0) > TOL) throw new Error(`Vertical line y1=${y1} expected ≈0`);
        if (Math.abs(y2 - H) > TOL) throw new Error(`Vertical line y2=${y2} expected ≈${H}`);
      } else {
        // horizontal line
        if (Math.abs(x1 - 0) > TOL) throw new Error(`Horizontal line x1=${x1} expected ≈0`);
        if (Math.abs(x2 - W) > TOL) throw new Error(`Horizontal line x2=${x2} expected ≈${W}`);
      }
    }
  });

  it("idempotent redraw: calling drawGrid twice yields the same line count", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const NS_G = "http://www.w3.org/2000/svg";
    const g = document.createElementNS(NS_G, "g");
    drawGrid(g, 800, 600);
    const count1 = g.querySelectorAll("line").length;
    drawGrid(g, 800, 600);
    const count2 = g.querySelectorAll("line").length;
    if (count1 !== count2) {
      throw new Error(`Idempotent redraw: first=${count1}, second=${count2}`);
    }
    if (count1 === 0) throw new Error("drawGrid emitted 0 lines");
  });
});

describe("LLD-69 — round table footprint (box hit-test semantics)", () => {
  it("hitTest true at center of dining-table-round", () => {
    const s = createSymbol("dining-table-round", 5, 5);
    if (!hitTest(s, 5, 5)) throw new Error("hitTest should be true at center");
  });

  it("hitTest: point inside box corner (outside inscribed circle) is INSIDE (box governs)", () => {
    // dining-table-round default: w=1.20, h=1.20, center=(5,5)
    // Box extends ±0.60 in each axis. Inscribed circle radius ~0.60.
    // Corner of box at (5+0.55, 5+0.55) — inside box, outside inscribed circle
    const s = createSymbol("dining-table-round", 5, 5);
    const cornerX = 5 + 0.55;
    const cornerY = 5 + 0.55;
    // Verify this point IS outside the inscribed circle
    const dist = Math.sqrt((cornerX - 5) * (cornerX - 5) + (cornerY - 5) * (cornerY - 5));
    if (dist <= s.w / 2) throw new Error("Test point should be outside inscribed circle, dist=" + dist);
    // But should be inside box
    if (!hitTest(s, cornerX, cornerY)) throw new Error("hitTest should be true for point inside box (corner area)");
  });

  it("hitTest: point just outside the w*h box (but inside circumscribed circle) is OUTSIDE", () => {
    // dining-table-round default: w=1.20, h=1.20, center=(5,5)
    // Point at (5+0.65, 5) — outside box (0.65 > 0.60 half-width), inside circumscribed circle
    const s = createSymbol("dining-table-round", 5, 5);
    const outsideX = 5 + 0.65;
    if (hitTest(s, outsideX, 5)) throw new Error("hitTest should be false for point outside box");
  });

  it("corners() for rotated round table match the box (geometry unchanged)", () => {
    const s = createSymbol("dining-table-round", 0, 0);
    s.rot = 45;
    const cs = corners(s);
    // 4 corners returned
    if (cs.length !== 4) throw new Error("corners() should return 4 points");
    // Each corner should be at distance sqrt(2)*0.6 from center (diagonal of 1.2x1.2 box)
    const expectedDist = Math.sqrt(2) * 0.60;
    for (const c of cs) {
      const d = Math.sqrt(c.x * c.x + c.y * c.y);
      if (Math.abs(d - expectedDist) > 1e-6) throw new Error("Corner distance wrong: " + d + " expected ~" + expectedDist);
    }
  });

  it("aabb() for rotated round table returns bounding box", () => {
    const s = createSymbol("dining-table-round", 2, 3);
    s.rot = 45;
    const box = symAabb34(s);
    // For a 1.2x1.2 square rotated 45 degrees, the AABB is sqrt(2)*1.2/2 wider
    const expectedHalfSpan = Math.sqrt(2) * 0.60;
    if (Math.abs(box.cx - 2) > 1e-6) throw new Error("aabb cx wrong: " + box.cx);
    if (Math.abs(box.cy - 3) > 1e-6) throw new Error("aabb cy wrong: " + box.cy);
    if (Math.abs((box.maxX - box.minX) / 2 - expectedHalfSpan) > 1e-6) throw new Error("aabb half-width wrong");
  });
});

  it("a symbol added mid-drag is NOT grabbed (membership snapshotted at down)", () => {

    const late = createSymbol("chair", 2, 2); addSymbol(late); // added AFTER down

  it("a door seated ON the room's wall IS carried (center on the boundary; pointInRoom would miss it)", () => {

    roomSetHistoryAndToast({ commit: () => {} }, () => {});
    roomSetClearSymbolSelection(() => {});
    initRoomTool({ stage: document.createElement("div") });

    ]});
    // Door cut into the BOTTOM wall: center on the edge y=4. This point gives
    // pointInRoom === FALSE (the even-odd ray cast excludes it), so the OLD
    // interior-only rule would leave it behind — the wall-proximity rule carries

    // A far-inside chair as a control (carried by the interior rule).

    roomOnSelectMove(120, 80);          // dx=+1, dy=0

    expect(door.x).toBeCloseTo(3, 9);
    expect(door.y).toBeCloseTo(4, 9);
    // Chair still carried too.
    expect(chair.x).toBeCloseTo(3, 9);

  it("a door on a DIFFERENT room's wall is NOT carried (per-room segment scoping)", () => {

    roomSetHistoryAndToast({ commit: () => {} }, () => {});
    roomSetClearSymbolSelection(() => {});
    initRoomTool({ stage: document.createElement("div") });

    // Room A (moved) at (0,0)-(4,4); Room B far away at (10,10)-(14,14).
    model.rooms.push({ id: "ra", closed: true, verts: [

      { x: 10, y: 10 }, { x: 14, y: 10 }, { x: 14, y: 14 }, { x: 10, y: 14 },

    roomOnSelectDown(80, 80);           // selects room A (world 2,2)
    roomOnSelectMove(120, 80);          // dx=+1
    roomOnSelectUp(120, 80);

    // Room B's door is untouched — the carry test only measures A's own segments.
    expect(bDoor.x).toBe(12);
    expect(bDoor.y).toBe(10);
    roomClearSelection();
  });
});

describe("LLD 63 — selection mutex (room ↔ symbol, the HIGH fix)", () => {
  // Model the dispatcher directly: symbols win ties; picking one clears the other.
  // (The dispatcher itself lives in main.js and isn't unit-reachable, so we call
  //  the tool APIs the way main.js wires them.)
  function _wireMutex() {
    // roomTool clears symbol selection on its own room-hit success path.
    roomSetClearSymbolSelection(symClearSelectionMutex);
  }

  it("select symbol → select room: room is selected, symbol deselected", () => {
    _resetRoomTool();
    // Init both tools with stub DOM.
    const { dock, insp } = _buildSymbolToolDOM();
    initSymbolToolMutex({ stage: document.createElement("div"), dock, inspector: insp, setTool: () => {}, isDrawMode: () => false });
    roomSetHistoryAndToast({ commit: () => {} }, () => {});
    initRoomTool({ stage: document.createElement("div") });
    _wireMutex();

    // A room covering the interior, and a symbol at (2,2) inside it.
    model.rooms.push({ id: "mx0", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 4 }, { x: 0, y: 4 },
    ]});
    const sym = createSymbol("chair", 2, 2); addSymbol(sym);

    // First select the symbol (screen 80,80 = world 2,2).
    expect(symOnSelectDownMutex(80, 80)).toBe(true);
    expect(symHasSelectionMutex()).toBe(true);

    // Now click bare room floor away from the symbol. Symbol is 'chair' (~0.45m)
    // centered at (2,2); click at world(0.3,0.3)=screen(12,12) misses the symbol.
    // Emulate the dispatcher: symbols try first, miss, then roomTool consumes.
    const symConsumed = symOnSelectDownMutex(12, 12);
    expect(symConsumed).toBe(false);
    const roomConsumed = roomOnSelectDown(12, 12);
    expect(roomConsumed).toBe(true);

    // The room is selected; the symbol was cleared by the injected mutex.
    expect(roomGetSelectedRoomId()).toBe("mx0");
    expect(symHasSelectionMutex()).toBe(false);
    roomClearSelection();
    symClearSelectionMutex();
  });

  it("select room → select symbol: symbol is selected, room deselected (dispatcher order)", () => {
    _resetRoomTool();
    const { dock, insp } = _buildSymbolToolDOM();
    initSymbolToolMutex({ stage: document.createElement("div"), dock, inspector: insp, setTool: () => {}, isDrawMode: () => false });
    roomSetHistoryAndToast({ commit: () => {} }, () => {});
    initRoomTool({ stage: document.createElement("div") });
    _wireMutex();

    model.rooms.push({ id: "mx1", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 4 }, { x: 0, y: 4 },
    ]});
    const sym = createSymbol("chair", 2, 2); addSymbol(sym);

    // Select the room first (click bare floor at world 0.3,0.3).
    expect(roomOnSelectDown(12, 12)).toBe(true);
    expect(roomHasSelection()).toBe(true);

    // Now click the symbol. Dispatcher: symbolTool tries first and consumes;
    // main.js then calls roomClearSelection() (the mutex on a symbol hit).
    const symConsumed = symOnSelectDownMutex(80, 80); // world(2,2) hits the chair
    expect(symConsumed).toBe(true);
    roomClearSelection(); // dispatcher does this on a symbol hit
    expect(symHasSelectionMutex()).toBe(true);
    expect(roomHasSelection()).toBe(false);
    expect(roomGetSelectedRoomId()).toBe(null);
    roomClearSelection();
    symClearSelectionMutex();
  });

  it("dock-drop placement (selectSymbol, bypasses dispatcher) still clears the room selection", () => {
    // Regression for the mutex gap: dock drag-drop calls selectSymbol() directly,
    // NOT through the main.js dispatcher, so the reverse injection
    // (setClearRoomSelection) must fire from inside selectSymbol — otherwise a
    // room stays selected under the just-placed symbol (dual selection footgun).
    _resetRoomTool();
    const { dock, insp } = _buildSymbolToolDOM();
    initSymbolToolMutex({ stage: document.createElement("div"), dock, inspector: insp, setTool: () => {}, isDrawMode: () => false });
    roomSetHistoryAndToast({ commit: () => {} }, () => {});
    initRoomTool({ stage: document.createElement("div") });
    _wireMutex();
    // Wire the REVERSE injection the way main.js does.
    symSetClearRoomSelectionMutex(roomClearSelection);

    model.rooms.push({ id: "mx2", closed: true, verts: [
      { x: 0, y: 0 }, { x: 4, y: 0 }, { x: 4, y: 4 }, { x: 0, y: 4 },
    ]});

    // Select the room first.
    expect(roomOnSelectDown(12, 12)).toBe(true);
    expect(roomHasSelection()).toBe(true);

    // Simulate a dock drop landing inside the room: selectSymbol directly.
    const dropped = createSymbol("chair", 2, 2); addSymbol(dropped);
    symSelectSymbolMutex(dropped.id);

    // The placed symbol is selected AND the room selection was dropped by the mutex.
    expect(symHasSelectionMutex()).toBe(true);
    expect(roomHasSelection()).toBe(false);
    expect(roomGetSelectedRoomId()).toBe(null);
    roomClearSelection();
    symClearSelectionMutex();
  });
});

const LLD76_TYPES = ["patio-table", "patio-chair", "parasol", "planter"];

describe("LLD 76 — catalog integrity: patio-table, patio-chair, parasol, planter", () => {

    }
  });

  it("all four have finite w, h, per-axis bounds", () => {
    for (const t of LLD76_TYPES) {
      const cat = CATALOG[t];
      for (const key of ["w", "h", "min_w", "max_w", "min_h", "max_h"]) {
        if (!isFinite(cat[key])) throw new Error(`${t}.${key} is not finite: ${cat[key]}`);
      }
    }
  });

  it("min_w <= w <= max_w and min_h <= h <= max_h for all four", () => {
    for (const t of LLD76_TYPES) {
      const { w, h, min_w, max_w, min_h, max_h } = CATALOG[t];
      if (w < min_w || w > max_w) throw new Error(`${t}: w=${w} not in [${min_w},${max_w}]`);
      if (h < min_h || h > max_h) throw new Error(`${t}: h=${h} not in [${min_h},${max_h}]`);
    }
  });

    for (const t of LLD76_TYPES) {

      for (const p of presets || []) {
        if (p.w < min_w || p.w > max_w) throw new Error(`${t} preset ${p.name}: w=${p.w} not in [${min_w},${max_w}]`);
        if (p.h < min_h || p.h > max_h) throw new Error(`${t} preset ${p.name}: h=${p.h} not in [${min_h},${max_h}]`);
      }
    }
  });

  it("none of the four has openings:true", () => {

    expect(CATALOG["patio-table"].category).toBe("outdoor");
  });

  it("spot-check: CATALOG['patio-chair'].category === 'outdoor'", () => {
    expect(CATALOG["patio-chair"].category).toBe("outdoor");
  });

  it("spot-check: CATALOG['parasol'].category === 'outdoor'", () => {
    expect(CATALOG["parasol"].category).toBe("outdoor");
  });

  it("spot-check: CATALOG['planter'].category === 'outdoor'", () => {

describe("LLD 77 — buildCompact / parseCompact: round-trip (plan.js)", () => {
  it("round-trip on a snapped plan is lossless (geometry/unit; ids/view regenerated)", () => {
    resetAll();
    setUnit("m");
    // Snapped coords: multiples of 0.1 m — lossless at 1 mm resolution
    model.rooms.push({ id: "w0", closed: true, verts: [{ x: 0, y: 0 }, { x: 3, y: 0 }, { x: 3, y: 4 }, { x: 0, y: 4 }] });

    addSymbol(sym);
