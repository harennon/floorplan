<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalog: fireplace type (focal element) — mockup</title>
<style>
  :root {
    --bg: #14140f; --bg-deep: #100f0b; --ink: #ece7d6; --muted: #8f8a78;
    --gold: #c9a84c; --gold-soft: rgba(201,168,76,0.55);
    --sym-fill: rgba(201,168,76,0.12); --sym-stroke: #d9be6e;
    --sym-sel-fill: rgba(201,168,76,0.18); --sym-ink-rgb: 201,168,76;
    --ghost-fill: rgba(201,168,76,0.25); --snap-teal: #7fd0c8;
    --panel: #1b1a13; --hairline: rgba(201,168,76,0.18);
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px) 0 0 / 24px 24px,
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px) 0 0 / 24px 24px,
      var(--bg);
    color: var(--ink); font-family: var(--font-sans);
    line-height: 1.5; padding: 2rem 1.25rem 5rem;
  }
  .page-head { max-width: 60rem; margin: 0 auto 2rem; }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 0.5rem; letter-spacing: -0.01em; }
  h1 code, .sub b { color: var(--gold); }
  h1 code { font-family: var(--font-mono); font-size: 0.9em; }
  .sub { color: var(--muted); max-width: 44rem; margin: 0; font-size: 0.92rem; }
  .page { max-width: 60rem; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
  .block {
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 1.4rem 1.5rem;
  }
  .block h2 {
    font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--gold); margin: 0 0 0.35rem;
  }
  .block .note { color: var(--muted); font-size: 0.85rem; margin: 0 0 1.1rem; max-width: 42rem; }
  .block .note code { font-family: var(--font-mono); color: var(--ink); font-size: 0.9em; }

  /* SVG canvas surface (graph paper) */
  .canvas-wrap { position: relative; }
  svg.stage {
    display: block; width: 100%; height: auto; border-radius: 8px;
    background:
      linear-gradient(rgba(127,208,200,0.07) 1px, transparent 1px) 0 0 / 26px 26px,
      linear-gradient(90deg, rgba(127,208,200,0.07) 1px, transparent 1px) 0 0 / 26px 26px,
      var(--bg-deep);
    border: 1px solid var(--hairline);
  }
  .caption { color: var(--muted); font-size: 0.78rem; margin-top: 0.6rem; font-family: var(--font-mono); }
  .caption b { color: var(--snap-teal); font-weight: 500; }

  /* Dock (mirrors src/index.html) */
  .dock-demo {
    display: inline-flex; flex-direction: column; margin-top: 1.1rem;
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 10px; overflow: hidden;
  }
  .dock-tabs { display: flex; border-bottom: 1px solid var(--hairline); }
  .dock-tab {
    background: transparent; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); font-family: var(--font-mono); font-size: 0.52rem;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 0.5rem 0.65rem; cursor: pointer;
  }
  .dock-tab.sel { color: var(--gold); border-bottom-color: var(--gold); background: rgba(201,168,76,0.13); }
  .dock-row { display: flex; gap: 0; padding: 0.35rem 0.5rem; }
  .dock-item {
    background: transparent; border: 1px solid transparent; color: var(--muted);
    font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.04em;
    width: 2.9rem; height: 2.9rem; border-radius: 7px; cursor: grab;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.15rem; padding: 0.2rem 0; transition: color .12s, border-color .12s, background .12s;
  }
  .dock-item:hover { color: var(--gold); border-color: var(--gold-soft); background: rgba(201,168,76,0.07); }
  .dock-item.is-new { color: var(--gold); border-color: var(--gold-soft); background: rgba(201,168,76,0.1); }
  .dock-item.is-new::after {
    content: "NEW"; position: absolute; transform: translate(1.35rem,-1.55rem);
    font-size: 0.4rem; letter-spacing: 0.1em; color: var(--bg-deep);
    background: var(--gold); border-radius: 3px; padding: 0.05rem 0.2rem;
  }
  .dock-item span { line-height: 1; }

  /* Glyph direction cards */
  .glyph-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 1rem; }
  .glyph-card {
    border: 1px solid var(--hairline); border-radius: 10px; padding: 1rem;
    background: var(--bg-deep); display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
    transition: border-color .15s;
  }
  .glyph-card.pick { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold-soft); }
  .glyph-card h3 { font-family: var(--font-mono); font-size: 0.7rem; margin: 0; color: var(--ink); letter-spacing: 0.02em; }
  .glyph-card .badge { font-family: var(--font-mono); font-size: 0.55rem; color: var(--gold); letter-spacing: 0.08em; }
  .glyph-card p { font-size: 0.78rem; color: var(--muted); margin: 0; text-align: center; }
  .glyph-card svg { background: var(--bg); border-radius: 6px; border: 1px solid var(--hairline); }

  /* Presets + data */
  .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.9rem; }
  .chip {
    font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink);
    border: 1px solid var(--hairline); border-radius: 999px; padding: 0.3rem 0.7rem;
    background: rgba(201,168,76,0.05); cursor: pointer; transition: all .12s;
  }
  .chip:hover { border-color: var(--gold-soft); }
  .chip.sel { background: rgba(201,168,76,0.18); border-color: var(--gold); color: var(--gold); }
  .chip .dim { color: var(--muted); }
  table.spec { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.78rem; margin-top: 0.4rem; }
  table.spec th, table.spec td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--hairline); }
  table.spec th { color: var(--muted); font-weight: 500; letter-spacing: 0.05em; font-size: 0.62rem; text-transform: uppercase; }
  table.spec td { color: var(--ink); }
  table.spec td.k { color: var(--gold); }
  pre.code {
    background: var(--bg-deep); border: 1px solid var(--hairline); border-radius: 8px;
    padding: 1rem; overflow-x: auto; font-family: var(--font-mono); font-size: 0.75rem;
    color: var(--ink); margin: 1rem 0 0; line-height: 1.6;
  }
  pre.code .c { color: var(--muted); }
  pre.code .s { color: var(--snap-teal); }
  pre.code .n { color: var(--gold); }
</style>
</head>
<body>
<header class="page-head">
  <h1>Fireplace — new <code>living</code> catalog type</h1>
  <p class="sub">Wall-anchored, shallow-depth focal element. Lets the interior-design skill
  orient seating at a real fireplace (focal priority: <b>fireplace &gt; TV &gt; window &gt; blank wall</b>)
  instead of designating a wall by intent.</p>
</header>

<main class="page">
  <!-- SECTION 1: in-context scene -->
  <section class="block" id="scene-block"></section>
  <!-- SECTION 2: glyph directions -->
  <section class="block" id="glyph-block"></section>
  <!-- SECTION 3: selected state + presets -->
  <section class="block" id="select-block"></section>
  <!-- SECTION 4: catalog data -->
  <section class="block" id="data-block"></section>
</main>

<script></script>
</body>
</html>
