    .case.fail::before { content: "✗ "; color: var(--fail); }

<div id="output"></div>

<script type="module">
// ─── Tiny harness ─────────────────────────────────────────────────────────────

const _suites = [];
let _currentSuite = null;
// Pending async test promises, resolved before rendering results
const _asyncCases = [];

function describe(name, fn) {
  _currentSuite = { name, cases: [] };
  _suites.push(_currentSuite);
  fn();
  _currentSuite = null;
}

function it(name, fn) {
  const caseObj = { name, err: null };
  _currentSuite.cases.push(caseObj);
  let result;
  try { result = fn(); } catch (e) { caseObj.err = e; return; }
  // If the function returned a Promise, track it as async
  if (result && typeof result.then === "function") {
    const pending = result.then(
      () => { /* pass */ },
      (e) => { caseObj.err = e || new Error("async test failed"); }
    );
    _asyncCases.push(pending);
  }
}

function expect(actual) {
  return {
    toBe(expected) {
      if (actual !== expected) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    },
    toBeCloseTo(expected, places = 10) {
      const eps = Math.pow(10, -places);
      if (Math.abs(actual - expected) > eps) {
        throw new Error(`Expected ~${expected} (within 1e-${places}), got ${actual}`);
      }
    },
    toBeGreaterThanOrEqual(n) {
      if (actual < n) throw new Error(`Expected >= ${n}, got ${actual}`);
    },
    toBeLessThanOrEqual(n) {
      if (actual > n) throw new Error(`Expected <= ${n}, got ${actual}`);
    },
    toThrow() {
      let threw = false;
      try { actual(); } catch { threw = true; }
      if (!threw) throw new Error("Expected function to throw");
    },
  };
}

function render() {
  const out = document.getElementById("output");
  let total = 0, failed = 0;
  for (const suite of _suites) {
    const div = document.createElement("div");
    div.className = "suite";
    div.innerHTML = `<div class="suite-name">${suite.name}</div>`;
    for (const c of suite.cases) {
      total++;
      const p = document.createElement("div");
      p.className = `case ${c.err ? "fail" : "pass"}`;
      p.textContent = c.name + (c.err ? ` — ${c.err.message}` : "");
      div.appendChild(p);
      if (c.err) failed++;
    }
    out.appendChild(div);
  }
  const summary = document.createElement("div");
  summary.className = `summary ${failed ? "has-fail" : "all-pass"}`;
  summary.textContent = failed
    ? `${failed} of ${total} tests FAILED`
    : `All ${total} tests passed`;
  out.appendChild(summary);
  // Expose result for headless CI runner (read via window.__testResult).
  // failures[] is included so run-tests.mjs can print per-case details in CI logs.
  const failures = [];
  for (const suite of _suites) {
    for (const c of suite.cases) {
      if (c.err) failures.push({ suite: suite.name, name: c.name, error: c.err.message });
    }
  }
  window.__testResult = { total, failed, passed: total - failed, failures };
}

describe("view.js — pxPerM", () => {
  it("returns BASE_PX_PER_M at zoom 1", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    expect(pxPerM()).toBe(BASE_PX_PER_M);

  });

  it("scales with zoom", () => {

    expect(pxPerM()).toBe(20);
    view.zoom = 1; // reset
  });
});

describe("view.js — worldToScreen / screenToWorld round-trip", () => {
  function roundTrip(wx, wy, zoom, panX, panY) {
    view.zoom = zoom; view.panX = panX; view.panY = panY;
    const s = worldToScreen(wx, wy);
    const w = screenToWorld(s.x, s.y);
    expect(w.x).toBeCloseTo(wx, 9);
    expect(w.y).toBeCloseTo(wy, 9);
  }

  it("round-trips at zoom=1 pan=0", () => roundTrip(5, 3, 1, 0, 0));
  it("round-trips at zoom=2 pan=100,50", () => roundTrip(5, 3, 2, 100, 50));
  it("round-trips at zoom=0.5 pan=-200,300", () => roundTrip(10, -7, 0.5, -200, 300));
  it("round-trips at origin", () => roundTrip(0, 0, 1, 0, 0));
  it("5m span maps to 200px at zoom=1 pan=0", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const s0 = worldToScreen(0, 0);
    const s5 = worldToScreen(5, 0);
    expect(s5.x - s0.x).toBe(200);
  });
  it("screenToWorld is exact inverse across range", () => {
    for (const [sx, sy, z, px, py] of [
      [320, 240, 1, 0, 0],
      [0, 0, 3, 50, 75],
      [1920, 1080, 0.25, -100, -200],
    ]) {
      view.zoom = z; view.panX = px; view.panY = py;
      const w = screenToWorld(sx, sy);
      const back = worldToScreen(w.x, w.y);
      expect(back.x).toBeCloseTo(sx, 9);
      expect(back.y).toBeCloseTo(sy, 9);
    }
  });
});

describe("view.js — clampZoom", () => {

    expect(clampZoom(2.5)).toBe(2.5);

    expect(clampZoom(0)).toBe(MIN_ZOOM);
    expect(clampZoom(-5)).toBe(MIN_ZOOM);
    expect(clampZoom(MIN_ZOOM)).toBe(MIN_ZOOM);
  });
  it("clamps at MAX_ZOOM", () => {
    expect(clampZoom(100)).toBe(MAX_ZOOM);
    expect(clampZoom(MAX_ZOOM)).toBe(MAX_ZOOM);

});

describe("view.js — zoomAbout", () => {
  it("keeps world point under anchor fixed (mid zoom)", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    const sx = 200, sy = 150;
    const wBefore = screenToWorld(sx, sy);
    zoomAbout(sx, sy, 2);
    const wAfter = screenToWorld(sx, sy);
    expect(wAfter.x).toBeCloseTo(wBefore.x, 9);
    expect(wAfter.y).toBeCloseTo(wBefore.y, 9);
  });

  it("keeps world point fixed when clamped at MAX_ZOOM (no drift)", () => {
    view.zoom = MAX_ZOOM; view.panX = 0; view.panY = 0;
    const sx = 300, sy = 200;
    const wBefore = screenToWorld(sx, sy);
    zoomAbout(sx, sy, 10); // would exceed MAX
    const wAfter = screenToWorld(sx, sy);
    expect(view.zoom).toBe(MAX_ZOOM);
    expect(wAfter.x).toBeCloseTo(wBefore.x, 9);
    expect(wAfter.y).toBeCloseTo(wBefore.y, 9);
  });

  it("keeps world point fixed when clamped at MIN_ZOOM (no drift)", () => {
    view.zoom = MIN_ZOOM; view.panX = 50; view.panY = 50;
    const sx = 100, sy = 100;
    const wBefore = screenToWorld(sx, sy);
    zoomAbout(sx, sy, 0.001); // would go below MIN
    const wAfter = screenToWorld(sx, sy);
    expect(view.zoom).toBe(MIN_ZOOM);
    expect(wAfter.x).toBeCloseTo(wBefore.x, 9);
    expect(wAfter.y).toBeCloseTo(wBefore.y, 9);
  });

  it("zoom changes by factor in unclamped range", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    zoomAbout(0, 0, 2);
    expect(view.zoom).toBeCloseTo(2, 9);
  });
});

describe("grid.js — NICE_STEPS", () => {
  it("contains expected steps in ascending order", () => {
    expect(NICE_STEPS[0]).toBe(0.1);
    expect(NICE_STEPS[NICE_STEPS.length - 1]).toBe(100);
    for (let i = 1; i < NICE_STEPS.length; i++) {
      if (NICE_STEPS[i] <= NICE_STEPS[i - 1]) throw new Error("NICE_STEPS not ascending");
    }
  });
  it("MAJOR_EVERY is 5", () => expect(MAJOR_EVERY).toBe(5));
});

describe("grid.js — chooseGridStep", () => {
  function assertSpacingInBand(zoom, targetPx) {
    view.zoom = zoom; view.panX = 0; view.panY = 0;
    const step = chooseGridStep(targetPx);
    const spacing = step * pxPerM();
    // Spacing must be >= targetPx.
    expect(spacing).toBeGreaterThanOrEqual(targetPx);
    // And less than twice the next-smaller step's spacing (i.e., we picked the smallest qualifying step).
    const idx = NICE_STEPS.indexOf(step);
    if (idx > 0) {
      const prevSpacing = NICE_STEPS[idx - 1] * pxPerM();
      // prevSpacing < targetPx — otherwise chooseGridStep would have returned the smaller step.
      if (prevSpacing >= targetPx) throw new Error(`Chose a larger step than necessary: step=${step}, prevSpacing=${prevSpacing}`);
    }
  }

  it("returns correct step at zoom=1 (40px/m)", () => assertSpacingInBand(1, 56));
  it("returns correct step at zoom=0.5 (20px/m)", () => assertSpacingInBand(0.5, 56));
  it("returns correct step at zoom=4 (160px/m)", () => assertSpacingInBand(4, 56));
  it("returns correct step at zoom=0.2 (8px/m)", () => assertSpacingInBand(0.2, 56));
  it("returns correct step at zoom=8 (320px/m)", () => assertSpacingInBand(8, 56));

  it("spacing is always >= targetPx across all zoom values", () => {
    const zooms = [0.15, 0.25, 0.5, 1, 2, 4, 8];
    for (const z of zooms) {
      view.zoom = z;
      const step = chooseGridStep(56);
      const spacing = step * pxPerM();
      expect(spacing).toBeGreaterThanOrEqual(56);
    }
    view.zoom = 1; // reset
  });

  it("falls back to largest step when nothing qualifies (tiny zoom)", () => {
    // At MIN_ZOOM (0.15), pxPerM = 6. Even 100m * 6 = 600 >= 56, so it won't
    // fall back. But at artificially small scale we can force the fallback.
    view.zoom = 0.001;
    const step = chooseGridStep(1e9); // impossible target
    expect(step).toBe(NICE_STEPS[NICE_STEPS.length - 1]);
    view.zoom = 1;
  });
});

// ─── Tests: walls.js — closestEndpoint ───────────────────────────────────────

describe("walls.js — closestEndpoint", () => {
  it("returns null when candidate list is empty", () => {
    setView(1, 0, 0);
    const r = closestEndpoint(100, 100, [], null, SNAP_PT_PX);
    expect(r).toBe(null);
  });

  it("returns null when all candidates are outside tolPx", () => {
    setView(1, 0, 0);
    // vertex at world (5,5) = screen (200,200)
    const verts = [{ x: 5, y: 5 }];
    // cursor at screen (220,220): dist = ~28px > 15px
    const r = closestEndpoint(220, 220, verts, null, SNAP_PT_PX);
    expect(r).toBe(null);
  });

  it("returns vertex when cursor is within tolPx", () => {
    setView(1, 0, 0);
    // vertex at world (5,5) = screen (200,200)
    const v = { x: 5, y: 5 };
    const r = closestEndpoint(205, 200, [v], null, SNAP_PT_PX); // dist=5 < 15
    if (r === null) throw new Error("Expected a vertex, got null");
    expect(r.x).toBe(5);
    expect(r.y).toBe(5);
  });

  it("excludes the skip vertex", () => {
    setView(1, 0, 0);
    const v = { x: 5, y: 5 };
    const r = closestEndpoint(200, 200, [v], v, SNAP_PT_PX);
    expect(r).toBe(null);
  });

  it("returns the nearest of two candidates within tolerance", () => {
    setView(1, 0, 0);
    const v1 = { x: 5, y: 5 };   // screen (200,200)
    const v2 = { x: 5.1, y: 5 }; // screen (204,200)
    // cursor at (201,200): v1 is closer
    const r = closestEndpoint(201, 200, [v1, v2], null, SNAP_PT_PX);
    if (r === null) throw new Error("Expected a vertex");
    expect(r.x).toBe(5);
  });

  it("screen-space tolerance changes with zoom: same world gap, different tolerances", () => {
    const v = { x: 5, y: 5 };
    // At zoom=1: screen (200,200). Cursor at (210,200): dist=10 < 15 → found.
    setView(1, 0, 0);
    const r1 = closestEndpoint(210, 200, [v], null, SNAP_PT_PX);
    if (r1 === null) throw new Error("zoom=1: expected snap");

    // At zoom=0.15: pxPerM=6, screen(5*6,5*6)=(30,30). Cursor at (40,30): dist=10 < 15 → found.
    setView(0.15, 0, 0);
    const r2 = closestEndpoint(40, 30, [v], null, SNAP_PT_PX);
    if (r2 === null) throw new Error("zoom=0.15: expected snap");

    // Same vertex; both zoom levels within tolerance → equal vertex coords.
    expect(r1.x).toBe(r2.x);
  });

  it("cursor just beyond tolPx returns null, just within returns vertex", () => {
    setView(1, 0, 0);
    const v = { x: 0, y: 0 }; // screen (0,0)
    // exactly at boundary: dist=15 → should be found (<=)
    const atBoundary = closestEndpoint(15, 0, [v], null, SNAP_PT_PX);
    if (atBoundary === null) throw new Error("Expected snap at exactly tolPx");
    // just beyond: dist=16 > 15
    const beyond = closestEndpoint(16, 0, [v], null, SNAP_PT_PX);
    expect(beyond).toBe(null);
  });
});

// ─── Tests: walls.js — resolveSnap ───────────────────────────────────────────

describe("walls.js — resolveSnap: close priority", () => {
  it("returns close when chain >= 3 and cursor near chain[0]", () => {
    setView(1, 0, 0);
    // chain[0] at world(0,0) = screen(0,0); chain has 3 verts
    const chain = [{x:0,y:0},{x:1,y:0},{x:0.5,y:1}];
    const rooms = [];
    // cursor at screen(5,0): dist=5 <= CLOSE_PX(16)
    const snap = resolveSnap(5, 0, { chain, rooms, altHeld: false, step: 1 });
    expect(snap.type).toBe("close");
    expect(snap.x).toBe(0);
    expect(snap.y).toBe(0);
  });

  it("returns close even when a grid point is also near", () => {
    setView(1, 0, 0);
    // chain[0] at world(0,0) = screen(0,0)
    const chain = [{x:0,y:0},{x:5,y:0},{x:2.5,y:5}];
    // cursor exactly at screen(0,0) — right on a grid intersection too
    const snap = resolveSnap(0, 0, { chain, rooms: [], altHeld: false, step: 1 });
    expect(snap.type).toBe("close");
  });

  it("does NOT return close with < 3 chain verts even if cursor is on chain[0]", () => {
    setView(1, 0, 0);
    const chain = [{x:0,y:0},{x:5,y:0}];
    // cursor at screen(0,0): on chain[0] but only 2 verts
    const snap = resolveSnap(0, 0, { chain, rooms: [], altHeld: false, step: 1 });
    // Should be point (chain[0] is a vertex) or grid — not close
    if (snap.type === "close") throw new Error("Got close with only 2-vert chain");
  });
});

describe("walls.js — resolveSnap: point priority", () => {
  it("returns point when cursor is within SNAP_PT_PX of a vertex", () => {
    setView(1, 0, 0);
    // vertex at world(3,3) = screen(120,120)
    const rooms = [{ id:"r0", closed:false, verts:[{x:3,y:3}] }];
    const snap = resolveSnap(125, 120, { chain: [], rooms, altHeld: false, step: 1 });
    expect(snap.type).toBe("point");
    expect(snap.x).toBe(3);
    expect(snap.y).toBe(3);
  });

  it("point returns exact stored coordinates (weld precision)", () => {
    setView(1, 0, 0);
    const stored = { x: 3.7777, y: 2.1111 };
    const rooms = [{ id:"r0", closed:false, verts:[stored] }];
    const s = worldToScreen(stored.x, stored.y);
    const snap = resolveSnap(s.x + 1, s.y, { chain: [], rooms, altHeld: false, step: 1 });
    expect(snap.type).toBe("point");
    expect(snap.x).toBe(stored.x);
    expect(snap.y).toBe(stored.y);
  });

  it("returns grid when cursor is just outside SNAP_PT_PX", () => {
    setView(1, 0, 0);
    // vertex at world(5,5) = screen(200,200)
    const rooms = [{ id:"r0", closed:false, verts:[{x:5,y:5}] }];
    // cursor at (216,200): dist=16 > SNAP_PT_PX(15)
    const snap = resolveSnap(216, 200, { chain: [], rooms, altHeld: false, step: 1 });
    expect(snap.type).toBe("grid");
  });

  it("point beats grid when both are near cursor", () => {

describe("walls.js — rescaleEdge", () => {
  it("rescales horizontal edge to target length exactly", () => {
    const room = { id:"r0", closed:false, verts:[{x:0,y:0},{x:3,y:0},{x:3,y:4}] };
    const ok = rescaleEdge(room, 0, 5);
    expect(ok).toBe(true);
    expect(edgeLength(room.verts[0], room.verts[1])).toBeCloseTo(5, 9);
    // First endpoint unchanged
    expect(room.verts[0].x).toBe(0);
    expect(room.verts[0].y).toBe(0);
  });
  it("direction preserved: rescaled edge collinear with original", () => {
    const room = { id:"r0", closed:false, verts:[{x:0,y:0},{x:3,y:4}] };
    const origDx = 3; const origDy = 4;
    const origLen = Math.sqrt(origDx*origDx+origDy*origDy);
    rescaleEdge(room, 0, 10);
    const newB = room.verts[1];
    // Direction should match: newB / 10 ≈ [3/5, 4/5]
    expect(newB.x / 10).toBeCloseTo(origDx / origLen, 8);
    expect(newB.y / 10).toBeCloseTo(origDy / origLen, 8);
  });
  it("closing edge (edgeIndex n-1) of closed room moves verts[0], keeps verts[n-1] fixed", () => {
    // Triangle
    const v0 = {x:0,y:0}; const v1 = {x:3,y:0}; const v2 = {x:0,y:4};
    const room = { id:"r0", closed:true, verts:[v0,v1,v2] };
    // Edge index 2 = verts[2]→verts[0]
    const origV2x = room.verts[2].x;
    const origV2y = room.verts[2].y;
    const ok = rescaleEdge(room, 2, 2);
    expect(ok).toBe(true);
    // verts[2] unchanged
    expect(room.verts[2].x).toBe(origV2x);
    expect(room.verts[2].y).toBe(origV2y);
    // new closing edge length = 2
    expect(edgeLength(room.verts[2], room.verts[0])).toBeCloseTo(2, 9);
  });
  it("no-op guard: targetLenM < MIN_SEG_M → returns false, geometry unchanged", () => {
    const room = { id:"r0", closed:false, verts:[{x:0,y:0},{x:3,y:0}] };
    const before = {x: room.verts[1].x, y: room.verts[1].y};
    const ok = rescaleEdge(room, 0, MIN_SEG_M * 0.5);
    expect(ok).toBe(false);
    expect(room.verts[1].x).toBe(before.x);
    expect(room.verts[1].y).toBe(before.y);
  });
  it("no-op guard: zero-length edge → returns false", () => {
    const room = { id:"r0", closed:false, verts:[{x:0,y:0},{x:0,y:0}] };
    const ok = rescaleEdge(room, 0, 2);
    expect(ok).toBe(false);
  });
  it("no-op guard: out-of-range edgeIndex → returns false", () => {
    const room = { id:"r0", closed:false, verts:[{x:0,y:0},{x:1,y:0},{x:2,y:0}] };
    // max valid edgeIndex for open room with 3 verts = 1 (edges 0-1, 1-2)
    expect(rescaleEdge(room, 2, 1)).toBe(false);
    expect(rescaleEdge(room, -1, 1)).toBe(false);
  });
});

describe("units.js — lossless round-trip", () => {
  it("parseLen(fmtLen(L) + 'm') in metric re-parses to L within display precision", () => {
    setUnit("m");
    const L = 3.14159;
    const formatted = fmtLen(L); // "3.14"
    const reparsed = parseLen(formatted + "m");
    if (reparsed === null) throw new Error(`parseLen returned null for "${formatted}m"`);
    // fmtLen gives 2dp in metric, so within 0.005 m
    if (Math.abs(reparsed - L) > 0.005) {
      throw new Error(`Round-trip failed: L=${L}, formatted="${formatted}", reparsed=${reparsed}`);
    }
  });
  it("parseLen(fmtLen(L) + 'ft') in imperial re-parses to L within display precision", () => {
    setUnit("ft");
    const L = 3.048; // exactly 10 ft
    const formatted = fmtLen(L); // "10.0"
    const reparsed = parseLen(formatted + "ft");
    if (reparsed === null) throw new Error(`parseLen returned null for "${formatted}ft"`);
    // fmtLen gives 1dp in ft, so within ~0.03 m
    if (Math.abs(reparsed - L) > 0.031) {
      throw new Error(`Round-trip failed: L=${L}, formatted="${formatted}", reparsed=${reparsed}`);
    }
  });
  it("unit toggle does not mutate geometry model", () => {
    resetModel();
    model.rooms.push({ id:"r0", closed:true, verts:[{x:0,y:0},{x:2,y:0},{x:2,y:3},{x:0,y:3}] });
    const beforeX = model.rooms[0].verts[1].x;
    setUnit("m");
    setUnit("ft");
    setUnit("m");
    expect(model.rooms[0].verts[1].x).toBe(beforeX);
  });
});

    s.rot = 45;

    expect(dup.h).toBeCloseTo(s.h, 9);

  it("duplicate has a different id", () => {
    resetSymbolModel();
    const s = createSymbol("sofa", 0, 0);
    addSymbol(s);
    const dup = duplicateSymbol(s.id);
    if (dup === null) throw new Error("null duplicate");
    if (dup.id === s.id) throw new Error("duplicate id not unique");

  it("original symbol is unchanged after duplicate", () => {

    const s = createSymbol("chair", 2, 3);

describe("symbols.js — hitTest", () => {
  it("true for center of unrotated symbol", () => {
    resetSymbolModel();
    const s = createSymbol("table", 5, 5);
    expect(hitTest(s, 5, 5)).toBe(true);
  });

  it("true just inside the box", () => {
    resetSymbolModel();
    const s = createSymbol("table", 0, 0); // w=1.2, h=0.8
    // Just inside: x = 0.59, y = 0.39 → abs(x) < 0.6, abs(y) < 0.4
    expect(hitTest(s, 0.59, 0.39)).toBe(true);
  });

  it("false just outside the box", () => {
    resetSymbolModel();
    const s = createSymbol("table", 0, 0); // w=1.2, h=0.8
    // Outside: x = 0.65, y = 0 → abs(x) > 0.6
    expect(hitTest(s, 0.65, 0)).toBe(false);
  });

  it("true inside rotated box (rot=90) but outside axis-aligned box", () => {
    resetSymbolModel();
    // Bed: w=1.5, h=2.0 at origin, rot=90
    // After rot=90, width becomes height and vice versa in world space
    // Original box: x±0.75, y±1.0
    // After rot=90 CW: a point at (0, 1.2) is in the original footprint
    // (in local frame: after inv rot, lx = 0*cos + 1.2*sin = 1.2*1 = 1.2 — actually let me use exact coords)
    // rotated 90 CW: local = (1.2*cos(90) + 1.2*sin(90), -1.2*sin(90) + 1.2*cos(90)) ... better test:
    // point (0.8, 0.1): in axis-aligned box (0.75, 1.0) at rot=0? Yes, 0.8 > 0.75, so OUTSIDE axis-aligned
    // Is it inside rotated (rot=90)? inv-rotate: rx = 0.8*cos90 + 0.1*sin90 = 0.1; ry = -0.8*sin90 + 0.1*cos90 = -0.8
    // Check: |rx|=0.1 <= 0.75, |ry|=0.8 <= 1.0 → inside rotated box
    const s = createSymbol("bed", 0, 0);
    rotateSymbol(s, 90);
    // point (0.8, 0) in world. After rot=90: rx = 0.8*cos90 + 0*sin90 = 0; ry = -0.8*sin90 + 0*cos90 = -0.8
    // |rx|=0 <= 0.75, |ry|=0.8 <= 1.0 → inside
    expect(hitTest(s, 0.8, 0)).toBe(true);
    // Check it is outside the axis-aligned box of bed at rot=0 (w=1.5, h=2.0)
    const sNoRot = createSymbol("bed", 0, 0);
    // At rot=0: |0.8| <= 0.75? No → outside
    expect(hitTest(sNoRot, 0.8, 0)).toBe(false);
  });

  it("tolerates point inflation (tolWorld)", () => {
    resetSymbolModel();
    const s = createSymbol("chair", 0, 0); // w=h=0.5 → half=0.25
    // Point at 0.3, 0 — just outside box (0.3 > 0.25)
    expect(hitTest(s, 0.3, 0, 0)).toBe(false);
    // With tolWorld=0.06 → effective half = 0.31 → 0.3 < 0.31 → inside
    expect(hitTest(s, 0.3, 0, 0.06)).toBe(true);
  });
});

describe("symbols.js — corners", () => {
  it("rot=0: corners equal axis-aligned box", () => {
    resetSymbolModel();
    const s = createSymbol("table", 0, 0); // w=1.2, h=0.8
    const cs = corners(s);
    expect(cs.length).toBe(4);
    // TL = (-0.6, -0.4), TR = (0.6, -0.4), BR = (0.6, 0.4), BL = (-0.6, 0.4)
    expect(cs[0].x).toBeCloseTo(-0.6, 6);
    expect(cs[0].y).toBeCloseTo(-0.4, 6);
    expect(cs[1].x).toBeCloseTo( 0.6, 6);
    expect(cs[1].y).toBeCloseTo(-0.4, 6);
    expect(cs[2].x).toBeCloseTo( 0.6, 6);
    expect(cs[2].y).toBeCloseTo( 0.4, 6);
    expect(cs[3].x).toBeCloseTo(-0.6, 6);
    expect(cs[3].y).toBeCloseTo( 0.4, 6);
  });

  it("rot=90: corners are rotated 90° CW about center", () => {
    resetSymbolModel();
    const s = createSymbol("table", 0, 0); // w=1.2, h=0.8
    rotateSymbol(s, 90);
    const cs = corners(s);
    // After 90° CW: local (lx,ly) → screen (lx*cos90 - ly*sin90, lx*sin90 + ly*cos90)
    //   = (ly, lx) wait: cos90=0, sin90=1 → (lx*0 - ly*1, lx*1 + ly*0) = (-ly, lx)
    // TL local (-0.6, -0.4) → rotated: (-(-0.4), -0.6) = (0.4, -0.6)
    expect(cs[0].x).toBeCloseTo(0.4, 5);
    expect(cs[0].y).toBeCloseTo(-0.6, 5);
    // TR local (0.6, -0.4) → (0.4, 0.6)
    expect(cs[1].x).toBeCloseTo(0.4, 5);
    expect(cs[1].y).toBeCloseTo(0.6, 5);
  });
});

describe("symbols.js — units reuse: fmtLen/parseLen round-trip for w/h", () => {
  it("metres value round-trips through fmtLen → parseLen within display precision", () => {
    setUnit("m");
    const L = 1.5; // bed width
    const formatted = fmtLen(L); // "1.50"

    if (Math.abs(reparsed - L) > 0.005) throw new Error(`Round-trip failed: ${L} → "${formatted}" → ${reparsed}`);
    setUnit("ft");
  });

  it("toggling unit leaves symbols.model bit-identical", () => {
    resetSymbolModel();
    const s = createSymbol("sofa", 1, 2);
    addSymbol(s);
    const beforeW = s.w;
    const beforeH = s.h;
    setUnit("m");
    setUnit("ft");
    setUnit("m");
    expect(s.w).toBeCloseTo(beforeW, 9);
    expect(s.h).toBeCloseTo(beforeH, 9);
    setUnit("ft"); // restore
  });

  it("chips format via fmtLen + unitLabel", () => {
    setUnit("m");
    const meters = 2.0;
    const label = fmtLen(meters) + " " + unitLabel();
    if (!label.includes("2.00")) throw new Error(`Expected '2.00 m', got: "${label}"`);
    setUnit("ft");
    const labelFt = fmtLen(meters) + " " + unitLabel();
    if (!labelFt.includes("ft")) throw new Error(`Expected ft in "${labelFt}"`);
    setUnit("ft"); // restore
  });
});

const LLD45_TYPES = ["toilet", "bathtub", "sink", "stove", "wardrobe", "bookshelf", "tv", "washer"];

describe("LLD-45 — catalog integrity: all new types present and valid", () => {
  it("every new type exists in CATALOG with a valid category (updated by LLD-50)", () => {
    const VALID_CATS = new Set(["openings", "living", "kitchen", "bedroom", "bath"]);
    for (const t of LLD45_TYPES) {
      if (!(t in CATALOG)) throw new Error(`${t} missing from CATALOG`);
      if (!VALID_CATS.has(CATALOG[t].category)) throw new Error(`${t} has invalid category:'${CATALOG[t].category}'`);
    }
  });

  it("every new type has a non-empty label", () => {
    for (const t of LLD45_TYPES) {
      const label = CATALOG[t].label;
      if (!label || label.trim() === "") throw new Error(`${t} has empty label`);
    }
  });

  it("every new type has finite w, h, min, max", () => {
    for (const t of LLD45_TYPES) {
      const cat = CATALOG[t];
      for (const key of ["w", "h", "min", "max"]) {
        if (!isFinite(cat[key])) throw new Error(`${t}.${key} is not finite: ${cat[key]}`);
      }
    }
  });

  it("min <= w <= max and min <= h <= max for every new type (single-range guard)", () => {
    for (const t of LLD45_TYPES) {
      const { w, h, min, max } = CATALOG[t];
      if (w < min || w > max) throw new Error(`${t}: w=${w} not in [${min},${max}]`);
      if (h < min || h > max) throw new Error(`${t}: h=${h} not in [${min},${max}]`);
    }
  });

  it("no new type has openings:true", () => {
    for (const t of LLD45_TYPES) {
      if (CATALOG[t].openings) throw new Error(`${t} unexpectedly has openings:true`);
    }
  });
});

import {
  init as initSymbolDimEntry,
  beginEdit as beginSymbolEdit,
  commit as commitSymbol,
  cancel as cancelSymbol,
  isEditing as isSymbolEditing,
  getEditingDim,
} from "./js/symbolDimEntry.js";

/**
 * Build a minimal DOM rig for symbolDimEntry tests.
 * Returns { stage, dimLabels, getLockAspect, setLockAspect } plus cleanup().
 */
function makeSymbolDimRig(lockAspectInit = false) {
  const stage = document.createElement("div");
  stage.className = "stage";
  stage.style.position = "relative";
  const dimLabels = document.createElement("div");
  dimLabels.className = "dim-labels";
  stage.appendChild(dimLabels);
  document.body.appendChild(stage);
  let _lock = lockAspectInit;
  const getLockAspect = () => _lock;
  const setLockAspect = (v) => { _lock = v; };
  initSymbolDimEntry({ stage, dimLabels, getLockAspect });
  return {
    stage, dimLabels, getLockAspect, setLockAspect,
    cleanup() { document.body.removeChild(stage); }
  };
}

/**
 * Build a minimal DOM rig for dimEntry tests.
 * Returns { stage, dimLabels } plus cleanup().
 */
function makeDimRig() {
  const stage = document.createElement("div");
  stage.className = "stage";
  stage.style.position = "relative";
  const dimLabels = document.createElement("div");
  dimLabels.className = "dim-labels";
  stage.appendChild(dimLabels);
  document.body.appendChild(stage);
  return {
    stage, dimLabels,
    cleanup() { document.body.removeChild(stage); }
  };
}

/**
 * Build a minimal DOM rig for measure tests.
 * Returns { panel, list, total, toggle } plus cleanup().
 */
function makeMeasureRig() {
  const panel  = document.createElement("aside");
  panel.className = "measure";
  const total  = document.createElement("div");
  total.className = "measure-total";
  const list   = document.createElement("div");
  list.className = "measure-list";
  const toggle = document.createElement("button");
  toggle.className = "measure-toggle";
  toggle.setAttribute("aria-expanded", "true");
  panel.appendChild(total);
  panel.appendChild(list);
  panel.appendChild(toggle);
  document.body.appendChild(panel);
  return {
    panel, list, total, toggle,
    cleanup() { document.body.removeChild(panel); }
  };
}

describe("security — no innerHTML from user input in DOM", () => {
  it("parseLen returns a number or null — never sets innerHTML", () => {
    // The raw user string only ever reaches parseLen → Number(); it is never
    // set into the DOM as HTML markup. Verify parseLen handles injection strings
    // gracefully (returns null, no crash).
    setUnit("m");
    const injectionStrings = [
      "<script>alert(1)<\/script>",
      "'; DROP TABLE rooms; --",
      "<img src=x onerror=alert(1)>",
      "1e999",
      "NaN",
    ];
    for (const s of injectionStrings) {
      const result = parseLen(s);
      if (result !== null) {
        throw new Error(`parseLen("${s}") returned ${result} instead of null`);
      }
    }
  });

  it("chip textContent is built via fmtLen/unitLabel — never from raw user strings", () => {
    // Confirm fmtLen + unitLabel return plain numeric strings, not HTML
    setUnit("m");
    const text = fmtLen(5) + " " + unitLabel();
    if (text.includes("<") || text.includes(">") || text.includes("&")) {
      throw new Error(`fmtLen+unitLabel produced suspicious output: "${text}"`);
    }
    setUnit("ft");
    const text2 = fmtLen(5) + " " + unitLabel();
    if (text2.includes("<") || text2.includes(">") || text2.includes("&")) {
      throw new Error(`fmtLen+unitLabel (ft) produced suspicious output: "${text2}"`);
    }
    setUnit("m");
  });
});

  it("rejects room with non-boolean closed", () => {

describe("view.fitToContent — fits bounds in viewport with margin", () => {
  it("content is on-screen after fitToContent for the given viewport", () => {
    resetAll();
    // Content at world (10,10)-(20,15) — with raw pan=0 this would be off-screen
    // for a 800x600 viewport at zoom=1 (world x=10 → screen x=400, but world x=20 → screen x=800)
    const bounds = { minX: 10, minY: 10, maxX: 20, maxY: 15 };
    const vW = 800, vH = 600;
    fitToContent(bounds, vW, vH);
    // After fitToContent, center of bounds should be near center of viewport
    const scale = view.zoom * BASE_PX_PER_M;
    const contentCenterX = (bounds.minX + bounds.maxX) / 2;
    const contentCenterY = (bounds.minY + bounds.maxY) / 2;
    const screenCenterX = contentCenterX * scale + view.panX;
    const screenCenterY = contentCenterY * scale + view.panY;
    // Screen center should be close to viewport center (within 5%)
    const tol = Math.min(vW, vH) * 0.05;
    if (Math.abs(screenCenterX - vW / 2) > tol) {
      throw new Error(`Center X off: ${screenCenterX} vs ${vW/2}`);
    }
    if (Math.abs(screenCenterY - vH / 2) > tol) {
      throw new Error(`Center Y off: ${screenCenterY} vs ${vH/2}`);
    }
  });

  it("fitToContent zoom is clamped to [MIN_ZOOM, MAX_ZOOM]", () => {
    resetAll();
    // Tiny content → very large zoom → clamped at MAX
    fitToContent({ minX: 0, minY: 0, maxX: 0.001, maxY: 0.001 }, 800, 600);
    if (view.zoom > MAX_ZOOM) throw new Error("zoom exceeds MAX_ZOOM");
    if (view.zoom < MIN_ZOOM) throw new Error("zoom below MIN_ZOOM");
  });

  it("plan drawn on large viewport fits on-screen for narrower viewport", () => {
    resetAll();
    // Content at (0,0)-(50,30), sender's viewport 1920x1080
    // Store sender's raw view: panX from resetView(1920,1080)
    const senderW = 1920, senderH = 1080;
    resetView(senderW, senderH);
    const senderPanX = view.panX;

    // Receiver has narrower viewport: 375x667 (mobile)
    const receiverW = 375, receiverH = 667;
    const bounds = { minX: 0, minY: 0, maxX: 50, maxY: 30 };

    // The important check: with sender's raw pan, world(0,0) at screen(senderPanX=1920*0.15=288)
    // which is outside a 375px viewport after accounting for content spread
    fitToContent(bounds, receiverW, receiverH);
    const newScale = view.zoom * BASE_PX_PER_M;
    const centerSx = ((bounds.minX + bounds.maxX) / 2) * newScale + view.panX;
    if (centerSx < 0 || centerSx > receiverW) {
      throw new Error(`Content center ${centerSx} is outside receiver viewport [0,${receiverW}]`);
    }
  });
});

describe("share.js — compress/decompress round-trip", () => {
  it("decodeHashToPlan(encodePlanToHash(p)) deep-equals p", async () => {
    resetAll();
    setUnit("m");
    model.rooms.push({ id: "w0", closed: true, verts: [{ x: 0, y: 0 }, { x: 3, y: 0 }, { x: 3, y: 4 }, { x: 0, y: 4 }] });
    addSymbol(createSymbol("bed", 1.5, 2));
    const p = buildPlan();
    const hash = await encodePlanToHash(p);
    const decoded = await decodeHashToPlan(hash);
    if (!decoded) throw new Error("decodeHashToPlan returned null");
    if (serializePlan(decoded) !== serializePlan(p)) {
      throw new Error("Decoded plan does not deep-equal original");
    }
  });

  it("round-trip is correct for non-trivial plan with multiple rooms/symbols", async () => {
    resetAll();
    setUnit("m");
    model.rooms.push({ id: "w0", closed: true, verts: [{ x: 0, y: 0 }, { x: 5, y: 0 }, { x: 5, y: 4 }, { x: 0, y: 4 }] });
    model.rooms.push({ id: "w1", closed: true, verts: [{ x: 5, y: 0 }, { x: 10, y: 0 }, { x: 10, y: 4 }, { x: 5, y: 4 }] });
    addSymbol(createSymbol("sofa", 2, 2));
    addSymbol(createSymbol("bed", 7, 2));
    const p = buildPlan();
    const hash = await encodePlanToHash(p);
    const decoded = await decodeHashToPlan(hash);
    if (!decoded) throw new Error("round-trip failed for non-trivial plan");
    if (serializePlan(decoded) !== serializePlan(p)) {
      throw new Error("round-trip mismatch for non-trivial plan");
    }
  });

  it("decodeHashToPlan returns null for garbage input (no throw)", async () => {
    let result;
    try { result = await decodeHashToPlan("xgarbagestuff123"); } catch (e) { throw new Error(`threw: ${e}`); }
    if (result !== null) throw new Error("Expected null for garbage");
  });

  it("decodeHashToPlan returns null for empty string", async () => {
    let result;
    try { result = await decodeHashToPlan(""); } catch (e) { throw new Error(`threw: ${e}`); }
    if (result !== null) throw new Error("Expected null for empty string");
  });

  it("decodeHashToPlan returns null for truncated payload (no throw)", async () => {
    resetAll();
    const p = buildPlan();
    const hash = await encodePlanToHash(p);
    const truncated = hash.slice(0, 5);
    let threw = false;
    try { await decodeHashToPlan(truncated); } catch { threw = true; }
    if (threw) throw new Error("decodeHashToPlan threw on truncated input instead of returning null");
  });

  it("uncompressed codec 'u' round-trips correctly", async () => {
    resetAll();
    setUnit("ft");
    model.rooms.push({ id: "w0", closed: false, verts: [{ x: 0, y: 0 }, { x: 2, y: 0 }] });
    const p = buildPlan();
    // Build uncompressed hash manually using the 'u' codec
    const json = serializePlan(p);
    const bytes = new TextEncoder().encode(json);
    let binary = "";
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    const b64 = btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    const uncompressedHash = "u" + b64;
    const decoded = await decodeHashToPlan(uncompressedHash);
    if (!decoded) throw new Error("Uncompressed decode returned null");
    if (serializePlan(decoded) !== serializePlan(p)) throw new Error("Uncompressed round-trip mismatch");
  });
});

describe("store — autosave dirty-check: saveNow writes on first call, skips on no-change", () => {
  it("saveNow writes a valid plan to localStorage", () => {
    resetAll();
    localStorage.removeItem(STORAGE_KEY);
    model.rooms.push({ id: "w0", closed: true, verts: [{ x:0,y:0 },{ x:2,y:0 },{ x:2,y:3 },{ x:0,y:3 }] });
    const pillEl = document.createElement("span");
    initStore(pillEl);
    saveNow();
    const stored = localStorage.getItem(STORAGE_KEY);
    if (!stored) throw new Error("Nothing written to localStorage");
    const parsed = JSON.parse(stored);
    if (!validatePlan(parsed)) throw new Error("Stored plan fails validation");
    localStorage.removeItem(STORAGE_KEY);
  });

  it("saveNow → pill transitions to 'saved'", () => {
    resetAll();
    localStorage.removeItem(STORAGE_KEY);
    model.rooms.push({ id: "w0", closed: false, verts: [{ x:0,y:0 },{ x:1,y:0 }] });
    const pillEl = document.createElement("span");
    initStore(pillEl);
    saveNow();
    expect(getState()).toBe("saved");
    localStorage.removeItem(STORAGE_KEY);
  });

  it("saveNow a second time with unchanged model does NOT write again (dirty-check)", () => {
    resetAll();
    localStorage.removeItem(STORAGE_KEY);
    model.rooms.push({ id: "w0", closed: false, verts: [{ x:0,y:0 },{ x:3,y:0 }] });
    const pillEl = document.createElement("span");
    clearLocal(); // reset _lastWrittenJson baseline
    initStore(pillEl);
    saveNow(); // first write
    // Now directly overwrite localStorage with a different value to detect if saveNow re-writes
    localStorage.setItem(STORAGE_KEY, "SENTINEL");
    saveNow(); // should be a no-op (dirty-check: same JSON)
    const secondValue = localStorage.getItem(STORAGE_KEY);
    // Dirty-check should have skipped the write, leaving our sentinel intact
    expect(secondValue).toBe("SENTINEL");
    localStorage.removeItem(STORAGE_KEY);
  });

  it("saveNow writes after model changes (dirty-check detects diff)", () => {
    resetAll();
    localStorage.removeItem(STORAGE_KEY);
    model.rooms.push({ id: "w0", closed: false, verts: [{ x:0,y:0 },{ x:3,y:0 }] });
    const pillEl = document.createElement("span");
    clearLocal(); // reset _lastWrittenJson baseline
    initStore(pillEl);
    saveNow(); // write baseline
    // Change the model
    model.rooms[0].verts[1].x = 5;
    saveNow(); // should write again
    const stored = localStorage.getItem(STORAGE_KEY);
    if (!stored || stored === "SENTINEL") throw new Error("Expected new write after model change");
    const plan = JSON.parse(stored);
    if (plan.walls.rooms[0].verts[1].x !== 5) throw new Error("Stored plan does not reflect model change");
    localStorage.removeItem(STORAGE_KEY);
  });
});

describe("boot-restore — reload restores stored view verbatim (not resetView)", () => {

describe("share-open — applyPlan + fitToContent frames content on current viewport", () => {
  it("shared plan drawn on large viewport frames on-screen for narrow viewport after fitToContent", async () => {
    resetAll();
    // Build a plan as if drawn on a large (desktop) viewport
    const senderW = 1920, senderH = 1080;
    resetView(senderW, senderH);
    model.rooms.push({ id: "w0", closed: true, verts: [{ x:0,y:0 },{ x:5,y:0 },{ x:5,y:4 },{ x:0,y:4 }] });
    const sharedPlan = buildPlan();
    const hash = await encodePlanToHash(sharedPlan);
    const decodedPlan = await decodeHashToPlan(hash);
    if (!decodedPlan) throw new Error("decodeHashToPlan returned null");

    // Now simulate boot on a narrow (mobile) receiver viewport
    const receiverW = 375, receiverH = 667;
    resetAll();
    applyPlan(decodedPlan);
    // Apply sender's raw view — pan will be off-screen for narrow viewport
    // fitToContent reframes for the current viewport
    const bounds = contentBounds();
    if (!bounds) throw new Error("contentBounds returned null");
    fitToContent(bounds, receiverW, receiverH);

    // The content center must be on-screen for the receiver viewport
    const scale = view.zoom * BASE_PX_PER_M;
    const contentCenterX = (bounds.minX + bounds.maxX) / 2;
    const contentCenterY = (bounds.minY + bounds.maxY) / 2;
    const screenCX = contentCenterX * scale + view.panX;
    const screenCY = contentCenterY * scale + view.panY;
    if (screenCX < 0 || screenCX > receiverW) throw new Error(`Content center X ${screenCX} off-screen for receiver [0,${receiverW}]`);
    if (screenCY < 0 || screenCY > receiverH) throw new Error(`Content center Y ${screenCY} off-screen for receiver [0,${receiverH}]`);
  });

  it("rooms/symbols/unit are byte-exact after share open (content correct)", async () => {
    resetAll();
    setUnit("m");
    model.rooms.push({ id: "w0", closed: true, verts: [{ x:0,y:0 },{ x:3,y:0 },{ x:3,y:4 },{ x:0,y:4 }] });
    addSymbol(createSymbol("bed", 1.5, 2));
    const plan = buildPlan();
    const hash = await encodePlanToHash(plan);
    const decoded = await decodeHashToPlan(hash);
    if (!decoded) throw new Error("decodeHashToPlan returned null");
    resetAll();
    applyPlan(decoded);
    if (JSON.stringify(model.rooms) !== JSON.stringify(plan.walls.rooms)) {
      throw new Error("rooms differ after share-open applyPlan");
    }
    if (JSON.stringify(symbolModel.symbols) !== JSON.stringify(plan.symbols.symbols)) {
      throw new Error("symbols differ after share-open applyPlan");
    }
    if (unit !== "m") throw new Error("unit not restored after share-open");
  });
});

describe("share.readBootHash — signals decode failure when hash present but undecodable", () => {

      if (result !== null) throw new Error("readBootHash decoded garbage hash — expected throw or null, got plan");

    } catch (e) {
      threw = true;
    }
    if (threw) throw new Error("readBootHash threw when no hash present (should return null)");
    if (result !== null) throw new Error("Expected null when no hash present");
  });

  it("decodeHashToPlan returns null for malformed hash (never throws)", async () => {

    let result;
    let threw = false;
    try { result = await decodeHashToPlan(garbage); } catch { threw = true; }

describe("history.js — _apply deep-clones snapshot (no aliasing)", () => {
  it("in-place mutation of live object after undo is detected by commit() and clears redo", () => {
    // Reproduces the BLOCKING QA issue: if _apply splices snapshot refs directly
    // into the live model (no deep-clone), an in-place mutation of a live element
    // also mutates _present, so commit() dirty-check treats it as a no-op, the
    // edit is not recorded, and _future is not cleared — silent data loss on redo.
    resetForHistory();
    initHistory();

    // State A: one symbol at x=0
    const s = createSymbol("chair", 0, 0);
    addSymbol(s);
    historyCommit(); // past=[], present=A

    // State B: symbol moved to x=5
    symbolModel.symbols[0].x = 5;
    historyCommit(); // past=[A], present=B

    // Undo → revert to A (symbol at x=0)
    historyUndo(); // past=[], present=A, future=[B]
    expect(symbolModel.symbols[0].x).toBeCloseTo(0, 9);

    // In-place mutation of live object (simulates a move/rotate/resize)
    symbolModel.symbols[0].x = 9;

    // commit() must detect the change (x=9 ≠ x=0 in A)
    historyCommit(); // past=[A], present=C(x=9), future=[] ← _future must be cleared

    // If _apply leaked refs: _present would have been mutated to x=9 by the
    // in-place assignment above, commit() dirty-check would see no change, and
    // canRedo() would still be true — that is the bug.
    expect(canRedo()).toBe(false); // _future was cleared by commit()
    // depth === _past.length === 2: init captured the empty baseline, then
    // both the empty→A commit and the A→C commit survive the undo+recommit
    // (past = [empty, A]). The primary assertion of this test is canRedo above.
    expect(historyDepth()).toBe(2);

    // Undo should restore x=0 (state A), not x=9
    historyUndo();
    expect(symbolModel.symbols[0].x).toBeCloseTo(0, 9);
  });
});

/**
 * Build a minimal HUD DOM rig for chip-label tests.
 * Returns { snapModeBtn, snapModeVal, cleanup }.
 */
function makeHudRig() {
  const elZoom   = document.createElement("span");
  const elScale  = document.createElement("span");
  const elCursor = document.createElement("span");
  const elImp    = document.createElement("button");
  const elMet    = document.createElement("button");
  const snapModeBtn = document.createElement("button");
  snapModeBtn.id = "hud-snap-mode";
  const snapModeVal = document.createElement("span");
  snapModeVal.id = "hud-snap-mode-val";
  snapModeBtn.appendChild(snapModeVal);
  document.body.append(elZoom, elScale, elCursor, elImp, elMet, snapModeBtn);
  view.zoom = 1; view.panX = 0; view.panY = 0;
  initHud(elZoom, elScale, elCursor, elImp, elMet, snapModeBtn);
  return {
    snapModeBtn,
    snapModeVal,
    cleanup() {
      [elZoom, elScale, elCursor, elImp, elMet, snapModeBtn].forEach(el => {
        if (el.parentNode) el.parentNode.removeChild(el);
      });
    },
  };
}

// ─── Import clearance.js ──────────────────────────────────────────────────────

import {
  threshold as clrThreshold, density as clrDensity, enabled as clrEnabled,
  THRESH_MIN, THRESH_MAX, THRESH_STEP, DEFAULT_THRESHOLD,
  setThreshold, setDensity, setEnabled, onChange as onClrChange,
  classify, aabb as clrAabb, pointInRoom,
  computeClearances, worstStatus,
} from "./js/clearance.js";

// ─── clearance.js helpers ─────────────────────────────────────────────────────

/** Reset clearance session state to defaults.
 * Also clears the shared walls model so clearance tests are order-independent:
 * computeClearances() reads wallsModel.rooms for wall gaps, and an earlier
 * suite (e.g. the serializePlan tests) can leave a room in it. Without this,
 * phantom wall gaps leak into tests that only set up symbol neighbours. */
function resetClearance() {
  setThreshold(DEFAULT_THRESHOLD);
  setDensity("flagged");
  setEnabled(true);
  model.rooms.length = 0;
  model.chain.length = 0;
}

/** Build a minimal unrotated Sym for testing. */
function mkSym(id, type, x, y, w, h, rot = 0) {
  return { id, type, x, y, w, h, rot };
}

/** Build a closed rectangular room from (x0,y0) to (x1,y1). */
function mkRoom(id, x0, y0, x1, y1) {
  return {
    id, closed: true,
    verts: [
      { x: x0, y: y0 },
      { x: x1, y: y0 },
      { x: x1, y: y1 },
      { x: x0, y: y1 },
    ],
  };
}

describe("clearance.js — aabb", () => {
  it("unrotated 2×1 box at (5,3) → exact l/r/t/b", () => {
    resetSymbolModel();
    const sym = mkSym("s0", "sofa", 5, 3, 2, 1, 0);
    const box = clrAabb(sym);
    expect(box.l).toBeCloseTo(4, 6);  // 5 - 1
    expect(box.r).toBeCloseTo(6, 6);  // 5 + 1
    expect(box.t).toBeCloseTo(2.5, 6); // 3 - 0.5
    expect(box.b).toBeCloseTo(3.5, 6); // 3 + 0.5
  });

  it("rotated 45° AABB is larger than the footprint (conservative)", () => {
    resetSymbolModel();
    const sym = mkSym("s1", "table", 0, 0, 2, 1, 45);
    const box = clrAabb(sym);
    // For a 2×1 at rot=45, the AABB should extend beyond w/2=1 in x and y
    const halfDiag = Math.sqrt(2 * 2 + 1 * 1) / 2; // half-diagonal of 2×1 ≈ 1.118
    expect(box.r).toBeGreaterThanOrEqual(1); // must be at least w/2
    expect(box.b).toBeGreaterThanOrEqual(0.5); // must be at least h/2
    // And should be larger (conservative)
    expect(box.r).toBeGreaterThanOrEqual(halfDiag * 0.9); // at least 90% of half-diagonal
  });

  it("rot=90 swaps effective width and height", () => {
    resetSymbolModel();
    const sym = mkSym("s2", "table", 0, 0, 2, 1, 90);
    const box = clrAabb(sym);
    // After 90° rotation, the effective x-span ≈ h=1, y-span ≈ w=2
    expect(box.r - box.l).toBeCloseTo(1, 3); // ≈ h
    expect(box.b - box.t).toBeCloseTo(2, 3); // ≈ w
  });
});

describe("clearance.js — computeClearances: two axis-aligned furniture symbols", () => {
  it("horizontal gap: sofa and table side-by-side with known 1m gap", () => {
    resetClearance();
    resetSymbolModel();
    // Sofa: center (1, 5), w=2, h=1 → AABB l=0, r=2, t=4.5, b=5.5
    // Table: center (5, 5), w=2, h=1 → AABB l=4, r=6, t=4.5, b=5.5
    // Gap on x-axis: 4 - 2 = 2... wait, let me recompute:
    // sofa r=2, table l=4 → dx = 4-2 = 2m gap
    const sofa  = mkSym("s0", "sofa",  1, 5, 2, 1, 0);
    const table = mkSym("s1", "table", 5, 5, 2, 1, 0);
    const result = computeClearances(sofa, { rooms: [], symbols: [sofa, table] });
    expect(result.length).toBe(1);
    const c = result[0];
    expect(c.kind).toBe("symbol");
    expect(c.gap).toBeCloseTo(2.0, 6);
    // Leader endpoints at facing edges' mid-span
    expect(c.a.x).toBeCloseTo(2, 6); // sofa right edge
    expect(c.b.x).toBeCloseTo(4, 6); // table left edge
    expect(c.a.y).toBeCloseTo(c.b.y, 6); // same y (shared midspan)
  });

  it("vertical gap: two symbols stacked vertically with known 0.5m gap", () => {
    resetClearance();
    resetSymbolModel();
    // Sym A: center (5, 1), w=2, h=1 → AABB t=0.5, b=1.5
    // Sym B: center (5, 4), w=2, h=1 → AABB t=3.5, b=4.5
    // dy = 3.5 - 1.5 = 2m gap? Wait let me recalculate:
    // A: t=0.5, b=1.5; B: t=3.5, b=4.5; dy=3.5-1.5=2m
    // Let's use: A center (5,1), B center (5,3): A b=1.5, B t=2.5 → dy=1m
    const symA = mkSym("s0", "bed",   5, 1, 2, 1, 0);
    const symB = mkSym("s1", "table", 5, 3, 2, 1, 0);
    // A AABB: l=4,r=6,t=0.5,b=1.5  B AABB: l=4,r=6,t=2.5,b=3.5
    // dx = max(4-6, 4-6) = -2 (overlap on x)
    // dy = max(2.5-1.5, 0.5-3.5) = max(1, -3) = 1
    // Since dx<=0, this is an overlap on x → gap=0, bad
    // Let's instead offset them so dx>dy:
    // A: center (5, 2), w=2, h=1, B: center (5, 4), w=2, h=1
    // A: l=4,r=6,t=1.5,b=2.5; B: l=4,r=6,t=3.5,b=4.5
    // dx = max(4-6, 4-6) = -2 (overlap on x!)
    // We need them NOT to overlap on x. Let me offset x:
    // A: center (5, 2), w=1 → l=4.5,r=5.5; B: center (5, 4), w=1 → l=4.5,r=5.5; dy=3.5-2.5=1
    // dx = max(4.5-5.5, 4.5-5.5) = -1 still overlap
    // For vertical-dominant gap test, use narrow symbols:
    // A: center (5, 2), w=2, h=0.4 → AABB t=1.8, b=2.2
    // B: center (5, 5), w=2, h=0.4 → AABB t=4.8, b=5.2
    // dx = max(4-6,4-6)=-2 (x overlap); dy = max(4.8-2.2, 1.8-5.2) = 2.6
    // Both axes: dx<0, dy>0 → overlap → gap=0, bad. Not what we want.
    // Actually when dx<=0 AND dy<=0 it's a true 2D overlap.
    // When dx<=0 AND dy>0 → separated only on y → report vertical gap
    const symC = mkSym("s2", "bed",   5, 1, 2, 0.4, 0); // AABB t=0.8, b=1.2
    const symD = mkSym("s3", "table", 5, 3, 2, 0.4, 0); // AABB t=2.8, b=3.2
    // dx = max(4-6, 4-6) = -2 (x overlap); dy = max(2.8-1.2, 0.8-3.2) = 1.6
    const result2 = computeClearances(symC, { rooms: [], symbols: [symC, symD] });
    expect(result2.length).toBe(1);
    const c2 = result2[0];
    expect(c2.kind).toBe("symbol");
    expect(c2.gap).toBeCloseTo(1.6, 5);
    expect(c2.a.y).toBeCloseTo(1.2, 5); // symC bottom edge
    expect(c2.b.y).toBeCloseTo(2.8, 5); // symD top edge
  });

  it("overlapping pieces → gap === 0, status === bad, center-to-center leader", () => {
    resetClearance();
    resetSymbolModel();
    const symA = mkSym("s0", "sofa",  5, 5, 2, 1, 0);
    const symB = mkSym("s1", "table", 5.5, 5, 1, 0.8, 0); // centered inside symA
    const result = computeClearances(symA, { rooms: [], symbols: [symA, symB] });
    expect(result.length).toBe(1);
    const c = result[0];
    expect(c.gap).toBe(0);
    expect(c.status).toBe("bad");
    // Leader from symA center to symB center
    expect(c.a.x).toBeCloseTo(5, 5);
    expect(c.a.y).toBeCloseTo(5, 5);
    expect(c.b.x).toBeCloseTo(5.5, 5);
    expect(c.b.y).toBeCloseTo(5, 5);
  });
});

describe("clearance.js — computeClearances: wall gaps", () => {
  it("sym inside a 10x8 room → four wall gaps computed", () => {
    resetClearance();
    resetSymbolModel();
    // Room from (0,0) to (10,8)
    const room = mkRoom("r0", 0, 0, 10, 8);
    // Sofa at center (5,4), w=2, h=1 → AABB l=4,r=6,t=3.5,b=4.5
    const sofa = mkSym("s0", "sofa", 5, 4, 2, 1, 0);
    const result = computeClearances(sofa, { rooms: [room], symbols: [sofa] });
    // Should have 4 wall gaps (left, right, top, bottom)
    const wallGaps = result.filter(c => c.kind === "wall");
    expect(wallGaps.length).toBe(4);
  });

  it("wall gap is measured to inner wall face (subtract WALL_M/2 from centerline distance)", () => {
    resetClearance();
    resetSymbolModel();
    const WALL_M = 0.12;
    // Room from (0,0) to (10,8)
    const room = mkRoom("r0", 0, 0, 10, 8);
    // Sofa at (5,4), w=2, h=1 → left edge of AABB at x=4
    // Left wall centerline is at x=0; raw gap = 4m
    // Expected gap = 4 - WALL_M/2 = 4 - 0.06 = 3.94m
    const sofa = mkSym("s0", "sofa", 5, 4, 2, 1, 0);
    const result = computeClearances(sofa, { rooms: [room], symbols: [sofa] });
    const leftWall = result.find(c => c.kind === "wall" && c.label === "left wall");
    if (!leftWall) throw new Error("No left wall gap found");
    expect(leftWall.gap).toBeCloseTo(4 - WALL_M / 2, 5);
  });

  it("symbol face within WALL_M/2 of centerline clamps wall gap to 0", () => {
    resetClearance();
    resetSymbolModel();
    const WALL_M = 0.12;
    // Room from (0,0) to (10,8)
    const room = mkRoom("r0", 0, 0, 10, 8);
    // Place sofa very close to the left wall
    // sofa left edge at x=0.04 → raw gap = 0.04 < WALL_M/2=0.06 → clamped to 0
    // sofa center x = 0.04 + sofa.w/2 = 0.04 + 1 = 1.04; sofa w=2
    const sofa = mkSym("s0", "sofa", 1.04, 4, 2, 1, 0);
    // AABB l = 1.04 - 1 = 0.04; raw gap to wall at x=0 = 0.04; minus 0.06 = -0.02 → clamped to 0
    const result = computeClearances(sofa, { rooms: [room], symbols: [sofa] });
    const leftWall = result.find(c => c.kind === "wall" && c.label === "left wall");
    if (!leftWall) throw new Error("No left wall gap found");
    expect(leftWall.gap).toBe(0);
    expect(leftWall.status).toBe("bad");
  });

  it("sym outside any closed room → zero wall gaps", () => {
    resetClearance();
    resetSymbolModel();
    // Room in a far-away location
    const room = mkRoom("r0", 100, 100, 110, 108);
    const sofa = mkSym("s0", "sofa", 5, 4, 2, 1, 0); // NOT inside this room
    const result = computeClearances(sofa, { rooms: [room], symbols: [sofa] });
    const wallGaps = result.filter(c => c.kind === "wall");
    expect(wallGaps.length).toBe(0);
  });

  it("sym straddling a wall (partly outside) \u2192 that side gap === 0 \u2192 bad (Edge Case 8)", () => {
    resetClearance();
    resetSymbolModel();
    // Room from (0,0) to (10,8); sofa partially outside the left wall
    // sofa center at (0.3, 4), w=2 \u2192 AABB l=-0.7, r=1.3
    // The sofa's left edge (-0.7) is outside the room (left wall at x=0).
    // The outward (leftward) ray from x=-0.7 finds no left-side wall hit;
    // the straddle detector fires a rightward opposite-direction ray which
    // does find the wall at x=0, so gap=0/bad is emitted (LLD Edge Case 8).
    const room = mkRoom("r0", 0, 0, 10, 8);
    const sofa = mkSym("s0", "sofa", 0.3, 4, 2, 1, 0);
    const result = computeClearances(sofa, { rooms: [room], symbols: [sofa] });
    const leftWall = result.find(c => c.kind === "wall" && c.label === "left wall");
    if (!leftWall) throw new Error("Expected left wall gap to be reported for straddling sofa");
    expect(leftWall.gap).toBe(0);
    expect(leftWall.status).toBe("bad");
  });

  it("QA repro Edge Case 8: room (0,0)-(6,4), sofa center (0.5,2) w=2 straddles left wall", () => {
    resetClearance();
    resetSymbolModel();
    // AABB l = 0.5 - 1 = -0.5 (outside left wall at x=0); center is inside room
    const room = mkRoom("r0", 0, 0, 6, 4);
    const sofa = mkSym("s0", "sofa", 0.5, 2, 2, 1, 0);
    const result = computeClearances(sofa, { rooms: [room], symbols: [sofa] });
    const leftWall = result.find(c => c.kind === "wall" && c.label === "left wall");
    if (!leftWall) throw new Error("Expected left wall gap for straddling sofa (QA repro)");
    expect(leftWall.gap).toBe(0);
    expect(leftWall.status).toBe("bad");
  });
});

    setDensity("all");
    setEnabled(false);
    const p = buildPlan();
    const json = serializePlan(p);
    if (json.includes("threshold")) throw new Error("'threshold' leaked into serialized plan");
    if (json.includes("density"))   throw new Error("'density' leaked into serialized plan");
    if (json.includes("clearance")) throw new Error("'clearance' leaked into serialized plan");
    if (json.includes("enabled"))   throw new Error("'enabled' leaked into serialized plan");
    resetClearance();
  });

  it("serializePlan output before and after clearance state changes is byte-identical (same model)", () => {
    resetAll();
    model.rooms.push({ id: "w0", closed: true, verts: [{ x:0,y:0 },{ x:4,y:0 },{ x:4,y:3 },{ x:0,y:3 }] });
    addSymbol(createSymbol("sofa", 2, 1.5));
    const serialBefore = serializePlan(buildPlan());
    // Change clearance state
    setThreshold(0.80);
    setDensity("all");
    setEnabled(false);
    const serialAfter = serializePlan(buildPlan());
    if (serialBefore !== serialAfter) {
      throw new Error("serializePlan output changed after clearance state mutation — clearance state leaked into plan");
    }
    resetClearance();
  });
});

/**
 * Build a minimal DOM rig for clearanceRender tests.
 * Returns { gClearance, overlay, cleanup }.
 */
const NS_SVG = "http://www.w3.org/2000/svg";
function makeRenderRig() {
  const svg = document.createElementNS(NS_SVG, "svg");
  const gClearance = document.createElementNS(NS_SVG, "g");
  gClearance.id = "clearance";
  svg.appendChild(gClearance);
  const overlay = document.createElement("div");
  overlay.className = "dim-labels";
  document.body.appendChild(svg);
  document.body.appendChild(overlay);
  return {
    gClearance, overlay,
    cleanup() {
      document.body.removeChild(svg);
      document.body.removeChild(overlay);
    },
  };
}

// ─── Integration: clearancePanel helpers ─────────────────────────────────────

/**
 * Build a minimal DOM rig for clearancePanel tests.
 * Returns { panel, body, toggle, cleanup }.
 */
function makePanelRig() {
  const panel  = document.createElement("aside");
  panel.className = "clearance";
  const header = document.createElement("div");
  header.className = "clr-header";
  const dot = document.createElement("span");
  dot.className = "clr-header-dot";
  const sw = document.createElement("button");
  sw.className = "clr-enable-switch";
  sw.setAttribute("aria-pressed", "true");
  sw.textContent = "On";
  header.appendChild(dot);
  header.appendChild(sw);
  const toggle = document.createElement("button");
  toggle.className = "clr-panel-toggle";
  toggle.setAttribute("aria-expanded", "true");
  const body = document.createElement("div");
  body.className = "clr-body";
  panel.appendChild(header);
  panel.appendChild(toggle);
  panel.appendChild(body);
  document.body.appendChild(panel);
  return {
    panel, body, toggle,
    cleanup() { document.body.removeChild(panel); },
  };
}

describe("prefs.js — default gridSnap is true", () => {
  it("gridSnap() returns true with no stored value", () => {
    // Note: module was loaded with potentially stale storage; remove key and check default
    try { localStorage.removeItem(PREFS_KEY); } catch {}
    // We cannot reload the module but we can set to known state
    setGridSnap(true);
    expect(prefsGridSnap()).toBe(true);
  });

  it("setGridSnap(false) persists; reading back gives false", () => {
    setGridSnap(false);
    expect(prefsGridSnap()).toBe(false);
    // Also verify localStorage
    try {
      const raw = localStorage.getItem(PREFS_KEY);
      if (raw !== null) {
        const parsed = JSON.parse(raw);
        expect(parsed.gridSnap).toBe(false);
      }
    } catch {}
    // Restore
    setGridSnap(true);
  });

  it("setGridSnap(true) restores on state", () => {
    setGridSnap(false);
    setGridSnap(true);
    expect(prefsGridSnap()).toBe(true);
  });

  it("setGridSnap under a throwing localStorage stub: no throw, in-memory updates", () => {
    const original = localStorage.setItem.bind(localStorage);
    let threw = false;
    // Stub setItem to throw
    Object.defineProperty(localStorage, "setItem", {
      configurable: true,
      value: () => { throw new DOMException("QuotaExceededError"); },
    });
    try {
      setGridSnap(false);
      expect(prefsGridSnap()).toBe(false); // in-memory updated
    } catch {
      threw = true;
    } finally {
      // Restore
      Object.defineProperty(localStorage, "setItem", {
        configurable: true,
        value: original,
      });
      setGridSnap(true);
    }
    expect(threw).toBe(false);
  });

  it("toggleGridSnap flips and returns new value", () => {
    setGridSnap(true);
    const v1 = toggleGridSnap();
    expect(v1).toBe(false);
    expect(prefsGridSnap()).toBe(false);
    const v2 = toggleGridSnap();
    expect(v2).toBe(true);
    expect(prefsGridSnap()).toBe(true);
  });

  it("onPrefsChange fires after setGridSnap", () => {
    setGridSnap(true);
    let fired = 0;
    onPrefsChange(() => { fired++; });
    setGridSnap(false);
    if (fired < 1) throw new Error(`Expected onPrefsChange to fire, fired=${fired}`);
    setGridSnap(true);
  });
});

  // Symbol at (2.5, 0.7): bottom edge at 1.2, top edge at 0.2; face at 0.06; gap = 0.2-0.06=0.14
  // Let's place symbol at y=0.15: top edge=0.15-0.5=-0.35 (below top face); bottom face=-0.06
  //   gap from top edge (-0.35) to top face (0.06): -0.35-0.06=-0.41 → outside
  //   bottom face at -0.06: gap = -0.35 - (-0.06) = -0.29 → |0.29| > threshold

  // Place symbol just above the outer wall face (+halfWall = +0.06):
  // Symbol at (2.5, 0.06 + 0.5 + 0.05 = 0.61): bottom edge=0.61+0.5=1.11, top edge=0.61-0.5=0.11
  // Trying to seat top edge vs bottom face... Let me think differently.

  // Horizontal wall centerline at y=0, WALL_M=0.12, outer faces at y=±0.06.
  // Symbol (w=2, h=0.5) at x=2.5 (center of 5m wall), y=?
  // Place symbol such that its bottom edge is 0.05m above the top face (y=+0.06):
  // bottom edge at y = 0.06 + 0.05 = 0.11
  // symbol center y = 0.11 - 0.25 = -0.14 → Wait, bottom = center + h/2
  // So center y = 0.11 - 0.5/2 = 0.11 - 0.25 = -0.14
  // Hmm. Symbol above the wall means y < 0 (or: lower y value).
  // Let me use y-down convention where positive y is down.
  // Wall at y=0. Symbol above = smaller y value.
  // sym center y = -0.55: bottom face (in screen y-down = +y direction) at -0.55 + 0.25 = -0.30
  // Wall top face at -0.06. gap = bottom_edge - top_face = -0.30 - (-0.06) = -0.24 (outside threshold)
  // sym center y = -0.1: bottom face at -0.1 + 0.25 = 0.15; wall inner face at +0.06
  //   gap = 0.15 - 0.06 = 0.09 m. If threshold >= 0.09 → candidate!

  it("sym just inside threshold of horizontal wall top face → candidate with dy seating flush", () => {
    // Horizontal segment from (0,0) to (4,0)
    const segs = [{ a:{x:0,y:0}, b:{x:4,y:0} }];
    const halfW = _WALL_M / 2; // 0.06

    // Symbol: w=1.5, h=0.5, centered at (2, 0.0) in y-down coords
    // Bottom edge (max y) = 0.0 + 0.25 = 0.25; wall outer face (top) at y=+0.06
    // gap = 0.25 - 0.06 = 0.19 m < threshold 0.3 ✓
    const sym = makeSym(2, 0.0, 1.5, 0.5, 0);
    const symCorners = corners(sym);

    const threshold = 0.3;
    const result = nearestWallFlush(symCorners, segs, _WALL_M, threshold, PARALLEL_TOL_DEG);

    if (result === null) throw new Error("Expected a flush candidate, got null");
    // Translation should be only on y (normal to horizontal wall)
    if (Math.abs(result.dx) > 1e-9) throw new Error(`Expected dx≈0 for horizontal wall, got ${result.dx}`);
    // gap should be non-zero; the symbol should move
    if (Math.abs(result.gap) < 1e-9) throw new Error("Expected non-zero gap");

    // KEY: after applying dx/dy, the symbol's near edge must be coincident with the correct wall face.
    // Algorithm: nearEdgeN - faceN = result.gap → after move (−gap in n-dir), nearEdgeN_after = faceN.
    // Horizontal wall: t=(1,0), n=(0,−1), so nComp(c) = c.x*0 + c.y*(−1) = −c.y
    const nx = 0, ny = -1;
    const origNProj = symCorners.map(c => c.x * nx + c.y * ny);
    const symNMin = Math.min(...origNProj);
    const symNMax = Math.max(...origNProj);
    // Determine which face was targeted and which edge was "near"
    // (mirrors the algorithm: pick the edge closest to each face)
    let targetFaceN = null, nearEdgeN = null;
    for (const faceN of [halfW, -halfW]) {
      const edge = Math.abs(symNMin - faceN) <= Math.abs(symNMax - faceN) ? symNMin : symNMax;
      const gap = edge - faceN;
      if (Math.abs(gap - result.gap) < 1e-6) { targetFaceN = faceN; nearEdgeN = edge; break; }
    }
    if (targetFaceN === null) throw new Error("Could not identify target face from result.gap");
    // After applying dx/dy, the near edge's n-projection should equal targetFaceN exactly
    const movedCorners = symCorners.map(c => ({ x: c.x + result.dx, y: c.y + result.dy }));
    const movedNProj = movedCorners.map(c => c.x * nx + c.y * ny);
    // The edge that was near is now at faceN: its n-proj moved from nearEdgeN to nearEdgeN - gap = faceN
    const movedNearEdge = Math.abs(nearEdgeN - symNMin) < 1e-9
      ? Math.min(...movedNProj) : Math.max(...movedNProj);
    const coincidentErr = Math.abs(movedNearEdge - targetFaceN);
    if (coincidentErr > 1e-6) {
      throw new Error(
        `After flush snap, near edge n-proj ${movedNearEdge.toFixed(9)} should equal face ${targetFaceN} (err ${coincidentErr})`
      );
    }
  });

  it("sym beyond threshold → null", () => {
    const segs = [{ a:{x:0,y:0}, b:{x:4,y:0} }];
    // Symbol far above wall: center y = -5, so nearest edge at y=-5+0.25=-4.75
    // face at y=-0.06; gap = -4.75 - (-0.06) = -4.69; |gap|=4.69 >> 0.3
    const sym = makeSym(2, -5, 1.5, 0.5, 0);
    const result = nearestWallFlush(corners(sym), segs, _WALL_M, 0.3, PARALLEL_TOL_DEG);
    if (result !== null) throw new Error("Expected null for far symbol");
  });

  it("sym rotated past PARALLEL_TOL_DEG → null", () => {
    const segs = [{ a:{x:0,y:0}, b:{x:4,y:0} }];
    // Symbol rotated 45°: not parallel to the horizontal wall
    const sym = makeSym(2, 0.0, 1.5, 0.5, 45);
    const result = nearestWallFlush(corners(sym), segs, _WALL_M, 0.3, PARALLEL_TOL_DEG);
    if (result !== null) throw new Error("Expected null for rotated symbol");
  });

  it("sym past wall endpoint (no t-span overlap) → null", () => {
    // Wall from (0,0) to (2,0). Symbol at x=5 (outside wall extent).
    const segs = [{ a:{x:0,y:0}, b:{x:2,y:0} }];
    const sym = makeSym(5, 0.0, 1.0, 0.5, 0);
    const result = nearestWallFlush(corners(sym), segs, _WALL_M, 0.3, PARALLEL_TOL_DEG);
    if (result !== null) throw new Error("Expected null for symbol past wall end");
  });

  it("sym near vertical wall → dy≈0, dx non-zero, near edge coincident with face", () => {
    // Vertical segment from (0,0) to (0,4): direction t=(0,1), normal n=(1,0)
    const segs = [{ a:{x:0,y:0}, b:{x:0,y:4} }];
    // Symbol (w=0.5, h=1.5) centered at (0.15, 2): left edge at 0.15-0.25=-0.1
    // Wall outer face (in +n=+x direction) at x=+0.06; gap = -0.1 - 0.06 = -0.16 → |0.16| < 0.3 threshold
    const sym = makeSym(0.15, 2, 0.5, 1.5, 0);
    const symCorners = corners(sym);
    const result = nearestWallFlush(symCorners, segs, _WALL_M, 0.3, PARALLEL_TOL_DEG);
    if (result === null) throw new Error("Expected a flush candidate for vertical wall");
    if (Math.abs(result.dy) > 1e-9) throw new Error(`Expected dy≈0 for vertical wall, got ${result.dy}`);
    if (Math.abs(result.dx) < 1e-9) throw new Error("Expected dx non-zero for vertical wall");

    // KEY: after applying dx/dy, the symbol's near edge must be coincident with the wall face.
    // Vertical wall: t=(0,1), n=(1,0), nComp(c) = c.x
    const halfW = _WALL_M / 2;
    const nx = 1, ny = 0;
    const origNProj = symCorners.map(c => c.x * nx + c.y * ny);
    const symNMin = Math.min(...origNProj);
    const symNMax = Math.max(...origNProj);
    // Determine which face and edge were targeted
    let targetFaceN = null, nearEdgeN = null;
    for (const faceN of [halfW, -halfW]) {
      const edge = Math.abs(symNMin - faceN) <= Math.abs(symNMax - faceN) ? symNMin : symNMax;
      const gap = edge - faceN;
      if (Math.abs(gap - result.gap) < 1e-6) { targetFaceN = faceN; nearEdgeN = edge; break; }
    }
    if (targetFaceN === null) throw new Error("Could not identify target face from result.gap");
    const movedCorners = symCorners.map(c => ({ x: c.x + result.dx, y: c.y + result.dy }));
    const movedNProj = movedCorners.map(c => c.x * nx + c.y * ny);
    const movedNearEdge = Math.abs(nearEdgeN - symNMin) < 1e-9
      ? Math.min(...movedNProj) : Math.max(...movedNProj);
    const coincidentErr = Math.abs(movedNearEdge - targetFaceN);
    if (coincidentErr > 1e-6) {
      throw new Error(
        `After flush snap, near edge x-proj ${movedNearEdge.toFixed(9)} should equal face ${targetFaceN} (err ${coincidentErr})`
      );
    }
  });

  it("two candidate faces (inside corner) → smaller |gap| wins", () => {
    // Two walls forming an inside corner
    // Wall 1: horizontal (0,0)→(4,0), Wall 2: vertical (4,0)→(4,4)
    const segs = [
      { a:{x:0,y:0}, b:{x:4,y:0} },
      { a:{x:4,y:0}, b:{x:4,y:4} },
    ];
    // Symbol at (3.9, 0.1): near both walls. Closer to vertical wall.
    const sym = makeSym(3.9, 0.1, 0.5, 0.5, 0);
    const result = nearestWallFlush(corners(sym), segs, _WALL_M, 0.5, PARALLEL_TOL_DEG);
    if (result === null) throw new Error("Expected a flush candidate for corner case");
    // Verify we got *some* result; the function returns the smallest |gap|
    if (Math.abs(result.gap) > 0.5) throw new Error(`gap ${result.gap} exceeds threshold`);
  });

  it("threshold respects WALL_M/2 offset (seats against face, not centerline)", () => {
    // Horizontal wall centerline y=0. Face at y=+0.06.
    // Symbol with bottom edge at exactly +0.06 (already flush): gap should be 0.
    const segs = [{ a:{x:0,y:0}, b:{x:4,y:0} }];
    const halfW = _WALL_M / 2; // 0.06
    // bottom edge = center + h/2 = halfW → center = halfW - h/2
    const h = 0.5;
    const cy = halfW - h / 2; // -0.19
    const sym = makeSym(2, cy, 1.5, h, 0);
    const symCorners = corners(sym);

    // Verify the geometry: bottom edge of sym = cy + h/2 = halfW
    const bottomEdge = symCorners.reduce((max, c) => Math.max(max, c.y), -Infinity);
    if (Math.abs(bottomEdge - halfW) > 1e-9) {
      throw new Error(`Bottom edge ${bottomEdge} != halfW ${halfW}`);
    }

    const result = nearestWallFlush(symCorners, segs, _WALL_M, 0.3, PARALLEL_TOL_DEG);
    // Gap should be ~0 (already flush) → result may exist with gap≈0 or may fail threshold
    // It's valid for gap=0 to be included (|0|<=threshold)
    if (result !== null) {
      if (Math.abs(result.gap) > 1e-6) throw new Error(`Expected gap≈0 at exact flush, got ${result.gap}`);
    }
  });
});

/** Build an AABB directly from known min/max coordinates. */
function mkAABB(minX, maxX, minY, maxY) {
  return { minX, maxX, cx: (minX + maxX) / 2, minY, maxY, cy: (minY + maxY) / 2 };
}

describe("nearestObjectAlignment — edge-to-edge contact (right→left, 0-gap)", () => {
  it("dragged right edge just inside threshold of candidate left edge → X match, edges coincide", () => {
    // Drag: minX=-1, maxX=1, cx=0; Y far from cand so no Y match
    const drag = mkAABB(-1, 1, 0, 1);
    // Cand: minX=2, maxX=4, cx=3; cand.cy=5 (far from drag.cy=0.5)
    // dragMaxX(1) → candMinX(2): gap=1, within threshold=1.5
    // No center match: drag.cx=0, cand.cx=3 → gap=3, too far
    const cand = mkAABB(2, 4, 4, 6);
    const result = nearestObjectAlignment(drag, [cand], 1.5);
    if (result.x === null) throw new Error("Expected x match");
    expect(result.x.delta).toBeCloseTo(1, 6);
    expect(result.x.kind).toBe("edge");
    expect(result.y).toBe(null);
  });

  it("right→left contact: applying delta makes right edge of drag equal cand left edge", () => {
    const drag = mkAABB(-1, 1, 0, 1);
    const cand = mkAABB(2, 4, 4, 6);
    const result = nearestObjectAlignment(drag, [cand], 1.5);
    if (result.x === null) throw new Error("Expected x match");
    const newMaxX = drag.maxX + result.x.delta;
    expect(newMaxX).toBeCloseTo(cand.minX, 9);
  });
});

 * zoom=1, pan=0 → pxPerM()=40; WALL_FLUSH_PX=12 → flushThreshM=0.3;
 * ALIGN_PX=8 → alignThreshM=0.2.
 */

describe("LLD-34 integration — guide cleared on drop (Edge Case 15)", () => {
  it("no residual <g class='align-guide'> in #symbol-overlay after onSelectUp", () => {
    // Set up known state
    view.zoom = 1; view.panX = 0; view.panY = 0;
    model.rooms.length = 0;
    symbolModel.symbols.length = 0;
    setGridSnap(true);
    setSnapMode("off"); // disable grid so only alignment fires

    // Build a minimal DOM rig with an SVG overlay
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    const overlay = document.createElementNS("http://www.w3.org/2000/svg", "g");
    overlay.id = "symbol-overlay";
    svg.appendChild(overlay);
    document.body.appendChild(svg);

    const snapTagEl = document.createElement("div");
    snapTagEl.className = "snap-tag";
    snapTagEl.style.display = "none";
    document.body.appendChild(snapTagEl);

    const stage = document.createElement("div");
    const dock = document.createElement("div");
    const inspector = document.createElement("div");
    document.body.appendChild(stage);
    document.body.appendChild(dock);
    document.body.appendChild(inspector);

    // Bind symbolTool to our rig so _gSymOverlay and _snapTagEl are set
    initSymbolTool({
      stage,
      dock,
      inspector,
      setTool: () => {},
      isDrawMode: () => false,
      snapTag: snapTagEl,
      symOverlay: overlay,
    });

    // Place two chair symbols:
    //   sym1 at (5, 5): AABB x:[4.75, 5.25], y:[4.75, 5.25]  → screen center (200, 200)
    //   sym2 at (5.35, 5): AABB x:[5.10, 5.60]
    //   gap = sym1.maxX(5.25) to sym2.minX(5.10) = -0.15; |gap|=0.15 < alignThreshM=0.2 → X match
    const sym1 = createSymbol("chair", 5, 5);
    addSymbol(sym1);
    const sym2 = createSymbol("chair", 5.35, 5);
    addSymbol(sym2);

    // Start drag on sym1 by clicking its center (sym1's center maps to screen (200,200))
    symbolOnSelectDown(200, 200);

    // Move at same position — _resolvePlacement fires with sym2 as an alignment candidate,
    // _updateGuides builds the alignment guide <g> elements.
    symbolOnSelectMove(200, 200);

    // repositionGuides() is the post-render hook that appends <g class="align-guide">
    // elements to the overlay. Call it directly to simulate the render cycle.
    repositionGuides();

    // Verify at least one align-guide was appended (proves the rig is working)
    const guidesBefore = overlay.querySelectorAll(".align-guide");

    // Drop — this MUST clear all guides from the overlay
    symbolOnSelectUp(200, 200);

    // Assert: overlay has no residual align-guide children (Edge Case 15 invariant)
    const guidesAfter = overlay.querySelectorAll(".align-guide");

    // Clean up rig
    document.body.removeChild(svg);
    document.body.removeChild(snapTagEl);
    document.body.removeChild(stage);
    document.body.removeChild(dock);
    document.body.removeChild(inspector);
    symbolModel.symbols.length = 0;
    setGridSnap(true);
    setSnapMode("auto");

    if (guidesBefore.length === 0) {
      throw new Error("No align-guide elements were created during drag — check alignment threshold or rig setup");
    }
    if (guidesAfter.length !== 0) {
      throw new Error(`Expected 0 align-guide elements after onSelectUp, got ${guidesAfter.length}`);
    }
  });
});

/** Build an AABB from known min/max for room-center tests. */
function mkRC_AABB(minX, maxX, minY, maxY) {
  return { minX, maxX, cx: (minX + maxX) / 2, minY, maxY, cy: (minY + maxY) / 2 };
}

describe("nearestRoomCenter — X axis in range only → X match, y null", () => {
  it("drag center just inside threshold of room centroid X → X match, kind room-center, y null", () => {
    // room centroid at (5, 100), drag center at (5.05, 0) — X gap=0.05 < thresh=0.2; Y gap=100 >> thresh
    const drag = mkRC_AABB(4.55, 5.55, -0.5, 0.5);  // cx=5.05, cy=0
    const rc = [{ cx: 5, cy: 100 }];
    const result = nearestRoomCenter(drag, rc, 0.2);
    if (result.x === null) throw new Error("Expected x match");
    expect(result.x.kind).toBe("room-center");
    expect(result.x.delta).toBeCloseTo(5 - 5.05, 9);
    if (result.x.center === undefined) throw new Error("Expected center on x match");
    expect(result.x.center.x).toBeCloseTo(5, 9);
    expect(result.x.center.y).toBeCloseTo(100, 9);
    if (result.y !== null) throw new Error("Expected y null");
  });
});

describe("nearestRoomCenter — both axes in range → both matches, same room", () => {

    const rc = [{ cx: 5, cy: 5 }];

    if (result.y === null) throw new Error("Expected y match");

    expect(result.y.kind).toBe("room-center");
    // Both axes carry the same center
    if (result.x.center === undefined || result.y.center === undefined) {
      throw new Error("Expected center on both matches");
    }
    expect(result.x.center.x).toBeCloseTo(result.y.center.x, 9);

  });
});

describe("nearestRoomCenter — two rooms in range, nearer centroid wins", () => {
  it("room with smaller dx²+dy² chosen; both axes from that room", () => {
    // drag center at (5, 5)
    const drag = mkRC_AABB(4.5, 5.5, 4.5, 5.5);  // cx=5, cy=5
    // roomA: centroid at (5.1, 5.1) → dx²+dy²=0.01+0.01=0.02
    // roomB: centroid at (5.05, 5.05) → dx²+dy²=0.0025+0.0025=0.005 (closer)
    const rc = [
      { cx: 5.1, cy: 5.1 },   // roomA
      { cx: 5.05, cy: 5.05 }, // roomB (winner)
    ];
    const result = nearestRoomCenter(drag, rc, 0.2);
    if (result.x === null) throw new Error("Expected x match");
    if (result.y === null) throw new Error("Expected y match");
    // Both axes should reference roomB's centroid
    if (result.x.center === undefined) throw new Error("Missing center on x");
    expect(result.x.center.x).toBeCloseTo(5.05, 9);
    expect(result.x.center.y).toBeCloseTo(5.05, 9);
    if (result.y.center === undefined) throw new Error("Missing center on y");
    expect(result.y.center.x).toBeCloseTo(5.05, 9);
    expect(result.y.center.y).toBeCloseTo(5.05, 9);
  });
});

describe("nearestRoomCenter — single-room coherence: roomA on X only, roomB on Y only", () => {
  it("roomA in range on X only, roomB in range on Y only → chosen room emits only its in-range axis", () => {
    // drag center at (5, 5)
    const drag = mkRC_AABB(4.5, 5.5, 4.5, 5.5);  // cx=5, cy=5
    // roomA: cx=5.1 (X in range 0.2), cy=100 (Y out of range)    dx²+dy²≈0.01+9025
    // roomB: cx=100 (X out of range), cy=5.05 (Y in range 0.2)   dx²+dy²≈9025+0.0025
    // roomA wins because its total dist² is much smaller (via cx, both in threshold on x, cy far)
    // Actually roomA eligible (|dx|=0.1 < 0.2), roomB eligible (|dy|=0.05 < 0.2)
    // roomA dx²+dy²=0.01 + (100-5)²≈9025.01
    // roomB dx²+dy²=(100-5)²+0.0025≈9025.0025 → roomB is slightly closer
    // But roomA only has X in range; roomB only has Y in range
    const rc = [
      { cx: 5.1, cy: 100 },  // roomA: X in range, Y far
      { cx: 100, cy: 5.05 }, // roomB: Y in range, X far
    ];
    const result = nearestRoomCenter(drag, rc, 0.2);
    // The chosen room emits only its in-range axis; the other axis is null
    // roomB (closer overall) is chosen; it has only Y in range
    // (dx=100-5=95 >> threshold; dy=5.05-5=0.05 < threshold)
    if (result.x !== null) throw new Error("Expected x null (chosen room has X out of range)");
    if (result.y === null) throw new Error("Expected y match (chosen room has Y in range)");
    // No X-from-roomA / Y-from-roomB split possible
  });
});

describe("resolver room-center — tier-4 contention: nearer wins; tie prefers object", () => {
  it("object-align closer on X → object-align wins", () => {
    resetForResolver();
    setGridSnap(true);
    setSnapMode("off");
    // Drag center at world(5,5).
    // Object-align candidate: cand minX=5.51 → gap=0.01 (drag maxX=5.5 to cand.minX=5.51)
    // Room center: cx=5.1 → dx=0.1 (larger than 0.01)
    // Object-align |delta|=0.01 < room-center |delta|=0.1 → object wins
    const box = makeBox(5, 5);
    const cand = mkAABB(5.51, 7, 0, 10);  // edge gap = 0.01
    const rc = [{ cx: 5.1, cy: 100 }];   // room-center dx=0.1
    const r = resolvePlacementForTest(200, 200, false, box, [cand], rc);
    expect(r.snapType).toBe("align");
