    expect(r._alignX.kind).toBe("edge"); // object-align won
    expect(r.x).toBeCloseTo(5.01, 5);
    setGridSnap(true);
    setSnapMode("auto");
  });

  it("room-center closer on X → room-center wins", () => {
    resetForResolver();
    setGridSnap(true);
    setSnapMode("off");
    // Drag center at world(5,5).
    // Object-align candidate: gap=0.1 (larger)
    // Room center: cx=5.02 → dx=0.02 (smaller → wins)
    const box = makeBox(5, 5);
    const cand = mkAABB(5.6, 7, 0, 10);  // edge gap = 0.1
    const rc = [{ cx: 5.02, cy: 100 }];  // room-center dx=0.02
    const r = resolvePlacementForTest(200, 200, false, box, [cand], rc);
    expect(r.snapType).toBe("align");

    expect(r.x).toBeCloseTo(5.02, 5);
    setGridSnap(true);
    setSnapMode("auto");
  });

  it("exact tie (|delta| equal within 1e-9) → object-align wins (documented tie-break)", () => {
    resetForResolver();
    setGridSnap(true);
    setSnapMode("off");
    // Drag center at world(5,5). AABB: x:[4.5,5.5], cx=5
    // Object: cand.cx exactly=5.05 → center match delta=0.05
    // Room: rc.cx exactly=5.05 → delta=0.05 — exact tie
    const box = makeBox(5, 5);
    // Build a candidate whose center is at exactly 5.05
    const cand = mkAABB(0, 10.1, 0, 10); // cx=5.05
    const rc = [{ cx: 5.05, cy: 100 }];  // room cx=5.05 same delta
    const r = resolvePlacementForTest(200, 200, false, box, [cand], rc);
    expect(r.snapType).toBe("align");
    if (r._alignX === null) throw new Error("Expected _alignX");
    // Tie → object-align wins
    expect(r._alignX.kind).toBe("center"); // object center match
    setGridSnap(true);
    setSnapMode("auto");
  });
});

describe("LLD-37 integration — room-center guide and ring cleared on drop", () => {
  it("no residual .align-guide or .room-center-ring in #symbol-overlay after onSelectUp", () => {
    view.zoom = 1; view.panX = 0; view.panY = 0;
    model.rooms.length = 0;
    symbolModel.symbols.length = 0;
    setGridSnap(true);
    setSnapMode("off");

    model.rooms.push({
      id: "rcIntRoom", closed: true,
      verts: [{ x:-5, y:-5 }, { x:5, y:-5 }, { x:5, y:5 }, { x:-5, y:5 }],
    });
    // room centroid at (0, 0); place a symbol near the centroid so room-center fires

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    const overlay = document.createElementNS("http://www.w3.org/2000/svg", "g");
    overlay.id = "symbol-overlay";
    svg.appendChild(overlay);
    document.body.appendChild(svg);

    const snapTagEl = document.createElement("div");
    snapTagEl.className = "snap-tag";
    snapTagEl.style.display = "none";
    document.body.appendChild(snapTagEl);

    const stage = document.createElement("div");
    const dock = document.createElement("div");
    const inspector = document.createElement("div");
    document.body.appendChild(stage);
    document.body.appendChild(dock);
    document.body.appendChild(inspector);

    initSymbolTool({
      stage, dock, inspector,
      setTool: () => {},
      isDrawMode: () => false,
      snapTag: snapTagEl,
      symOverlay: overlay,
    });

    // Symbol at world (0.05, 0.05) — very close to room centroid (0,0)
    // At zoom=1, pan=0: world(0,0)=screen(0,0), world(0.05,0.05)=screen(2,2)
    const sym1 = createSymbol("chair", 0.05, 0.05);
    addSymbol(sym1);

    // Start drag on the symbol
    // screen(0.05*40=2, 0.05*40=2) → click center
    symbolOnSelectDown(2, 2);

    // Move — room-center snap should fire; _updateGuides builds the room-center guide + ring
    symbolOnSelectMove(2, 2);

    // repositionGuides — post-render hook appends guides to overlay
    repositionGuides();

    // Drop — MUST clear all guides + ring
    symbolOnSelectUp(2, 2);

    // Assert: no residual align-guide or room-center-ring
    const guidesAfter = overlay.querySelectorAll(".align-guide");

    symbolModel.symbols.length = 0;
    setGridSnap(true);
    setSnapMode("auto");

    if (guidesAfter.length !== 0) {
      throw new Error(`Expected 0 align-guide after drop, got ${guidesAfter.length}`);
    }
    if (ringAfter.length !== 0) {
      throw new Error(`Expected 0 room-center-ring after drop, got ${ringAfter.length}`);
    }
  });
});

describe("interactions — loupe commit (touch pointerdown→up commits at y-56)", () => {
  it("touch up in draw mode commits at offsetY, not raw y", () => {
    // Set up a minimal stage
    const stage = document.createElement("div");
    stage.setPointerCapture = () => {};
    document.body.appendChild(stage);

    const hoverCalls = [];
    const clickCalls = [];
    let isDrawModeVal = true;

    const drawHooks = {
      isDrawMode: () => isDrawModeVal,
      onHover: (sx, sy) => hoverCalls.push({ sx, sy }),
      onClick: (sx, sy) => clickCalls.push({ sx, sy }),
      onLeave: () => {},
    };
    setDrawHooks(drawHooks);
    setSelectHooks(null);

    // We only call the handlers directly rather than going through DOM events
    // because jsdom doesn't support pointer capture on div elements well.
    // Instead, import and call the event handlers via the public module API
    // by dispatching real pointer events to the stage.

    // Dispatch a touch pointerdown at (200, 300)
    const downEvt = new PointerEvent("pointerdown", {
      bubbles: true, cancelable: true,
      pointerId: 1,
      clientX: 200, clientY: 300,
      pointerType: "touch",
      buttons: 1,
    });
    const upEvt = new PointerEvent("pointerup", {
      bubbles: true, cancelable: true,
      pointerId: 1,
      clientX: 200, clientY: 300,
      pointerType: "touch",
    });

    // Re-init interactions with our stage
    const hint = document.createElement("div");
    const btnZoomIn = document.createElement("button");
    const btnZoomOut = document.createElement("button");
    const btnReset = document.createElement("button");
    document.body.appendChild(hint);
    initInteractions(stage, hint, btnZoomIn, btnZoomOut, btnReset);

    hoverCalls.length = 0;
    clickCalls.length = 0;

    stage.dispatchEvent(downEvt);
    stage.dispatchEvent(upEvt);

    // onHover should have been called on touch-down at the offset point
    const hasOffsetHover = hoverCalls.some(c => c.sy === 300 - LOUPE_OFFSET_PX);
    if (!hasOffsetHover) {
      throw new Error(`Expected onHover called with y=${300 - LOUPE_OFFSET_PX} on touch-down, got: ${JSON.stringify(hoverCalls)}`);
    }

    // onClick should be called at offset y
    if (clickCalls.length !== 1) {
      throw new Error(`Expected 1 onClick, got ${clickCalls.length}`);
    }
    if (clickCalls[0].sy !== 300 - LOUPE_OFFSET_PX) {
      throw new Error(`Expected onClick at y=${300 - LOUPE_OFFSET_PX}, got y=${clickCalls[0].sy}`);
    }

    document.body.removeChild(stage);
    document.body.removeChild(hint);
    setDrawHooks(null);
  });
});

/** Minimal overlay DOM for templates tests */
function _makeTemplateDOM() {
  const overlay  = document.createElement("div");
  overlay.id = "template-overlay";
  const panel    = document.createElement("div");
  panel.className = "template-overlay-panel";
  const grid     = document.createElement("div");
  grid.className = "template-grid";
  const closeBtn = document.createElement("button");
  closeBtn.className = "template-overlay-close";
  panel.appendChild(grid);
  panel.appendChild(closeBtn);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  return { overlay, grid, closeBtn };
}

function _removeTemplateDOM(dom) {
  if (dom.overlay.parentNode) dom.overlay.parentNode.removeChild(dom.overlay);
}

/** Snapshot + restore live model state for template tests */
function _snapModels() {
  return {
    rooms:   JSON.parse(JSON.stringify(model.rooms)),
    chain:   JSON.parse(JSON.stringify(model.chain)),
    symbols: JSON.parse(JSON.stringify(symbolModel.symbols)),
  };
}
function _restoreModels(snap) {
  model.rooms.length = 0;
  model.chain.length = 0;
  symbolModel.symbols.length = 0;
  model.rooms.push(...snap.rooms);
  model.chain.push(...snap.chain);
  symbolModel.symbols.push(...snap.symbols);
}

describe("LLD-43 — each template applies without error and is non-empty", () => {
  it("applyPlan does not throw for any template", () => {
    const snap = _snapModels();
    try {
      for (const t of TEMPLATES) {
        const plan = validatePlan(t.plan);
        if (!plan) throw new Error(`validatePlan null for '${t.id}'`);
        applyPlan(plan);
      }
    } finally {
      _restoreModels(snap);
    }
  });

  it("plan is non-empty after each template apply (isEmptyPlan → false)", () => {
    const snap = _snapModels();
    const empties = [];
    try {
      for (const t of TEMPLATES) {
        const plan = validatePlan(t.plan);
        if (!plan) { empties.push(t.id + ": validatePlan null"); continue; }
        applyPlan(plan);
        if (isEmptyPlan()) empties.push(t.id);
        _restoreModels(snap);
      }
    } finally {
      _restoreModels(snap);
    }
    if (empties.length > 0) {
      throw new Error(`Templates that loaded to empty plan: ${empties.join(", ")}`);
    }
  });

  it("walls model reflects the template after apply", () => {
    const snap = _snapModels();
    try {
      for (const t of TEMPLATES) {
        const plan = validatePlan(t.plan);
        if (!plan) throw new Error(`validatePlan null for '${t.id}'`);
        applyPlan(plan);
        const hasGeom = model.rooms.length > 0 || model.chain.length > 0;
        if (!hasGeom) throw new Error(`Template '${t.id}': model has no rooms after apply`);
        _restoreModels(snap);
      }
    } finally {
      _restoreModels(snap);
    }
  });
});

describe("LLD-43 — template round-trip: serialize → re-validate succeeds", () => {
  it("serializePlan(validatePlan(t.plan)) → re-validatePlan succeeds for each template", () => {
    for (const t of TEMPLATES) {
      const plan1 = validatePlan(t.plan);
      if (!plan1) throw new Error(`First validatePlan null for '${t.id}'`);
      const json  = serializePlan(plan1);
      const plan2 = validatePlan(JSON.parse(json));
      if (!plan2) throw new Error(`Re-validatePlan failed for '${t.id}'`);
    }
  });

  it("serializePlan output is stable across two calls for each template", () => {
    for (const t of TEMPLATES) {
      const plan = validatePlan(t.plan);
      if (!plan) throw new Error(`validatePlan null for '${t.id}'`);
      const s1 = serializePlan(plan);
      const s2 = serializePlan(validatePlan(t.plan));
      if (s1 !== s2) throw new Error(`Unstable serializePlan for template '${t.id}'`);
    }
  });
});

describe("LLD-50 — catalog: regression guard (dimensions + labels)", () => {
  it("all entries have finite w, h, min, max; non-openings satisfy min <= w,h <= max", () => {
    for (const [type, entry] of Object.entries(CATALOG)) {
      for (const field of ["w", "h", "min", "max"]) {
        if (!isFinite(entry[field])) {
          throw new Error(`${type}.${field} is not finite: ${entry[field]}`);
        }
      }
      // openings (door/window) have a fixed thin depth (h) that is intentionally below
      // the user-editable min — only the width (w) is user-resizable for openings.
      if (entry.min > entry.w) throw new Error(`${type}: min(${entry.min}) > w(${entry.w})`);
      if (entry.w > entry.max) throw new Error(`${type}: w(${entry.w}) > max(${entry.max})`);
      if (!entry.openings) {
        if (entry.min > entry.h) throw new Error(`${type}: min(${entry.min}) > h(${entry.h})`);
        if (entry.h > entry.max) throw new Error(`${type}: h(${entry.h}) > max(${entry.max})`);
      }
    }
  });

/** Build a minimal dock DOM matching the index.html structure for tab tests. */
function _makeDockDOM() {
  const dock = document.createElement("nav");
  dock.id = "test-symbol-dock";

  // Tab strip
  const tablist = document.createElement("div");
  tablist.setAttribute("role", "tablist");
  tablist.className = "dock-tabs";

  const categories = ["openings", "living", "kitchen", "bedroom", "bath"];
  const tabLabels  = { openings: "Openings", living: "Living", kitchen: "Kitchen", bedroom: "Bedroom", bath: "Bath" };
  // Item types per category (matching CATALOG)
  const itemsByCategory = {
    openings: ["door", "window"],
    living:   ["sofa", "table", "chair", "desk", "tv", "bookshelf"],
    kitchen:  ["fridge", "stove", "sink", "washer"],
    bedroom:  ["bed", "wardrobe"],
    bath:     ["toilet", "bathtub"],
  };

  for (let i = 0; i < categories.length; i++) {
    const cat = categories[i];
    const tab = document.createElement("button");
    tab.setAttribute("role", "tab");
    tab.dataset.category = cat;
    tab.id = `test-tab-${cat}`;
    tab.setAttribute("aria-controls", `test-row-${cat}`);
    tab.setAttribute("aria-selected", i === 0 ? "true" : "false");
    tab.tabIndex = i === 0 ? 0 : -1;
    tab.textContent = tabLabels[cat];
    tablist.appendChild(tab);
  }
  dock.appendChild(tablist);

  for (let i = 0; i < categories.length; i++) {
    const cat = categories[i];
    const row = document.createElement("div");
    row.setAttribute("role", "tabpanel");
    row.dataset.category = cat;
    row.id = `test-row-${cat}`;
    row.setAttribute("aria-labelledby", `test-tab-${cat}`);
    if (i !== 0) row.setAttribute("hidden", "");

    for (const type of itemsByCategory[cat]) {
      const btn = document.createElement("button");
      btn.className = "dock-item";
      btn.dataset.type = type;
      btn.setAttribute("aria-label", `Add ${type}`);
      row.appendChild(btn);
    }
    dock.appendChild(row);
  }

  document.body.appendChild(dock);
  return dock;
}

function _removeDockDOM(dock) {
  if (dock.parentNode) dock.parentNode.removeChild(dock);
}

describe("LLD-54 — nudge step selection logic", () => {
  it("base step derives from snapStep() when non-null (auto mode)", () => {
    // snapStep() in "auto" mode returns chooseGridStep(56), which is grid-step-dependent.
    // At zoom=1 (pxPerM=40), the step should be >= 56/40 = 1.4m → chooseGridStep picks 2m.
    view.zoom = 1; view.panX = 0; view.panY = 0;
    setSnapMode("auto");
    const step = snapStep();
    // We just verify it's a positive number
    if (typeof step !== "number" || step <= 0) throw new Error(`Expected positive step, got ${step}`);

  });

  it("snapStep() returns fixed value for preset modes", () => {

    expect(snapStep()).toBe(0.1);
    setSnapMode(0.25);
    expect(snapStep()).toBe(0.25);
    setSnapMode("auto"); // restore
  });

  it("nudge fallback: when snapStep is null, base is 0.1 (verified by manual computation)", () => {
    // When snap is off, nudge code uses `snapStep() ?? 0.1` → base = 0.1
    // and Shift multiplies by 4 → 0.4
    setSnapMode("off");
    const base = snapStep() ?? 0.1;

      throw new Error("SHORTCUTS must be a non-empty array");
    }
  });

  it("every entry has non-empty mac and other chord strings", () => {
    for (const entry of SHORTCUTS) {
      if (!entry.mac || typeof entry.mac !== "string") {
        throw new Error(`Entry "${entry.action}" has missing/empty mac chord`);
      }
      if (!entry.other || typeof entry.other !== "string") {
        throw new Error(`Entry "${entry.action}" has missing/empty other chord`);
      }
    }
  });

  it("every entry has non-empty action and group strings", () => {
    for (const entry of SHORTCUTS) {
      if (!entry.action || typeof entry.action !== "string") {
        throw new Error(`Entry has missing/empty action`);
      }
      if (!entry.group || typeof entry.group !== "string") {
        throw new Error(`Entry "${entry.action}" has missing/empty group`);
      }
    }
  });

  it("SHORTCUTS action set exactly equals the expected active-shortcut set", () => {
    const actualActions = new Set(SHORTCUTS.map(e => e.action));
    for (const expected of EXPECTED_ACTIONS) {
      if (!actualActions.has(expected)) {
        throw new Error(`Missing shortcut in SHORTCUTS: "${expected}"`);
      }
    }
    for (const actual of actualActions) {
      if (!EXPECTED_ACTIONS.has(actual)) {
        throw new Error(`Unexpected/dead entry in SHORTCUTS: "${actual}"`);
      }
    }
  });

  it("no two entries have the same action string", () => {
    const seen = new Set();
    for (const entry of SHORTCUTS) {
      if (seen.has(entry.action)) {
        throw new Error(`Duplicate action in SHORTCUTS: "${entry.action}"`);
      }
      seen.add(entry.action);
    }
  });
});

describe("LLD-54 — help: _renderTable platform rendering", () => {
  it("_renderTable(true) populates #help-table-body with rows", () => {
    // Create a temporary tbody in document
    let tbody = document.getElementById("help-table-body");
    if (!tbody) {
      tbody = document.createElement("tbody");
      tbody.id = "help-table-body";
      document.body.appendChild(tbody);
    }
    renderTableForTest(true);
    const rows = tbody.querySelectorAll("tr");
    if (rows.length === 0) throw new Error("Expected rows after renderTable(true)");
  });

  it("_renderTable(false) populates #help-table-body with rows", () => {
    let tbody = document.getElementById("help-table-body");
    if (!tbody) {
      tbody = document.createElement("tbody");
      tbody.id = "help-table-body";
      document.body.appendChild(tbody);
    }
    renderTableForTest(false);
    const rows = tbody.querySelectorAll("tr");
    if (rows.length === 0) throw new Error("Expected rows after renderTable(false)");
  });

  it("mac rendering uses ⌘ for Undo; non-mac uses Ctrl+", () => {
    let tbody = document.getElementById("help-table-body");
    if (!tbody) {
      tbody = document.createElement("tbody");
      tbody.id = "help-table-body";
      document.body.appendChild(tbody);
    }
    renderTableForTest(true);
    const macText = tbody.textContent;
    renderTableForTest(false);
    const otherText = tbody.textContent;
    if (!macText.includes("⌘")) throw new Error("Mac table should include ⌘ for Undo");
    if (!otherText.includes("Ctrl")) throw new Error("Non-mac table should include Ctrl for Undo");
    // They should be different
    if (macText === otherText) throw new Error("Mac and non-mac tables should differ");
  });

  it("number of data rows equals SHORTCUTS.length", () => {
    let tbody = document.getElementById("help-table-body");
    if (!tbody) {
      tbody = document.createElement("tbody");
      tbody.id = "help-table-body";
      document.body.appendChild(tbody);
    }
    renderTableForTest(false);
    // Count non-header rows (rows with <td class="help-key">)
    const dataRows = tbody.querySelectorAll("td.help-key");
    expect(dataRows.length).toBe(SHORTCUTS.length);
  });
});
